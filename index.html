  // ── Copia de seguridad automática en Supabase (tabla app_backups) ──────────
  // Guarda una "foto" completa (recursos, APUs, proyectos, catálogos) con fecha.
  // Se dispara sola cada cierto tiempo y también hay un botón manual. Así, si algo
  // sobreescribe los datos en vivo, siempre hay una versión reciente para restaurar.
  const [showBackups, setShowBackups] = useState(false);
  const backupEnCursoRef = React.useRef(false);
  const hacerBackupSupabase = async (silencioso) => {
    if(!_sb || backupEnCursoRef.current) return;
    backupEnCursoRef.current = true;
    try{
      const snap = {version:1, fecha:new Date().toISOString(), recursos, apus, plantillasAU,
        proyectos, catalogoPolizas, catalogoEstampillas, plantillasInt};
      const {error} = await _sb.from("app_backups").insert({data:snap});
      if(error){ if(!silencioso) alert("No se pudo guardar la copia de seguridad: "+error.message); return; }
      // Limpieza: conservar solo los 30 respaldos más recientes.
      const {data:viejos} = await _sb.from("app_backups").select("id").order("created_at",{ascending:false}).range(30,10000);
      if(viejos && viejos.length) await _sb.from("app_backups").delete().in("id", viejos.map(v=>v.id));
      if(!silencioso) alert("✓ Copia de seguridad guardada en Supabase ("+new Date().toLocaleString("es-CO")+").");
      localStorage.setItem("prex_ultimo_backup_auto", String(Date.now()));
    }catch(e){ if(!silencioso) alert("Error guardando la copia de seguridad: "+(e.message||e)); }
    finally{ backupEnCursoRef.current = false; }
  };
  // Auto-backup: al cargar, si el último respaldo automático fue hace más de 2 horas
  // (o nunca se ha hecho), guarda uno solo. No molesta con ventanas emergentes.
  useEffect(()=>{
    if(!dataReady || !_sb || !session) return;
    const ultimo = Number(localStorage.getItem("prex_ultimo_backup_auto")||0);
    const dosHoras = 2*60*60*1000;
    if(Date.now()-ultimo > dosHoras){
      const t=setTimeout(()=>hacerBackupSupabase(true), 4000); // esperar a que todo cargue bien
      return ()=>clearTimeout(t);
    }
  },[dataReady, session]);
  // ── Guardar TODOS los proyectos en Supabase de una sola vez ─────────────────
  // Escribe capítulos e ítems fila por fila (igual que el importador de Excel) y
  // el meta de cada proyecto, más los catálogos globales. Útil sobre todo después
  // de restaurar una copia de seguridad: en vez de entrar proyecto por proyecto y
  // darle Guardar a cada uno, este botón lo hace de una vez para todos.
  const [guardandoTodo, setGuardandoTodo] = useState(false);
  const guardarTodosLosProyectos = async () => {
    if(!_sb || guardandoTodo) return;
    if(!window.confirm(`Se van a guardar TODOS los proyectos (${proyectos.length}) en la base de datos, tal como están en pantalla ahora mismo.\n\n¿Continuar?`)) return;
    setGuardandoTodo(true);
    try{
      let capsTot=0, itemsTot=0;
      for(const proy of proyectos){
        const pid = String(proy.id);
        const hojas = (proy.presupuestosObra && proy.presupuestosObra.length)
          ? proy.presupuestosObra
          : [{id:"p0", capitulos: proy.capitulos||[]}];
        // Reemplazo completo: borrar lo viejo de este proyecto antes de insertar
        // lo actual. Así "Guardar todos" deja la base EXACTAMENTE como la pantalla,
        // sin dejar filas huérfanas ni duplicadas de guardados anteriores.
        await _sb.from("items_presupuesto").delete().eq("proyecto_id", pid);
        await _sb.from("capitulos_presupuesto").delete().eq("proyecto_id", pid);
        const capRows=[], itemRows=[];
        hojas.forEach(h=>{
          (h.capitulos||[]).forEach(c=>{
            capRows.push({ id:String(c.id), proyecto_id:pid, numero:c.numero, nombre:c.nombre,
              tipo: (h.id && String(h.id)!=="p0") ? ("obra_ps:"+h.id) : (c.tipo||"obra"), orden:c.orden||0 });
            (c.items||[]).forEach(it=>{
              itemRows.push({ id:String(it.id), proyecto_id:pid, capitulo_id:String(c.id), numero_cap:c.numero,
                apu_id: it.apuId?String(it.apuId):null, descripcion: it.descripcion||"", unidad: it.unidad||"",
                cantidad: it.cantidad||0, orden_item: it.orden||0 });
            });
          });
        });
        for(let i=0;i<capRows.length;i+=200) await _sb.from("capitulos_presupuesto").upsert(capRows.slice(i,i+200));
        for(let i=0;i<itemRows.length;i+=200) await _sb.from("items_presupuesto").upsert(itemRows.slice(i,i+200));
        capsTot+=capRows.length; itemsTot+=itemRows.length;

        const metaFields=["codigo","nombre","contratante","descripcion","componentes","aiu","apuOverrides",
          "apuNombreOverrides","apusLocales","porcentajeHerramienta","finalizado","municipioId","fichaFinanciera"];
        const meta={}; metaFields.forEach(f=>{ if(proy[f]!==undefined) meta[f]=proy[f]; });
        meta.presupuestosObra = hojas.map(ps=>{ const x={...ps}; delete x.capitulos; return x; });
        meta.id = proy.id;
        await _sb.from("app_data").upsert({key:"psec_"+pid+"_meta", value:meta});
        if(proy.au!==undefined) await _sb.from("app_data").upsert({key:"psec_"+pid+"_au", value:proy.au});
        if(proy.polizasPorComp!==undefined) await _sb.from("app_data").upsert({key:"psec_"+pid+"_pol", value:proy.polizasPorComp});
      }
      // Catálogos globales
      await _sb.from("app_data").upsert({key:"apus", value:apus});
      await _sb.from("app_data").upsert({key:"recursos", value:recursos});
      await _sb.from("app_data").upsert({key:"proyectos", value:proyectos.map(p=>{
        const x={...p};
        if(Array.isArray(p.presupuestosObra)) x.presupuestosObra = p.presupuestosObra.map(ps=>{ const y={...ps}; delete y.capitulos; return y; });
        delete x.capitulos;
        return x;
      })});
      alert(`✓ Guardado completo.\n\nProyectos: ${proyectos.length} · Capítulos: ${capsTot} · Ítems: ${itemsTot}\n\nRecarga la página (Ctrl+Shift+R) para confirmar que quedó todo bien.`);
    }catch(e){
      console.error("Error guardando todos los proyectos:", e);
      alert("Hubo un error guardando: "+(e.message||e)+"\n\nRevisa la consola para más detalle.");
    } finally { setGuardandoTodo(false); }
  };
  const onImportar=e=>{
    const file=e.target.files[0];if(!file)return;e.target.value="";
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const b=JSON.parse(ev.target.result);
        if(!b.recursos||!b.apus){alert("Archivo de backup inválido");return;}
        if(!window.confirm(`¿Cargar backup del ${(b.fecha||"").slice(0,10)}?\n\nEsto reemplazará TODOS los datos.\n\nRecursos: ${(b.recursos||[]).length} · APUs: ${(b.apus||[]).length} · Proyectos: ${(b.proyectos||[]).length}`))return;
        setRecursos(b.recursos||[]);setApus(b.apus||[]);
        setPlantillasAU(b.plantillasAU||PLANTILLAS_AU_INIT);
        setProyectos(b.proyectos||[]);
        if(b.catalogoPolizas)setCatalogoPolizas(b.catalogoPolizas);
        if(b.catalogoEstampillas)setCatalogoEstampillas(b.catalogoEstampillas);
        if(b.plantillasInt)setPlantillasInt(b.plantillasInt);
        alert("✓ Backup cargado correctamente");
      }catch(err){alert("Error leyendo el archivo.");}
    };
    reader.readAsText(file);
  };

  // ── Importar Excel de proyecto: lee un Excel exportado por el sistema y
  // reconstruye capítulos, ítems, APUs y recursos directamente en Supabase.
  // Sirve para recuperar un proyecto cuando la app se quedó en $0 pero tienes
  // un Excel exportado con los valores buenos.
  const onImportarExcel = e => {
    const file = e.target.files[0]; if(!file) return; e.target.value="";
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:"array"});
        const USA = {material:"cantidad", transporte:"cantidad", mano_obra:"rendimiento", maquinaria:"rendimiento"};
        const CATxL = {"Materiales":"material","Mano de Obra":"mano_obra","Maquinaria / Equipo":"maquinaria","Transporte":"transporte"};
        const SECxAPU = {"Materiales":"material","Mano de Obra":"mano_obra","Maquinaria / Equipo / Herramientas":"maquinaria","Transporte":"transporte","Otros":"material"};
        const norm = s => (s||"").toString().trim().toLowerCase().replace(/\\s+/g," ").slice(0,90);
        let _seq = Date.now();
        const nid = () => ++_seq;
        const aoa = name => XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, defval:null});

        // 1) ¿A qué proyecto pertenece? Se lee de la celda A1/B1 "PROYECTO"
        let nombreProyecto=null, codigoProyecto=null;
        const sheetNames = wb.SheetNames;
        const hojasPresupuesto = [];
        sheetNames.forEach(sn=>{
          if(sn.startsWith("APUs · ")||["Cálculo A+U","Pólizas Obra","Estampillas","Factor Multiplicador",
            "Presupuesto Interventoría","Pólizas Interventoría","Pólizas EDESO","Ficha Financiera","Resumen",
            "Recursos","SG-SST","PMA","PMT","Gestion Social","APUs Proyectos"].includes(sn)) return;
          const rows = aoa(sn);
          if(rows.length && rows[0] && rows[0][0]==="PROYECTO"){
            hojasPresupuesto.push(sn);
            if(!nombreProyecto) nombreProyecto = rows[0][1];
            if(!codigoProyecto && rows[1] && rows[1][0]==="CÓDIGO") codigoProyecto = rows[1][1];
          }
        });
        if(!hojasPresupuesto.length){ alert("No encontré hojas de presupuesto en este Excel (se espera la fila 'PROYECTO' en cada hoja)."); return; }

        // Buscar el proyecto en la base actual por nombre o código
        let proyDestino = proyectos.find(p=> (codigoProyecto && p.codigo===codigoProyecto) || p.nombre===nombreProyecto);
        if(!proyDestino){
          const opciones = proyectos.map(p=>p.nombre).join("\\n");
          alert("No encontré automáticamente el proyecto '"+(nombreProyecto||"?")+"'.\\n\\nProyectos disponibles:\\n"+opciones+"\\n\\nRenombra el proyecto en el sistema para que coincida, o crea el proyecto primero.");
          return;
        }
        if(!window.confirm(`Se va a IMPORTAR el Excel dentro del proyecto:\\n\\n"${proyDestino.nombre}"\\n\\nHojas encontradas: ${hojasPresupuesto.join(", ")}\\n\\nEsto reemplaza los capítulos e ítems de esas hojas. ¿Continuar?`)) return;

        // 2) Parsear RECURSOS (si la hoja existe)
        const recursosNuevos = []; const cod2r = {};
        recursos.forEach(r=>{ if(r.codigo) cod2r[String(r.codigo).trim().toUpperCase()+"||"+norm(r.nombre)]=r; });
        if(wb.SheetNames.includes("Recursos")){
          const rows = aoa("Recursos");
          for(let i=2;i<rows.length;i++){
            const [cod,nombre,und,cat,precio] = rows[i]||[];
            if(!cod || !nombre) continue;
            const key = String(cod).trim().toUpperCase()+"||"+norm(nombre);
            if(cod2r[key]) continue; // ya existe, no duplicar
            const r = { id: nid(), codigo:String(cod).trim(), nombre:String(nombre).trim(),
              unidad: und?String(und).trim():"", categoria: CATxL[String(cat).trim()]||"material",
              precio: typeof precio==="number"?precio:0 };
            recursosNuevos.push(r); cod2r[key]=r;
          }
        }

        // 3) Parsear APUs por hoja (busca "APUs · <hoja>")
        const apuPorHojaNombre = {}; // hoja -> {normNombre: apuId}
        const apusNuevos = [];
        hojasPresupuesto.forEach(hoja=>{
          const sn = "APUs · "+hoja;
          if(!wb.SheetNames.includes(sn)) return;
          const rows = aoa(sn);
          const mapa = {};
          let cur=null, cursec=null;
          for(let i=2;i<rows.length;i++){
            const [cod,desc,und,cant,pu,sub] = rows[i]||[];
            // Excel a veces trae "" en vez de null en la celda de código: tratarlas igual.
            const codVacio = (cod==null || cod==="");
            if(codVacio && (desc==null||desc==="")){ cur=null; continue; }
            if(pu==="V. UNITARIO"){
              let unidad="";
              if(typeof cant==="string" && cant.includes("Unidad:")) unidad=cant.split("Unidad:")[1].trim();
              cur = { id: nid(), codigo:String(cod).trim(), nombre: desc?String(desc).trim():"", unidad, lineas:[] };
              mapa[norm(cur.nombre)] = cur.id;
              apusNuevos.push(cur); cursec=null; continue;
            }
            if(!cur) continue;
            if(codVacio && typeof desc==="string"){ cursec = SECxAPU[desc.trim()]||null; continue; }
            if(!codVacio){
              const c = String(cod).trim();
              if(c==="-" || (typeof desc==="string" && desc.includes("Herramienta menor"))) continue;
              // Clave por código+nombre: algunos Excels reutilizan el mismo "código"
              // numérico para recursos distintos (ids internos, no códigos reales).
              // Usar solo el código como clave los mezclaba (ej. "761148" repetido
              // para Motosierra, Volqueta y Compresor de pintura a la vez).
              const nombreRec = desc?String(desc).trim():"";
              const keyRec = (c.toUpperCase())+"||"+norm(nombreRec);
              let r = cod2r[keyRec];
              if(!r){
                r = { id: nid(), codigo:c, nombre: nombreRec, unidad: und?String(und).trim():"",
                  categoria: cursec||"material", precio: typeof pu==="number"?pu:0 };
                recursosNuevos.push(r); cod2r[keyRec]=r;
              }
              const sec = cursec || r.categoria || "material";
              const val = typeof cant==="number" ? cant : 0;
              const ln = { id: nid()+Math.random(), _sec: sec, recursoId: r.id };
              if(USA[sec]==="cantidad"){ ln.cantidad=val; ln.rendimiento=null; } else { ln.rendimiento=val; ln.cantidad=null; }
              cur.lineas.push(ln);
            }
          }
          apuPorHojaNombre[hoja] = mapa;
        });

        // 4) Parsear capítulos e ítems de cada hoja de presupuesto
        const hojasFinal = [];
        let totalItems=0, sinApu=0;
        hojasPresupuesto.forEach((hoja,hi)=>{
          const rows = aoa(hoja);
          const caps = []; let cur=null;
          for(let i=6;i<rows.length;i++){
            const [item,desc,und,cant] = rows[i]||[];
            const s = desc?String(desc).trim():"";
            const itemVacio = (item==null || item==="");
            if(!s && itemVacio) continue;
            if(s.startsWith("CAP.")){
              const m = s.match(/CAP\.\s*(\S+)\s*[—-]\s*(.*)/);
              cur = { id: nid(), numero: m?m[1]:String(caps.length+1), nombre: m?m[2].trim():s,
                tipo:"obra", orden: caps.length+1, items: [] };
              caps.push(cur); continue;
            }
            if(!itemVacio && cur){
              const apuId = (apuPorHojaNombre[hoja]||{})[norm(s)] || null;
              if(!apuId) sinApu++;
              cur.items.push({ id: nid()+Math.random(), apuId, orden: cur.items.length,
                unidad: und?String(und).trim():"", cantidad: typeof cant==="number"?cant:0, descripcion: s });
              totalItems++;
            }
          }
          // buscar si ya existe una hoja con ese nombre en el proyecto destino
          const existente = (proyDestino.presupuestosObra||[]).find(h=>h.nombre===hoja);
          hojasFinal.push({ id: existente?existente.id:("ps_imp_"+hi), nombre: hoja,
            porcentajeHerramienta: (existente&&existente.porcentajeHerramienta)||0.05, capitulos: caps });
        });

        if(sinApu>0 && !window.confirm(`${sinApu} de ${totalItems} ítems no encontraron su APU correspondiente (quedarán en $0). ¿Continuar de todas formas?`)) return;

        // 5) Guardar recursos y APUs nuevos (en memoria + Supabase)
        const recursosFinal = [...recursos, ...recursosNuevos];
        const apusFinal = [...apus, ...apusNuevos];
        setRecursos(recursosFinal);
        setApus(apusFinal);

        // 6) Reemplazar/fusionar las hojas del proyecto destino
        const hojasExistentes = proyDestino.presupuestosObra||[];
        const nuevasHojasCompletas = hojasExistentes.map(h=>{
          const importada = hojasFinal.find(hf=>hf.nombre===h.nombre);
          return importada || h;
        });
        hojasFinal.forEach(hf=>{ if(!nuevasHojasCompletas.find(h=>h.nombre===hf.nombre)) nuevasHojasCompletas.push(hf); });
        const proyActualizado = { ...proyDestino, presupuestosObra: nuevasHojasCompletas,
          capitulos: nuevasHojasCompletas[0] ? nuevasHojasCompletas[0].capitulos : proyDestino.capitulos };
        setProyectos(proyectos.map(p=> p.id===proyDestino.id ? proyActualizado : p));

        // 7) Persistir TODO en Supabase (recursos, apus, capítulos/ítems por fila, meta del proyecto)
        alert("Leído correctamente. Guardando en la base — esto puede tardar unos segundos…");
        const pid = String(proyDestino.id);
        // IMPORTANTE: borrar los capítulos/ítems VIEJOS de este proyecto antes de
        // insertar los nuevos. Sin esto, reimportar el mismo Excel dos veces deja
        // los capítulos viejos Y los nuevos juntos en la base (duplicados, valores
        // sumados dos veces) — que fue justo lo que pasó esta noche.
        await _sb.from("items_presupuesto").delete().eq("proyecto_id", pid);
        await _sb.from("capitulos_presupuesto").delete().eq("proyecto_id", pid);
        const capRows=[], itemRows=[];
        nuevasHojasCompletas.forEach(h=>{
          (h.capitulos||[]).forEach(c=>{

<script>
window.__edesoPrint = function(pActivo, apus, recursos, calcProyecto, calcItem, calcAPUTotal, calcLinea, calcAUItem, calcAUSubseccion, calcTotalPresupInterv, calcFichaFinanciera, getApusUsados, fmt, fmtN) {
  var ex = document.getElementById('__pf__');
  if (ex) ex.remove();

  // El PDF es entregable: se converge siempre antes de imprimir (pólizas, estampillas
  // y transacciones dependen del costo total y a la vez están dentro de él).
  var _G = window.__PREX || {};
  pActivo = convergerAU(pActivo, apus, recursos, _G.catEst || []);

  // El cuerpo de esta función usa el nombre "proyecto" en varios sitios, pero el
  // parámetro se llama "pActivo". Faltaba este alias: sin él la impresión lanzaba
  // ReferenceError y el botón simplemente no hacía nada.
  var proyecto = pActivo;

  var res = calcProyecto(pActivo, apus, recursos);
  var au = pActivo.au || {};
  var extras = getExtras(pActivo);          // calculado de sus hojas, no de la caché
  var totEx = getExtrasTotal(pActivo);
  var comps = pActivo.componentes || [];
  var hasObra   = comps.includes('obra') || comps.length===0;
  var hasInt    = comps.includes('interventoria');
  var hasConsult= comps.includes('consultoria');
  var presups = (pActivo.presupuestosObra && pActivo.presupuestosObra.length)
    ? pActivo.presupuestosObra
    : [{id:'p0',nombre:'Presupuesto Obra',capitulos:pActivo.capitulos||[]}];
  var apusUs = getApusUsados(pActivo, apus, recursos);
  var ff = pActivo.fichaFinanciera || {};
  var LOGO = window.__edesoLogo || '';

  function fP(n) { return '$ '+Math.round(n||0).toLocaleString('es-CO'); }
  function fNN(n,d) { return (n||0).toLocaleString('es-CO',{minimumFractionDigits:d,maximumFractionDigits:d}); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function hdr(sec) {
    return '<div class="ph">'
      +(LOGO?'<img src="'+LOGO+'" class="phl"/>':'<b class="phl-txt">EDESO</b>')
      +'<div class="phm">'+esc(pActivo.nombre||'')+'</div>'
      +'<div class="phr">'+esc(sec)+'</div></div>';
  }

  // Poliza calculation (same formula as system)
  // calcPol moved to global scope

  function polTable(polData, vBase, plazo) {
    var polizas=(polData&&polData.polizasActivas)||[];
    var plz=Number((polData&&polData.plazoContractual)||plazo)||0;
    var vb=Number((polData&&polData.valorBase)||vBase)||0;
    var rows='', tot=0;
    polizas.forEach(function(p) {
      var c=calcPol(p,vb,plz); tot+=c.civa;
      rows+='<tr><td>'+esc(p.nombre||'')+'</td>'
        +'<td class="r">'+fNN(p.pct||0,1)+'%</td>'
        +'<td class="r">'+fP(c.va)+'</td>'
        +'<td class="r">'+fNN(p.pctPrima||0,2)+'%</td>'
        +'<td class="r">'+fP(c.valor)+'</td>'
        +'<td class="c">'+plz+'m</td>'
        +'<td class="c">'+(p.mesesExtra||0)+'m</td>'
        +'<td class="c">'+c.dias+'d</td>'
        +'<td class="r">'+fP(c.siva)+'</td>'
        +'<td class="r b">'+fP(c.civa)+'</td></tr>';
    });
    if(!rows) rows='<tr><td colspan="10" class="c">Sin polizas configuradas</td></tr>';
    else rows+='<tr class="tr"><td colspan="9">TOTAL POLIZAS c/IVA</td><td class="r">'+fP(tot)+'</td></tr>';
    return '<table><thead><tr>'
      +'<th>Poliza</th><th class="r">% Valor</th><th class="r">V.Asegurar</th>'
      +'<th class="r">% Prima</th><th class="r">VA x %Prima</th>'
      +'<th class="c">Plazo</th><th class="c">+Meses</th><th class="c">Dias</th>'
      +'<th class="r">Prima s/IVA</th><th class="r">Prima c/IVA</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table>';
  }

  var secs = [];

  // ── 1. PRESUPUESTOS DE OBRA ──────────────────────────────────────
  presups.forEach(function(ps) {
    var cdPs=Math.round((ps.capitulos||[]).reduce(function(s,cap){
      return s+(cap.items||[]).reduce(function(s2,it){return s2+calcItem(it,apus,recursos,proyecto,ps);},0);
    },0));
    var rows='';
    (ps.capitulos||[]).forEach(function(cap) {
      var cdC=(cap.items||[]).reduce(function(s,it){return s+calcItem(it,apus,recursos,proyecto,ps);},0);
      var pct=cdPs>0?(cdC/cdPs*100).toFixed(1):'0.0';
      rows+='<tr class="cr"><td colspan="4">'+esc(cap.numero)+'. '+esc(cap.nombre)+'</td>'
        +'<td class="c">'+pct+'%</td><td class="r b">'+fP(cdC)+'</td></tr>';
      (cap.items||[]).forEach(function(item,ii) {
        var apu=apus.find(function(a){return a.id===item.apuId;});
        var apuEf=apu?getApuEfectivo(apu,proyecto):null;   // respeta los overrides del proyecto
        var vu=apuEf?calcAPUTotal(apuEf,recursos,getPctHerramienta(proyecto,ps)):0;
        var vt=Math.round((item.cantidad||0)*vu);
        var pct2=cdPs>0?(vt/cdPs*100).toFixed(2):'0.00';
        rows+='<tr>'
          +'<td class="in">'+esc(cap.numero)+'.'+(ii+1)+'</td>'
          +'<td>'+esc((apuEf?apuEf.nombre:'')||item.descripcion||'')
          +'<br/><span class="dim">'+(apu?esc(apu.codigo):'')+'</span></td>'
          +'<td class="c">'+esc((apu?apu.unidad:'')||item.unidad||'')+'</td>'
          +'<td class="r">'+fNN(item.cantidad||0,2)+'<br/><span class="dim">VU: '+fP(vu)+'</span></td>'
          +'<td class="c">'+pct2+'%</td>'
          +'<td class="r b">'+fP(vt)+'</td></tr>';
      });
    });
    secs.push({title:esc(ps.nombre||'Presupuesto Obra'), html:
      hdr(ps.nombre||'Presupuesto Obra')
      +'<div class="st">'+esc(ps.nombre||'Presupuesto Obra')+'</div>'
      +'<table><thead><tr><th>Item</th><th>Descripcion</th><th class="c">Und</th>'
      +'<th class="r">Cant. / V.Unit.</th><th class="c">% Incid.</th><th class="r">V.Total</th></tr></thead>'
      +'<tbody>'+rows+'</tbody>'
      +'<tfoot><tr class="tr"><td colspan="5">COSTO DIRECTO (C.D.)</td><td class="r">'+fP(cdPs)+'</td></tr></tfoot></table>'
    });
  });

  // ── 2. CALCULO A+U ───────────────────────────────────────────────
  if (hasObra) {
    var aur='';
    (au.secciones||[]).forEach(function(sec) {
      (sec.subsecciones||[]).forEach(function(sub) {
        if(!(sub.items||[]).length) return;
        var fc=sub.id==='s1_1'?1.45:sub.id==='s1_3'?1.70:1;
        var sv=Math.round(calcAUSubseccion(sub,res.cd,res.total));
        aur+='<tr class="cr"><td colspan="4">'+(sub.numero||'')+' '+esc(sub.titulo)+'</td><td class="r">'+fP(Math.round(sv*fc))+'</td></tr>';
        (sub.items||[]).forEach(function(it) {
          var v=Math.round(calcAUItem(it,sub.tipo,res.cd,res.total)*fc);
          var det='';
          if(sub.tipo==='personal') det=fNN(it.dedicacion||0,2)+'ded x '+fNN(it.cantidad||0,0)+'cant x '+fP(it.valorMesBase||0)+'/mes x '+(it.meses||0)+'m'+(fc>1?' x'+fc:'');
          else if(sub.tipo==='desplazamiento') det=fNN(it.cantidad||0,0)+' viajes x '+fP(it.valorUnitario||0)+' x '+(it.meses||1)+'m';
          else if(it.porcentaje!=null) det=fNN(it.porcentaje,4)+'% s/CD';
          else if(it.valorFijo) det='Valor fijo: '+fP(it.valorFijo);
          aur+='<tr><td colspan="3">&nbsp;&nbsp;'+esc(it.descripcion||'')+'</td>'
            +'<td class="dim" style="font-size:7.5px">'+esc(det)+'</td>'
            +'<td class="r">'+fP(v)+'</td></tr>';
        });
      });
    });
    // PMA/PMT/SST/GS
    var exR='';
    if(extras.sgSst>0) exR+='<tr><td colspan="4">SG-SST</td><td class="r">'+fP(extras.sgSst)+'</td></tr>';
    if(extras.pma>0)   exR+='<tr><td colspan="4">PMA</td><td class="r">'+fP(extras.pma)+'</td></tr>';
    if(extras.pmt>0)   exR+='<tr><td colspan="4">PMT</td><td class="r">'+fP(extras.pmt)+'</td></tr>';
    if(extras.gestionSocial>0) exR+='<tr><td colspan="4">Gestion Social</td><td class="r">'+fP(extras.gestionSocial)+'</td></tr>';
    if(totEx>0) exR+='<tr class="tr"><td colspan="4">COSTOS TOTALES</td><td class="r">'+fP(res.total+totEx)+'</td></tr>';
    secs.push({title:'Calculo A+U', html:
      hdr('Calculo A+U')+'<div class="st">Calculo de Administracion y Utilidad</div>'
      +'<table><thead><tr><th colspan="3">Seccion / Item</th><th>Detalle</th><th class="r">Valor</th></tr></thead>'
      +'<tbody>'+aur+'</tbody>'
      +'<tfoot>'
      +'<tr class="tr"><td colspan="4">TOTAL A+U</td><td class="r">'+fP(Math.round(res.total-res.cd))+'</td></tr>'
      +'<tr><td colspan="4">Costo Directo (C.D.)</td><td class="r">'+fP(res.cd)+'</td></tr>'
      +'<tr class="tr"><td colspan="4">COSTO TOTAL C.D.+C.I.</td><td class="r">'+fP(res.total)+'</td></tr>'
      +exR+'</tfoot></table>'
    });
  }

  // ── 3. POLIZAS OBRA ──────────────────────────────────────────────
  if (hasObra) {
    var polObra=((pActivo.polizasPorComp||{}).obra)||{};
    var plzObra=Number((pActivo.aiu||{}).plazoObra)||Number((pActivo.aiu||{}).plazo)||0;
    secs.push({title:'Polizas Obra', html:
      hdr('Polizas Obra')+'<div class="st">Polizas de Seguros - Obra</div>'
      +polTable(polObra, res.total, plzObra)
    });
  }

  // ── 4. ESTAMPILLAS ───────────────────────────────────────────────
  if (hasObra) {
    var catEst = pActivo.catalogoEstampillasSnap || [];
    var munId = pActivo.municipioId;
    // Get from au.secciones s1_8 items which have the estampillas values
    var estItems = [];
    (au.secciones||[]).forEach(function(sec){
      (sec.subsecciones||[]).forEach(function(sub){
        if(sub.id==='s1_8') estItems = sub.items||[];
      });
    });
    // Try to get from project estampillas directly
    var estActivas = pActivo.estampillasActivas || pActivo.estampillas || [];
    var vc = res.total;
    var estRows='', totEst=0;
    // Use catalogoEstampillas if available from window
    if(window.__catEst && munId) {
      var mg = (window.__catEst||[]).find(function(g){return g.id===munId;});
      if(mg) {
        (mg.items||[]).forEach(function(e) {
          var val=Math.round(vc*(Number(e.pctDef)||0)/100);
          totEst+=val;
          estRows+='<tr><td>'+esc(e.nombre||e.tipo||'')+'</td>'
            +'<td class="c">'+fNN(e.pctDef||0,3)+'%</td>'
            +'<td class="c">'+esc(e.baseCalculo||'C.D.')+'</td>'
            +'<td class="r">'+fP(val)+'</td></tr>';
        });
      }
    }
    if(!estRows) {
      estRows='<tr><td colspan="4" class="c">Estampillas municipales (ver en sistema)</td></tr>';
    } else {
      estRows+='<tr class="tr"><td colspan="3">TOTAL ESTAMPILLAS</td><td class="r">'+fP(totEst)+'</td></tr>';
    }
    secs.push({title:'Estampillas', html:
      hdr('Estampillas')+'<div class="st">Estampillas Municipales</div>'
      +'<table><thead><tr><th>Estampilla</th><th class="c">%</th><th class="c">Base</th><th class="r">Valor</th></tr></thead>'
      +'<tbody>'+estRows+'</tbody></table>'
    });
  }

  // ── 5. PRESUPUESTO INTERVENTORIA ─────────────────────────────────
  if (hasInt) {
    var pi=pActivo.presupInterv||{};
    var fmData=pi.fmData||{prima:8.33,cesantias:8.33,intCesantias:1,vacaciones:4.17,salud:0,pension:12,subsidioFamiliar:4,sena:0,icbf:0,arl:2.436};
    var fmKeys=Object.keys(fmData);
    var fmSum=fmKeys.reduce(function(s,k){return s+(Number(fmData[k])||0);},0);
    var fm=parseFloat((1+fmSum/100).toFixed(4));
    var caps=pi.capitulos||[];
    var piRows='', piTot=0;
    caps.forEach(function(cap) {
      var subT=(cap.items||[]).reduce(function(s,it){
        return s+(cap.tipo==='personal'
          ?(Number(it.valorMesBase)||0)*(Number(it.cantidad)||0)*(Number(it.dedicacion)||1)*(Number(it.meses)||0)
          :(Number(it.cantidad)||0)*(Number(it.valorUnitario)||0)*(Number(it.meses)||1));
      },0);
      var capT=cap.tipo==='personal'?subT*fm:subT;
      piTot+=capT;
      piRows+='<tr class="cr"><td colspan="4">'+esc(cap.titulo||cap.nombre||'')+'</td>'
        +(cap.tipo==='personal'?'<td class="c">FM: '+fNN(fm,4)+'</td>':'<td></td>')
        +'<td class="r b">'+fP(capT)+'</td></tr>';
      (cap.items||[]).forEach(function(it) {
        var itV=cap.tipo==='personal'
          ?(Number(it.valorMesBase)||0)*(Number(it.cantidad)||0)*(Number(it.dedicacion)||1)*(Number(it.meses)||0)*fm
          :(Number(it.cantidad)||0)*(Number(it.valorUnitario)||0)*(Number(it.meses)||1);
        var det=cap.tipo==='personal'
          ?fP(it.valorMesBase)+'/mes x '+fNN(it.cantidad||0,0)+'cant x '+fNN(it.dedicacion||1,2)+'ded x '+(it.meses||0)+'m x FM'
          :fNN(it.cantidad||0,2)+' x '+fP(it.valorUnitario||0)+(it.meses>1?' x '+(it.meses)+'m':'');
        piRows+='<tr><td colspan="3">&nbsp;&nbsp;'+esc(it.descripcion||'')+'</td>'
          +'<td class="dim">'+esc(det)+'</td>'
          +'<td></td>'
          +'<td class="r">'+fP(itV)+'</td></tr>';
      });
    });
    if(!piRows) piRows='<tr><td colspan="6" class="c">Sin datos de interventoria</td></tr>';
    piRows+='<tr class="tr"><td colspan="5">TOTAL PRESUPUESTO INTERVENTORIA</td><td class="r">'+fP(calcTotalPresupInterv(pi))+'</td></tr>';
    secs.push({title:'Presupuesto Interventoria', html:
      hdr('Presupuesto Interventoria')
      +'<div class="st">Presupuesto de Interventoria</div>'
      +'<div class="sstt">Factor Multiplicador: '+fNN(fm,4)+'</div>'
      +'<table><thead><tr><th colspan="3">Item</th><th>Detalle</th><th>Factor</th><th class="r">Total</th></tr></thead>'
      +'<tbody>'+piRows+'</tbody></table>'
    });
  }

  // ── 6. POLIZAS INTERVENTORIA ─────────────────────────────────────
  if (hasInt) {
    var polInt=((pActivo.polizasPorComp||{}).interventoria)||{};
    var tiInt=calcTotalPresupInterv(pActivo.presupInterv);
    var plzInt=Number((pActivo.aiu||{}).plazoInterventor)||0;
    secs.push({title:'Polizas Interventoria', html:
      hdr('Polizas Interventoria')+'<div class="st">Polizas de Seguros - Interventoria</div>'
      +polTable(polInt, tiInt, plzInt)
    });
  }

  // ── 7. POLIZAS EDESO ─────────────────────────────────────────────
  var polEd=((pActivo.polizasPorComp||{}).edeso)||{};
  var plzEd=Number((pActivo.aiu||{}).plazo)||0;
  secs.push({title:'Polizas EDESO', html:
    hdr('Polizas EDESO')+'<div class="st">Polizas de Seguros - EDESO</div>'
    +polTable(polEd, res.total, plzEd)
  });

  // ── 8. FICHA FINANCIERA ──────────────────────────────────────────
  var tiFF=calcTotalPresupInterv(pActivo.presupInterv);
  var R=calcFichaFinanciera(pActivo,res.total,tiFF,0,50);
  var pctHon=ff.pctHonoarios||0.08;
  var ffSummary=[
    ['Costo de Obra (C.D.+C.I.)',R.obraTotal,false],
    ['Interventoria',R.intervTotal,false],
    hasConsult?['Consultoria / Diseno',R.consultTotal||0,false]:null,
    ['Costos Indirectos del Proyecto',R.subtotalIndirecto,false],
    ['SUBTOTAL RECURSOS A ADMINISTRAR',R.totalRecursos,true],
    ['Honorarios A.D.R. ('+(pctHon*100).toFixed(0)+'%)',R.honorarios,false],
    ['IVA 19%',R.iva,false],
    ['TOTAL HONORARIOS',R.honorarios+R.iva,true],
    ['VALOR TOTAL DE RECURSOS A INVERTIR',R.totalContrato,true]
  ].filter(Boolean);
  var ffHTML=ffSummary.map(function(row){
    return '<tr'+(row[2]?' class="tr"':'')+'><td>'+esc(row[0])+'</td><td class="r">'+fP(row[1])+'</td></tr>';
  }).join('');

  // Components detail
  var compDefs=[
    {key:'componentesPersonal',label:'Personal'},
    {key:'componentesSocial',label:'Social'},
    {key:'componentesLogistico',label:'Logistico'},
    {key:'componentesDiseno',label:'Diseno / Consultoria'}
  ];
  var compHTML='';
  compDefs.forEach(function(ct) {
    var items=ff[ct.key]||[];
    if(!items.length) return;
    compHTML+='<tr class="cr"><td colspan="5">'+ct.label+'</td></tr>';
    items.forEach(function(it) {
      var v=it.esValorFijo?(it.valorFijo||0):(it.valorMesBase||0)*(it.cantidad||1)*(it.dedicacion||1)*(it.meses||1);
      var det=it.esValorFijo?'Valor fijo':fP(it.valorMesBase||0)+'/mes x '+(it.cantidad||1)+' x '+fNN(it.dedicacion||1,2)+'ded x '+(it.meses||1)+'m';
      compHTML+='<tr><td>'+esc(it.descripcion||'')+'</td>'
        +'<td class="c">'+esc(it.unidad||'mes')+'</td>'
        +'<td class="r">'+(it.cantidad||1)+'</td>'
        +'<td class="dim">'+esc(det)+'</td>'
        +'<td class="r">'+fP(v)+'</td></tr>';
    });
  });

  secs.push({title:'Ficha Financiera', html:
    hdr('Ficha Financiera')+'<div class="st">Ficha Financiera del Proyecto</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    +'<div><div class="sstt">Resumen Financiero</div>'
    +'<table><thead><tr><th>Concepto</th><th class="r">Valor</th></tr></thead><tbody>'+ffHTML+'</tbody></table></div>'
    +(compHTML?'<div><div class="sstt">Componentes</div>'
    +'<table><thead><tr><th>Descripcion</th><th class="c">Und</th><th class="r">Cant.</th><th>Detalle</th><th class="r">Total</th></tr></thead>'
    +'<tbody>'+compHTML+'</tbody></table></div>':'')
    +'</div>'
  });

  // ── 9. RESUMEN ───────────────────────────────────────────────────
  var rr='';
  presups.forEach(function(ps) {
    var cdPs=Math.round((ps.capitulos||[]).reduce(function(s,cap){
      return s+(cap.items||[]).reduce(function(s2,it){return s2+calcItem(it,apus,recursos,proyecto,ps);},0);
    },0));
    var adm=Math.round(cdPs*res.pctA/100);
    var util=Math.round(cdPs*res.pctU/100);
    rr+='<tr class="cr"><td colspan="3">'+esc(ps.nombre||'Presupuesto Obra')+'</td><td class="r b">'+fP(cdPs)+'</td></tr>';
    (ps.capitulos||[]).forEach(function(cap) {
      var cdC=Math.round((cap.items||[]).reduce(function(s,it){return s+calcItem(it,apus,recursos,proyecto,ps);},0));
      var pct=cdPs>0?(cdC/cdPs*100).toFixed(1):'0.0';
      rr+='<tr><td class="in">'+esc(cap.numero)+'</td><td>'+esc(cap.nombre)+'</td>'
        +'<td class="c">'+pct+'%</td><td class="r">'+fP(cdC)+'</td></tr>';
    });
    rr+='<tr><td colspan="3">Administracion ('+fNN(res.pctA,2)+'%)</td><td class="r">'+fP(adm)+'</td></tr>';
    rr+='<tr><td colspan="3">Utilidad ('+fNN(res.pctU,2)+'%)</td><td class="r">'+fP(util)+'</td></tr>';
    rr+='<tr class="tr"><td colspan="3">COSTO TOTAL C.D.+C.I.</td><td class="r">'+fP(cdPs+adm+util)+'</td></tr>';
    if(extras.sgSst>0) rr+='<tr><td colspan="3">SG-SST</td><td class="r">'+fP(extras.sgSst)+'</td></tr>';
    if(extras.pma>0)   rr+='<tr><td colspan="3">PMA</td><td class="r">'+fP(extras.pma)+'</td></tr>';
    if(extras.pmt>0)   rr+='<tr><td colspan="3">PMT</td><td class="r">'+fP(extras.pmt)+'</td></tr>';
    if(extras.gestionSocial>0) rr+='<tr><td colspan="3">Gestion Social</td><td class="r">'+fP(extras.gestionSocial)+'</td></tr>';
    if(totEx>0) rr+='<tr class="tr"><td colspan="3">COSTOS TOTALES</td><td class="r">'+fP(cdPs+adm+util+totEx)+'</td></tr>';
    rr+='<tr><td colspan="4">&nbsp;</td></tr>';
  });
  secs.push({title:'Resumen', html:
    hdr('Resumen')+'<div class="st">Resumen por Presupuesto</div>'
    +'<table><thead><tr><th>Item</th><th>Capitulo</th><th class="c">% Incid.</th><th class="r">C.D.</th></tr></thead>'
    +'<tbody>'+rr+'</tbody></table>'
  });

  // ── 10. APUs — UNA SECCIÓN POR PRESUPUESTO ───────────────────────
  presups.forEach(function(psA) {
  var apusUsA = getApusUsados(pActivo, apus, recursos, psA);
  if(!apusUsA.length) return;
  var ar='';
  var pctHerr=getPctHerramienta(pActivo, psA);
  apusUsA.forEach(function(apu) {
    var ao=apus.find(function(a){return a.id===apu.id;})||{};
    var ln=(pActivo.apuOverrides&&pActivo.apuOverrides[apu.id])||(ao.lineas||[]);
    var totalLineas=ln.reduce(function(s,l){return s+calcLinea(l,recursos,ln);},0);
    var totalMO=ln.reduce(function(s,l){
      var rec=recursos.find(function(r){return r.id===l.recursoId;});
      if(!rec) return s;
      if(rec.categoria==='mano_obra') return s+calcLinea(l,recursos,ln);
      return s;
    },0);
    var vuCalc=totalLineas+totalMO*pctHerr;
    ar+='<tr class="cr"><td colspan="4">'+esc(apu.codigo)+' &mdash; '+esc(apu.nombre)+'</td>'
      +'<td class="r">'+fP(vuCalc)+' / '+esc(apu.unidad)+'</td></tr>';
    ln.forEach(function(l) {
      var rec=recursos.find(function(r){return r.id===l.recursoId;});
      if(!rec) return;
      var sub=calcLinea(l,recursos,ln);
      var sec_=rec.categoria;
      var qty=sec_==='cantidad'?l.cantidad:l.rendimiento;
      ar+='<tr><td>'+esc(rec.nombre)+'</td>'
        +'<td class="c">'+esc(rec.unidad||'')+'</td>'
        +'<td class="r">'+fNN(l.cantidad||l.rendimiento||0,4)+'</td>'
        +'<td class="r">'+fP(rec.precio)+'</td>'
        +'<td class="r">'+fP(sub)+'</td></tr>';
    });
    if(totalMO>0) ar+='<tr style="background:#FEF9C3"><td colspan="3">Herramienta menor ('+(pctHerr*100).toFixed(1)+'% MO)</td><td></td><td class="r">'+fP(Math.round(totalMO*pctHerr))+'</td></tr>';
    ar+='<tr class="tr"><td colspan="4">V.UNITARIO APU</td><td class="r">'+fP(Math.round(vuCalc))+'</td></tr>';
  });
  var tituloA = presups.length>1 ? ('APUs · '+(psA.nombre||'Obra')) : 'APUs del Proyecto';
  secs.push({title:tituloA+' ('+apusUsA.length+')', html:
    hdr(tituloA)+'<div class="st">Analisis de Precios Unitarios ('+apusUsA.length+') &middot; Herramienta menor '+(pctHerr*100).toFixed(1)+'% M.O.</div>'
    +'<table><thead><tr><th>Recurso</th><th class="c">Und</th><th class="r">Cant./Rend.</th>'
    +'<th class="r">Precio Unit.</th><th class="r">Subtotal</th></tr></thead>'
    +'<tbody>'+ar+'</tbody></table>'
  });
  });

  // ── CSS ──────────────────────────────────────────────────────────
  var css='<style>'
    +'#__pf__{font-family:Arial,sans-serif;font-size:9px;color:#111}'
    +'.pb{page-break-before:always}.pb:first-child{page-break-before:avoid}'
    +'.ph{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #C0392B;padding-bottom:5px;margin-bottom:10px}'
    +'.phl{height:34px;background:#fff;padding:2px 6px;border-radius:4px}'
    +'.phl-txt{font-size:16px;font-weight:700;color:#C0392B}'
    +'.phm{font-size:10px;font-weight:700;flex:1;text-align:center;padding:0 8px}'
    +'.phr{font-size:8px;color:#C0392B;font-weight:700;text-align:right}'
    +'.st{font-size:12px;font-weight:700;color:#C0392B;margin-bottom:6px}'
    +'.sstt{font-size:9px;font-weight:700;color:#374151;margin:6px 0 3px;background:#F3F4F6;padding:3px 6px;border-radius:4px}'
    +'.cover{text-align:center;padding:50px 40px}'
    +'.cover img{height:80px;background:#fff;padding:8px;border-radius:8px;margin:0 auto 20px;display:block}'
    +'.cover h1{font-size:20px;color:#C0392B;margin-bottom:4px}'
    +'.cover h2{font-size:11px;color:#555;margin-bottom:20px;font-weight:400}'
    +'.cover table{margin:0 auto;border-collapse:collapse}'
    +'.cover td{padding:4px 16px;border-bottom:1px solid #eee;font-size:10px}'
    +'.cover td:first-child{font-weight:700;color:#555;text-align:right}'
    +'.xt{width:50%;margin:14px auto;border-collapse:collapse}'
    +'.xt th{background:#1F2937;color:#fff;padding:4px 10px;text-align:left;font-size:9px}'
    +'.xt td{padding:3px 10px;border-bottom:1px solid #eee;font-size:9px}'
    +'table{border-collapse:collapse;width:100%;font-size:8.5px;margin-bottom:6px}'
    +'th,td{padding:2px 4px;border:1px solid #ccc;vertical-align:middle}'
    +'th{background:#1F2937;color:#fff;font-weight:700;text-align:left;font-size:8px}'
    +'.r{text-align:right;white-space:nowrap}.c{text-align:center}'
    +'.cr td{background:#374151;color:#fff;font-weight:700}'
    +'.tr td{background:#C0392B;color:#fff;font-weight:700}'
    +'.in{color:#C0392B;font-weight:700;white-space:nowrap}'
    +'.b{font-weight:700}.dim{color:#777;font-size:7.5px}'
    +'@media print{@page{size:A4 landscape;margin:10mm}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}}'
    +'</style>';

  // ── PORTADA ──────────────────────────────────────────────────────
  var cover='<div class="cover">'
    +(LOGO?'<img src="'+LOGO+'"/>':'<div style="font-size:28px;font-weight:700;color:#C0392B;margin-bottom:14px">EDESO</div>')
    +'<h1>'+esc(pActivo.nombre||'')+'</h1>'
    +'<h2>Presupuesto de Proyecto</h2>'
    +'<table>'
    +'<tr><td>Codigo</td><td>'+esc(pActivo.codigo||'-')+'</td></tr>'
    +'<tr><td>Contratante</td><td>'+esc(pActivo.contratante||'-')+'</td></tr>'
    +'<tr><td>Costo Directo</td><td>'+fP(res.cd)+'</td></tr>'
    +'<tr><td>Total C.D.+C.I.</td><td>'+fP(res.total)+'</td></tr>'
    +(totEx>0?'<tr><td>Costos Totales</td><td>'+fP(res.total+totEx)+'</td></tr>':'')
    +'<tr><td>Fecha</td><td>'+new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'})+'</td></tr>'
    +'</table></div>';

  // ── INDICE ────────────────────────────────────────────────────────
  var ix=secs.map(function(s,i){return '<tr><td class="in">'+(i+1)+'</td><td>'+s.title+'</td></tr>';}).join('');
  var indice='<div class="pb">'+hdr('Indice')+'<div class="st">Indice de Contenido</div>'
    +'<table class="xt"><thead><tr><th class="in">#</th><th>Seccion</th></tr></thead>'
    +'<tbody>'+ix+'</tbody></table></div>';

  // ── ENSAMBLE ──────────────────────────────────────────────────────
  var d=document.createElement('div');
  d.id='__pf__';
  d.innerHTML=css+cover+indice+secs.map(function(s){return '<div class="pb">'+s.html+'</div>';}).join('');
  document.body.appendChild(d);
  document.querySelector('.main-area').style.display='none';
  window.print();
  document.querySelector('.main-area').style.display='';
  d.remove();
};

</script>
</body></html>
