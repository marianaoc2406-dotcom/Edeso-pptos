// ═══════════════════════════════════════════════════════
// OFFLINE SYNC MANAGER
// ═══════════════════════════════════════════════════════
const OFFLINE_QUEUE_KEY = 'edeso_offline_queue';

const offlineQueue = {
  get: () => { try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)||'[]'); } catch(e){ return []; } },
  add: (op) => {
    try {
      const q = offlineQueue.get();
      // Replace existing op for same key (last write wins per key)
      const idx = q.findIndex(x=>x.key===op.key);
      if(idx>=0) q[idx]=op; else q.push(op);
      localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
    } catch(e){ console.warn('Queue add failed:', e); }
  },
  clear: () => { try { localStorage.removeItem(OFFLINE_QUEUE_KEY); } catch(e){} },
  remove: (key) => {
    try {
      const q = offlineQueue.get().filter(x=>x.key!==key);
      localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
    } catch(e){}
  }
};

// Safe Supabase upsert — queues if offline
async function safeUpsert(table, data, queueKey) {
  if(!_sb) return;
  if(!navigator.onLine) {
    offlineQueue.add({ table, data, key: queueKey, ts: Date.now() });
    console.log('Queued offline:', queueKey);
    return;
  }
  const {error} = await _sb.from(table).upsert(data);
  if(error) {
    // Network error — queue it
    if(error.message?.includes('network')||error.message?.includes('fetch')) {
      offlineQueue.add({ table, data, key: queueKey, ts: Date.now() });
    } else {
      console.error('upsert error:', table, error);
    }
  }
}

// Safe Supabase delete — queues if offline  
async function safeDelete(table, filters, queueKey) {
  if(!_sb) return;
  if(!navigator.onLine) {
    offlineQueue.add({ table, filters, isDelete:true, key: queueKey+'_del', ts: Date.now() });
    return;
  }
  let q = _sb.from(table).delete();
  Object.entries(filters).forEach(([k,v])=>{ q = q.eq(k,v); });
  const {error} = await q;
  if(error && (error.message?.includes('network')||error.message?.includes('fetch'))) {
    offlineQueue.add({ table, filters, isDelete:true, key: queueKey+'_del', ts: Date.now() });
  }
}

// Flush queued operations when back online
async function flushOfflineQueue(setSyncMsg) {
  const q = offlineQueue.get();
  if(!q.length) return;
  console.log(`Flushing ${q.length} offline operations...`);
  setSyncMsg && setSyncMsg(`🔄 Sincronizando ${q.length} cambios pendientes...`);
  let success = 0;
  for(const op of q) {
    try {
      if(op.isDelete) {
        let query = _sb.from(op.table).delete();
        Object.entries(op.filters).forEach(([k,v])=>{ query = query.eq(k,v); });
        const {error} = await query;
        if(!error) { offlineQueue.remove(op.key); success++; }
      } else {
        const {error} = await _sb.from(op.table).upsert(op.data);
        if(!error) { offlineQueue.remove(op.key); success++; }
      }
    } catch(e) { console.warn('Flush error:', e); }
  }
  const remaining = offlineQueue.get().length;
  if(remaining===0) {
    setSyncMsg && setSyncMsg('✅ Todo sincronizado');
    setTimeout(()=>setSyncMsg&&setSyncMsg(''), 3000);
  } else {
    setSyncMsg && setSyncMsg(`⚠️ ${remaining} cambios pendientes`);
  }
  console.log(`Flushed ${success}/${q.length} operations`);
}


function App() {
  // ── Auth ──────────────────────────────────────────────
  const [sidebarOpen,setSidebarOpen] = useState(true);
  const [isOnline,setIsOnline]   = useState(navigator.onLine);
  const [usuariosActivos, setUsuariosActivos] = useState([]);
  const [session,setSession]   = useState(null);
  const [perfil,setPerfil]     = useState(null);
  const [dataReady,setDataReady] = useState(false);
  const [syncMsg,setSyncMsg]   = useState("");
  const [modulo,setModulo]     = useState("Proyectos");

  // ── Data states ───────────────────────────────────────
  const [recursos,           setRecursosRaw]            = useState(RECURSOS_INIT);
  const [apus,               setApusRaw]                = useState(APUS_INIT);
  const [plantillasAU,       setPlantillasRaw]          = useState(PLANTILLAS_AU_INIT);
  const [proyectos,          setProyectosRaw]           = useState(PROYECTOS_INIT);
  const [catalogoPolizas,    setCatalogoPolizasRaw]     = useState([]);
  const [catalogoEstampillas,setCatalogoEstampillasRaw] = useState([]);
  const [plantillasInt,      setPlantillasIntRaw]       = useState([]);
  const [subTitle,           setSubTitle]               = useState(null);

  const migrarProyectos = ps=>(ps||[]).map(p=>({...p,au:migrarAU(p.au),capitulos:p.capitulos||[]}));

  // ── Load data from Supabase ───────────────────────────
  const cargarDatos = async () => {
    const {data,error} = await _sb.from("app_data").select("key,value");
    if(error){console.error("Load error:",error);setDataReady(true);return;}
    // First pass: global keys
    let proyBase = [];
    (data||[]).forEach(row=>{
      if(row.key==="recursos")            setRecursosRaw(row.value||[]);
      if(row.key==="apus")                setApusRaw(row.value||[]);
      if(row.key==="plantillas")          setPlantillasRaw(row.value||PLANTILLAS_AU_INIT);
      if(row.key==="proyectos")           { proyBase=migrarProyectos(row.value||[]); }
      if(row.key==="catalogoPolizas")     setCatalogoPolizasRaw(row.value||[]);
      if(row.key==="catalogoEstampillas") setCatalogoEstampillasRaw(row.value||[]);
      if(row.key==="plantillasInt")       setPlantillasIntRaw(row.value||[]);
    });
    // Second pass: merge psec_* sections into projects
    const SEC_FIELD={caps:"capitulos",au:"au",pol:"polizasPorComp",
      est:"estampillas",interv:"presupInterv",consult:"presupConsult"};
    const secciones = (data||[]).filter(r=>r.key.startsWith("psec_"));
    secciones.forEach(row=>{
      const rest=row.key.slice(5);
      const lastU=rest.lastIndexOf("_");
      const proyId=rest.slice(0,lastU), sec=rest.slice(lastU+1);
      const idx=proyBase.findIndex(p=>String(p.id)===String(proyId));
      if(idx===-1) return;
      if(sec==="meta") proyBase[idx]={...proyBase[idx],...(row.value||{})};
      else { const f=SEC_FIELD[sec]; if(f) proyBase[idx]={...proyBase[idx],[f]:row.value??proyBase[idx][f]}; }
    });
    setProyectosRaw(proyBase);
    setDataReady(true);
  };

  const cargarPerfil = async uid => {
    const {data} = await _sb.from("profiles").select("*").eq("id",uid).single();
    if(data) setPerfil(data);
  };

  // ── Real-time subscription ────────────────────────────
  // Sección-level save: guarda solo la parte del proyecto que cambió
  const guardarSeccion = (proyectoId, seccion, data) => {
    const key = `psec_${proyectoId}_${seccion}`;
    _sb.from("app_data").upsert({
      key, value: data,
      updated_at: new Date().toISOString(),
      updated_by: session?.user?.id,
      updated_by_email: session?.user?.email,
      updated_by_name: perfil?.nombre || session?.user?.email,
    }).then(({error})=>{ if(error) console.error("SecSave:",key,error); });
    // Audit
    if(session){
      const labels = {caps:"Presupuesto",au:"Cálculo A+U",pol:"Pólizas",
        est:"Estampillas",interv:"Presup.Interventoría",consult:"Presup.Consultoría",meta:"Datos generales"};
      _sb.from("audit_log").insert({
        user_id:session.user.id, user_email:session.user.email,
        user_nombre:perfil?.nombre||session.user.email,
        modulo:"Proyectos", accion:`Guardó ${labels[seccion]||seccion} del proyecto`,
      }).catch(()=>{});
    }
  };

  const SEC_FIELD = {caps:"capitulos",au:"au",pol:"polizasPorComp",
    est:"estampillas",interv:"presupInterv",consult:"presupConsult"};
  const SEC_LABEL = {caps:"el presupuesto",au:"el A+U",pol:"pólizas",
    est:"estampillas",interv:"presup. interventoría",consult:"presup. consultoría",meta:"datos generales"};

  const setupRealtime = sess => {
    const myEmail = sess?.user?.email;
    const ch = _sb.channel("edeso_sync")
      .on("postgres_changes",{event:"*",schema:"public",table:"app_data"},
        payload=>{
          const{key,value,updated_by_email,updated_by_name}=payload.new;
          if(updated_by_email===myEmail) return;
          const nombre = updated_by_name||updated_by_email||"alguien";

          // ── Sección de proyecto (psec_ID_SECCION) ──
          if(key.startsWith("psec_")){
            const rest = key.slice(5); // ID_SECCION
            const lastUnderscore = rest.lastIndexOf("_");
            const proyId = rest.slice(0, lastUnderscore);
            const sec    = rest.slice(lastUnderscore+1);
            const label  = SEC_LABEL[sec]||sec;
            setSyncMsg(`${nombre} actualizó ${label}`);
            setTimeout(()=>setSyncMsg(""),5000);
            setProyectosRaw(prev=>prev.map(p=>{
              if(String(p.id)!==String(proyId)) return p;
              if(sec==="meta") return {...p,...(value||{})};
              const field=SEC_FIELD[sec];
              return field?{...p,[field]:value??p[field]}:p;
            }));
            // notify ModuloProyectos to merge into pActivo if open
            window.__edeso_seccion_externa__ && window.__edeso_seccion_externa__(proyId, sec, value);
            return;
          }

          // ── Datos globales ──
          setSyncMsg(`${nombre} actualizó ${key}`);
          setTimeout(()=>setSyncMsg(""),5000);
          if(key==="recursos")            setRecursosRaw(value||[]);
          if(key==="apus")                setApusRaw(value||[]);
          if(key==="plantillas")          setPlantillasRaw(value||PLANTILLAS_AU_INIT);
          if(key==="proyectos")           setProyectosRaw(migrarProyectos(value||[]));
          if(key==="catalogoPolizas")     setCatalogoPolizasRaw(value||[]);
          if(key==="catalogoEstampillas") setCatalogoEstampillasRaw(value||[]);
          if(key==="plantillasInt")       setPlantillasIntRaw(value||[]);
        }
      ).subscribe();
    return ch;
  };

  // Online/offline detection + flush queue on reconnect
  useEffect(()=>{
    const handleOnline = () => {
      setIsOnline(true);
      if(_sb) flushOfflineQueue(setSyncMsg);
    };
    const handleOffline = () => {
      setIsOnline(false);
      setSyncMsg('📴 Sin conexión — los cambios se guardarán al reconectarse');
    };
    window.addEventListener('online',  handleOnline);
    window.addEventListener('offline', handleOffline);
    // Flush any pending ops on mount (in case page was reloaded while offline)
    if(navigator.onLine && _sb) {
      const q = offlineQueue.get();
      if(q.length > 0) flushOfflineQueue(setSyncMsg);
    }
    return()=>{ window.removeEventListener('online',handleOnline); window.removeEventListener('offline',handleOffline); };
  },[]);

  useEffect(()=>{
    if(!_sb){console.warn("Supabase no configurado");return;}
    let rtChannel = null;
    _sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session){
        cargarDatos();
        cargarPerfil(session.user.id);
        rtChannel = setupRealtime(session);
      }
    });
    // Presencia — quién está conectado
    const presenceSetup = (sess) => {
      if(!sess) return;
      const roomCh = _sb.channel("presence_room", {config:{presence:{key:sess.user.id}}});
      roomCh
        .on("presence",{event:"sync"},()=>{
          const state = roomCh.presenceState();
          const activos = Object.values(state).flat().map(u=>u);
          setUsuariosActivos(activos);
        })
        .subscribe(async(status)=>{
          if(status==="SUBSCRIBED"){
            await roomCh.track({
              user_id: sess.user.id,
              user_email: sess.user.email,
              user_nombre: perfil?.nombre||sess.user.email,
              online_at: new Date().toISOString()
            });
          }
        });
      return roomCh;
    };
    let presenceCh = null;
    _sb.auth.getSession().then(({data:{session}})=>{
      if(session) presenceCh = presenceSetup(session);
    });

    const{data:{subscription}}=_sb.auth.onAuthStateChange(async(event,session)=>{
      setSession(session);
      if(session){
        if(!dataReady) cargarDatos();
        cargarPerfil(session.user.id);
        if(!rtChannel) rtChannel=setupRealtime(session);
      } else {
        setDataReady(false);setPerfil(null);
      }
    });
    return()=>{
      subscription.unsubscribe();
      if(rtChannel) _sb.removeChannel(rtChannel);
    };
  },[]);

  // ── Supabase save + audit ─────────────────────────────
  const guardar = (key,data,modLabel,accion) => {
    safeUpsert("app_data", {
      key, value:data,
      updated_at:new Date().toISOString(),
      updated_by:session?.user?.id,
      updated_by_email:session?.user?.email,
      updated_by_name:perfil?.nombre||session?.user?.email,
    }, "appdata_"+key);
    if(session&&accion){
      _sb.from("audit_log").insert({
        user_id:session.user.id,
        user_email:session.user.email,
        user_nombre:perfil?.nombre||session.user.email,
        modulo:modLabel, accion,
      }).then(({error})=>{if(error)console.error("Audit:",error);});
    }
  };

  // ── Setters con auto-save ─────────────────────────────
  const setRecursos = v=>{
    const d=typeof v==="function"?v(recursos):v;
    const a=inferirAccion("Recursos",recursos,d);
    setRecursosRaw(d); guardar("recursos",d,"Recursos",a);
  };
  const setApus = v=>{
    const d=typeof v==="function"?v(apus):v;
    const a=inferirAccion("APUs",apus,d);
    setApusRaw(d); guardar("apus",d,"APUs",a);
  };
  const setPlantillasAU = v=>{
    const d=typeof v==="function"?v(plantillasAU):v;
    setPlantillasRaw(d); guardar("plantillas",d,"Plantillas AU","Actualizó Plantillas AU");
  };
  const setProyectos = v=>{
    const d=typeof v==="function"?v(proyectos):v;
    const a=inferirAccion("Proyectos",proyectos,d);
    setProyectosRaw(d); guardar("proyectos",d,"Proyectos",a);
  };
  const setCatalogoPolizas = v=>{
    const d=typeof v==="function"?v(catalogoPolizas):v;
    const a=inferirAccion("Catálogo Pólizas",catalogoPolizas,d);
    setCatalogoPolizasRaw(d); guardar("catalogoPolizas",d,"Catálogo Pólizas",a);
  };
  const setCatalogoEstampillas = v=>{
    const d=typeof v==="function"?v(catalogoEstampillas):v;
    const a=inferirAccion("Catálogo Estampillas",catalogoEstampillas,d);
    setCatalogoEstampillasRaw(d); guardar("catalogoEstampillas",d,"Catálogo Estampillas",a);
  };
  const setPlantillasInt = v=>{
    const d=typeof v==="function"?v(plantillasInt):v;
    const a=inferirAccion("Plantillas Interv.",plantillasInt,d);
    setPlantillasIntRaw(d); guardar("plantillasInt",d,"Plantillas Interv.",a);
  };

  const onLogout = () => _sb.auth.signOut();

  const counts={
    recursos:recursos.length, apus:apus.length, proyectos:proyectos.length,
    polizas:catalogoPolizas.length, estampillas:catalogoEstampillas.length,
    plantillasInt:(plantillasInt||[]).length
  };

  const onExportar=()=>{
    const b={version:1,fecha:new Date().toISOString(),recursos,apus,plantillasAU,proyectos,
             catalogoPolizas,catalogoEstampillas,plantillasInt};
    const url=URL.createObjectURL(new Blob([JSON.stringify(b,null,2)],{type:"application/json"}));
    const a=document.createElement("a");a.href=url;
    a.download=`edeso_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  };
  const onImportar=e=>{

        if(!b.recursos||!b.apus){alert("Archivo de backup inválido");return;}
        if(!window.confirm(`¿Cargar backup del ${(b.fecha||"").slice(0,10)}?\n\nEsto reemplazará TODOS los datos.\n\nRecursos: ${(b.recursos||[]).length} · APUs: ${(b.apus||[]).length} · Proyectos: ${(b.proyectos||[]).length}`))return;

        if(b.catalogoEstampillas)setCatalogoEstampillas(b.catalogoEstampillas);
        if(b.plantillasInt)setPlantillasInt(b.plantillasInt);
        alert("✓ Backup cargado correctamente");
      }catch(err){alert("Error leyendo el archivo.");}
    };
    reader.readAsText(file);
  };

    if(!window.confirm(`¿Eliminar TODOS los recursos (${recursos.length})?\n\nEsta acción no se puede deshacer.`))return;

  };
  const onLimpiarApus=()=>{
    if(!window.confirm(`¿Eliminar TODOS los APUs (${apus.length})?\n\nEsta acción no se puede deshacer.`))return;
    setApus([]);
  };

  // ── Gates ─────────────────────────────────────────────

    React.createElement("h2",null,"⚠️ Supabase no configurado"),
    React.createElement("p",{style:{color:"#6B7280",marginTop:12}},
      "Edita el archivo HTML y reemplaza SUPABASE_URL y SUPABASE_KEY con los datos de tu proyecto.")
  );
  if(!session) return React.createElement(LoginScreen);
  if(!dataReady) return React.createElement(LoadingScreen);

  // ── Render ────────────────────────────────────────────
  return React.createElement("div",{className:"app-shell"},
    React.createElement("style",null,CSS),
    !sidebarOpen&&React.createElement("button",{
      style:{position:"fixed",top:14,left:14,zIndex:200,

             color:"#C9D1D9",fontSize:18,display:"flex",
             alignItems:"center",justifyContent:"center"},
      onClick:()=>setSidebarOpen(true),title:"Abrir menú"

    React.createElement(Sidebar,{
      modulo,setModulo:m=>{setModulo(m);setSubTitle(null);},
      counts,onExportar,onImportar,onLimpiarRecursos,onLimpiarApus,
      perfil,onLogout,sidebarOpen,setSidebarOpen,usuariosActivos
    }),
    React.createElement("div",{className:"main-area",style:{marginLeft:sidebarOpen?232:0,transition:"margin-left .25s"}},
      React.createElement(Topbar,{modulo,sub:subTitle}),
      !isOnline&&React.createElement("div",{style:{
        position:"fixed",top:0,left:0,right:0,zIndex:1000,
        background:"#F59E0B",color:"#fff",
        padding:"8px 16px",textAlign:"center",
        fontSize:13,fontWeight:600,fontFamily:"var(--sans)"
      }},"📴 Sin conexión a internet — los cambios se guardarán localmente y se sincronizarán al reconectarse"),
      syncMsg&&React.createElement("div",{style:{
        position:"fixed",bottom:24,right:24,zIndex:999,
        background:"#0D1117",border:"1px solid #21262D",
        borderRadius:10,padding:"12px 18px",
        display:"flex",alignItems:"center",gap:10,boxShadow:"0 8px 32px rgba(0,0,0,.4)"
      }},
        React.createElement("span",{style:{fontSize:18}},"🔄"),
        React.createElement("span",{style:{color:"#C9D1D9",fontSize:13}},syncMsg)
      ),
      modulo==="Recursos"&&React.createElement(ModuloRecursos,{recursos,setRecursos}),
      modulo==="APUs"&&React.createElement(ModuloAPUs,{recursos,apus,setApus}),
      modulo==="Plantillas AU"&&React.createElement(ModuloPlantillasAU,{plantillas:plantillasAU,setPlantillas:setPlantillasAU}),
      modulo==="Catálogo Pólizas"&&React.createElement(ModuloCatalogoPolizas,{catalogoPolizas,setCatalogoPolizas}),
      modulo==="Catálogo Estampillas"&&React.createElement(ModuloCatalogoEstampillas,{catalogoEstampillas,setCatalogoEstampillas}),
      modulo==="Plantillas Interv."&&React.createElement(ModuloPlantillasInterventoria,{plantillasInt,setPlantillasInt}),
      modulo==="Proyectos"&&React.createElement(ModuloProyectos,{
        recursos,apus,plantillasAU,proyectos,setProyectos,
        catalogoPolizas,catalogoEstampillas,plantillasInt,
