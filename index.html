  @media print {
    .sidebar, .topbar, .no-print { display: none !important; }
    .main-area { margin-left: 0 !important; }

function TabPresupuestoInterventoria({ proyecto, setPActivo, readOnly, plantillasInt, storageKey, perfil, session }) {
  const SK = storageKey || "presupInterv";
  const defaultData = () => ({
    fm: 2,
    capitulos: [
      { id: "pic_1", numero: 1, titulo: "Personal Profesional, Técnico y Administrativo", tipo: "personal", items: [] },
      { id: "pic_2", numero: 2, titulo: "Otros Gastos (Se paga a necesidad previa aprobación del supervisor)", tipo: "otros", items: [] }
    ]
  });

  const data = proyecto[SK] && proyecto[SK].capitulos
    ? proyecto[SK]
    : defaultData();

  const setData = (next) => {
    if (readOnly) return;
    setPActivo(p => ({ ...p, [SK]: typeof next === "function" ? next(p[SK] && p[SK].capitulos ? p[SK] : defaultData()) : next }));
  };

  const fm = Number(data.fm) || 2;
  const capitulos = data.capitulos || [];

  const calcItem = (item, tipo) => {
    if (tipo === "personal") {
      return (Number(item.valorMesBase)||0) * (Number(item.cantidad)||0) * (Number(item.dedicacion)||1) * (Number(item.meses)||0);
    }
    return Number(item.valorFijo) || 0;
  };

  const subtotalCap = (cap) => (cap.items||[]).reduce((s,i) => s + calcItem(i, cap.tipo), 0);
  const totalCap = (cap) => cap.tipo === "personal" ? subtotalCap(cap) * fm : subtotalCap(cap);
  const totalGeneral = capitulos.reduce((s, cap) => s + totalCap(cap), 0);

  // State
  const [capEdit,    setCapEdit]    = React.useState(null);  // id del cap editando nombre
  const [modalSec,   setModalSec]   = React.useState(null);  // { capId, editItemId? }
  const [formItem,   setFormItem]   = React.useState({});
  const [showPlant,  setShowPlant]  = React.useState(false); // selector plantillas
  const [busqPlant,  setBusqPlant]  = React.useState("");
  const [delCapConf, setDelCapConf] = React.useState(null);

  const addCapitulo = () => {
    const n = capitulos.length + 1;
    setData(prev => ({
      ...prev,
      capitulos: [...(prev.capitulos||[]), {
        id: "pic_" + Date.now(),
        numero: n,
        titulo: "Nuevo capítulo",
        tipo: "otros",
        items: []
      }]
    }));
  };

  const updCapTitulo = (capId, titulo) => {
    setData(prev => ({ ...prev, capitulos: prev.capitulos.map(c => c.id===capId ? {...c,titulo} : c) }));
  };

  const delCapitulo = (capId) => {
    setData(prev => ({ ...prev, capitulos: prev.capitulos.filter(c => c.id!==capId) }));
    setDelCapConf(null);
  };

  const abrirAgregar = (capId) => {
    if (readOnly) return;
    const cap = capitulos.find(c => c.id === capId);
    const base = cap?.tipo === "personal"
      ? { descripcion:"", unidad:"mes", valorMesBase:0, cantidad:1, dedicacion:1, meses:1 }
      : { descripcion:"", unidad:"gl", valorFijo:0 };
    setFormItem({ ...base, id: Date.now() });
    setModalSec({ capId, editItemId: null });
    setShowPlant(false);
    setBusqPlant("");
  };

  const abrirEditar = (capId, item) => {
    if (readOnly) return;
    setFormItem({ ...item });
    setModalSec({ capId, editItemId: item.id });
    setShowPlant(false);
  };

  const usarPlantilla = (plt) => {
    const cap = capitulos.find(c => c.id === modalSec?.capId);
    const base = cap?.tipo === "personal"
      ? { descripcion: plt.descripcion, unidad: plt.unidad||"mes", valorMesBase: plt.valorMesBase||0, cantidad: plt.cantidad||1, dedicacion: plt.dedicacion||1, meses: 1 }
      : { descripcion: plt.descripcion, unidad: plt.unidad||"gl", valorFijo: plt.valorFijo||0 };
    setFormItem({ ...base, id: Date.now() });
    setShowPlant(false);
  };

  const dbIntervUser=()=>({updated_at:new Date().toISOString(),updated_by:session?.user?.id,updated_by_email:session?.user?.email,updated_by_name:perfil?.nombre||session?.user?.email});
  const dbSaveInterv=(item,capId,tipo)=>{
    if(!proyecto?.id||!session) return;
    safeUpsert("items_interv", {
      id:String(item.id),proyecto_id:String(proyecto.id),
      storage_key:storageKey,capitulo_id:String(capId),
      descripcion:item.descripcion||"",unidad:item.unidad||"",tipo:tipo||"",
      cantidad:Number(item.cantidad)||0,dedicacion:Number(item.dedicacion)||0,
      valor_mes_base:Number(item.valorMesBase)||0,meses:Number(item.meses)||0,
      valor_fijo:Number(item.valorFijo)||0,fm:Number(data.fm)||2,

  };
  const dbDelInterv=(itemId)=>{
    if(!proyecto?.id) return;
    safeDelete("items_interv", {id:String(itemId), proyecto_id:String(proyecto.id)}, "interv_del_"+itemId);
  };

  useEffect(()=>{
    if(!proyecto?.id||!session) return;
    const pid=String(proyecto.id), myEmail=session.user.email;
    const ch=_sb.channel("interv_items_"+pid+"_"+storageKey)
      .on("postgres_changes",{event:"*",schema:"public",table:"items_interv"},p=>{
        if((p.new?.updated_by_email||p.old?.updated_by_email)===myEmail) return;
        const row=p.eventType==="DELETE"?p.old:p.new;
        if(String(row.proyecto_id)!==pid||row.storage_key!==storageKey) return;
        const item={id:row.id,descripcion:row.descripcion,unidad:row.unidad,
          cantidad:Number(row.cantidad),dedicacion:Number(row.dedicacion),
          valorMesBase:Number(row.valor_mes_base),meses:Number(row.meses),valorFijo:Number(row.valor_fijo)};
        setData(prev=>{
          const caps=(prev.capitulos||[]).map(cap=>{
            if(String(cap.id)!==String(row.capitulo_id)) return cap;
            if(p.eventType==="DELETE") return{...cap,items:(cap.items||[]).filter(i=>String(i.id)!==String(row.id))};
            const existe=(cap.items||[]).find(i=>String(i.id)===String(row.id));
            return{...cap,items:existe?(cap.items||[]).map(i=>String(i.id)===String(row.id)?{...i,...item}:i):[...(cap.items||[]),item]};
          });
          return{...prev,capitulos:caps};
        });
      }).subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto?.id,storageKey]);

  const guardarItem = () => {
    if (!(formItem.descripcion||"").trim()) return;
    const cap = data.capitulos.find(c=>c.id===modalSec.capId);
    setData(prev => ({
      ...prev,
      capitulos: prev.capitulos.map(cap => {
        if (cap.id !== modalSec.capId) return cap;
        const items = modalSec.editItemId
          ? cap.items.map(i => i.id === modalSec.editItemId ? formItem : i)
          : [...(cap.items||[]), formItem];
        return { ...cap, items };
      })
    }));
    if(cap) dbSaveInterv(formItem, modalSec.capId, cap.tipo);
    setModalSec(null);
  };

  const eliminarItem = (capId, itemId) => {
    dbDelInterv(itemId);

      ...prev,
      capitulos: prev.capitulos.map(c => c.id!==capId ? c : { ...c, items: c.items.filter(i=>i.id!==itemId) })
    }));

  const plantsFiltradas = (plantillasInt||[]).filter(p =>

          React.createElement("div", { style:{flex:1, fontSize:13, fontWeight:700, color:"#1D4ED8"} }, "Presupuesto Interventoría"),
          React.createElement("div", { style:{display:"flex", gap:20, alignItems:"center"} },
            React.createElement("div", null,
              React.createElement("label", { className:"lbl" }, "Factor Multiplicador (FM)"),
              React.createElement("input", {
                className:"inum", type:"number", min:"1", step:"0.1",
                style:{width:80}, value:data.fm??2, disabled:readOnly,
                onChange:e => setData(prev => ({...prev, fm:parseFloat(e.target.value)||2}))
              })
            ),
            React.createElement("div", { style:{textAlign:"right"} },
              React.createElement("div", { style:{fontSize:11,color:"var(--ink4)"} }, "Total Interventoría"),
              React.createElement("div", { style:{fontFamily:"var(--mono)",fontSize:16,fontWeight:800,color:"#1D4ED8"} }, fmt(totalGeneral))
            )
          )
        )
      )
    ),
    // Tabla
    React.createElement("div", { className:"card", style:{overflow:"hidden"} },
      React.createElement("div", { className:"card-header" },
        React.createElement("span", { style:{fontWeight:600} }, "Capítulos e Ítems"),
        !readOnly && React.createElement("button", { className:"btn-dashed", onClick:addCapitulo }, "+ Agregar capítulo")
      ),

        React.createElement("thead", null,

  // Estado guardado por componente
  const saved = (proyecto.polizasPorComp || {})[cid] || { plazoContractual: 0, polizasActivas: [] };

  // Helpers de estado
  const updateSaved = (patch) => {
    if (readOnly) return;
    const next = { ...saved, ...patch };
    setPolizas(cid, next);

    // Sincronizar total polizas a subseccion 1.8 del AU (solo obra)
    if (cid === "obra" && setAU && proyecto.au) {
      const plazo = Number(next.plazoContractual) || 0;
      const vBase = totalBase || totalProyecto || 0;
      const tot = (next.polizasActivas || []).reduce((s, p) => {
        const pct      = Number(p.pct) || 0;
        const pctPrima = Number(p.pctPrima) || 0;
        const mEx      = Number(p.mesesExtra) || 0;
        const va       = Math.round(vBase * pct / 100);
        const valor    = Math.round(va * pctPrima / 100);
        const dias     = Math.round((plazo + mEx) * 365 / 12);
        const siva     = dias > 0 ? Math.round(valor * dias / 365) : 0;
        return s + Math.round(siva * 1.19);
      }, 0);
      const au = JSON.parse(JSON.stringify(proyecto.au));
      const sec0 = (au.secciones || [])[0];
      const sub = sec0 ? (sec0.subsecciones || []).find(s => s.id === "s1_8") : null;
      if (sub) {
        const existIdx = sub.items.findIndex(i =>
          (i.descripcion || "").toLowerCase().includes("póliza") ||
          (i.descripcion || "").toLowerCase().includes("poliza")
        );
        const nuevoItem = {
          id:          existIdx >= 0 ? sub.items[existIdx].id : ("pol_au_" + Date.now()),
          descripcion: "Pólizas",
          unidad:      "un",
          valorFijo:   tot,
          porcentaje:  null,
          baseCalculo: "cd"
        };
        if (existIdx >= 0) sub.items[existIdx] = nuevoItem;
        else sub.items.push(nuevoItem);
        // Upsert Transacciones Bancarias: (vBase × 0.004) × 0.5
        const totTB = Math.round(vBase * 0.004 * 0.5);
        const tbIdx = sub.items.findIndex(i => (i.descripcion || "").toLowerCase().includes("transacci"));
        const tbItem = { id: tbIdx >= 0 ? sub.items[tbIdx].id : ("tb_au_" + Date.now()), descripcion:"Transacciones Bancarias", unidad:"un", valorFijo:totTB, porcentaje:null, baseCalculo:"cd" };
        if (tbIdx >= 0) sub.items[tbIdx] = tbItem; else sub.items.push(tbItem);
        setAU(au);
      }
    }

// Helper robusto para descargar Excel
function descargarExcel(wb, filename) {
  // Always use Blob method — works in file://, GitHub Pages, and all browsers
  try {
    const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array', cellStyles:true});
    const blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  } catch(e) {
    console.error('Download failed:', e);
    alert('Error al descargar el archivo: ' + e.message);
  }
}

  // ═══════════════════════════════════════════════════════
  // HOJA 3 — CÁLCULO A+U

  const crearHojaAU=()=>{
    const ws={},M=[],NC=6; let r=0;

  const COMP_COLOR = {
    obra:          {bg:C.obraBg,fg:C.obraFg,hbg:C.red,  hfg:C.white},
    interventoria: {bg:C.intBg, fg:C.intFg, hbg:C.bluH, hfg:C.white},

  };
  const COMP_LABEL = {obra:'Obra',interventoria:'Interventoría',consultoria:'Consultoría'};

  const crearHojaPolizas=(cid,totalBase)=>{
    const saved=(proyecto.polizasPorComp||{})[cid]||{plazoContractual:0,polizasActivas:[]};
    const plazo=Number(saved.plazoContractual)||0;
    const polizas=saved.polizasActivas||[];
    const vc=totalBase||0;
    const cc=COMP_COLOR[cid]||COMP_COLOR.obra;
    const lbl=COMP_LABEL[cid]||cid;
    const ws={},M=[],NC=10; let r=0;

    const hdSt=ST.polHdr(cc.hbg,cc.hfg);
    s(ws,r,0,`PÓLIZAS — ${lbl.toUpperCase()}`,hdSt); fillR(ws,r,1,NC,hdSt); mrg(M,r,0,r,NC); r++;
    [['Proyecto:',proyecto.nombre],['Código:',proyecto.codigo],
     ['Plazo contractual:',`${plazo} meses (${Math.round(plazo*365/12)} días)`],
     ['Valor base:','']].forEach(([l,v])=>{
      s(ws,r,0,l,ST.lbl()); s(ws,r,1,v||'',ST.val()); r++;
    });
    // Valor base como número
    n(ws,r-1,1,Math.round(vc),{...L(ST.val()),font:fnt(C.dark,11,true)});
    const vcCell=EC(r-1,1);

    // Cabecera
    ['Póliza','% V. Asegurar','V. Asegurar','% Prima Anual','V. Prima Anual',
     'Plazo (m)','Meses Extra','T. Total (m)','Días Totales','Prima s/IVA','IVA 19%','Prima c/IVA']
      .forEach((h,c)=>s(ws,r,c,h,ST.colHdr())); r++;

    const primaConIVACells=[]; let iRow=0;
    polizas.forEach(pol=>{
      const pct=Number(pol.pct)||0, pctPrima=Number(pol.pctPrima)||0, mEx=Number(pol.mesesExtra)||0;
      const va=Math.round(vc*pct/100);
      const vpr=Math.round(va*pctPrima/100);
      const tt=plazo+mEx, dias=Math.round(tt*365/12);
      const psiva=dias>0?Math.round(vpr*dias/365):0, pciva=Math.round(psiva*1.19);
      const st=iRow%2===0?ST.dataA():ST.dataB();
      s(ws,r,0,pol.nombre,st);
      p(ws,r,1,pct,R(st));
      // Fórmula: V. Asegurar = vcCell * pct/100
      f(ws,r,2,`${vcCell}*${EC(r,1)}/100`,va,R(st));
      p(ws,r,3,pctPrima,R(st));
      // V. Prima = V.Asegurar * pctPrima/100
      f(ws,r,4,`${EC(r,2)}*${EC(r,3)}/100`,vpr,R(st));
      n(ws,r,5,plazo,R(st),'#,##0');
      n(ws,r,6,mEx,R(st),'#,##0');
      // Tiempo total
      f(ws,r,7,`${EC(r,5)}+${EC(r,6)}`,tt,R(st),'#,##0');
      // Días totales
      f(ws,r,8,`ROUND(${EC(r,7)}*365/12,0)`,dias,R(st),'#,##0');
      // Prima antes IVA
      f(ws,r,9,`IF(${EC(r,8)}>0,ROUND(${EC(r,4)}*${EC(r,8)}/365,0),0)`,psiva,R(st));
      // IVA 19%
      f(ws,r,10,`ROUND(${EC(r,9)}*0.19,0)`,Math.round(psiva*0.19),R(st));
      // Prima con IVA
      f(ws,r,11,`${EC(r,9)}+${EC(r,10)}`,pciva,R(st));
      primaConIVACells.push(EC(r,11)); iRow++; r++;
    });
    if(!polizas.length){
      const st=ST.dataA(); s(ws,r,0,'Sin pólizas registradas.',st); fillR(ws,r,1,NC,st); mrg(M,r,0,r,NC); r++;
    }
    // Total
    const totPolVal=polizas.reduce((ss,pol)=>{
      const pct=Number(pol.pct)||0,pctPrima=Number(pol.pctPrima)||0,mEx=Number(pol.mesesExtra)||0;
      const va=Math.round(vc*pct/100),vpr=Math.round(va*pctPrima/100);
      const tt=plazo+mEx,dias=Math.round(tt*365/12);
      const psiva=dias>0?Math.round(vpr*dias/365):0;
      return ss+Math.round(psiva*1.19);
    },0);
    const tSt=ST.polTot(); fillR(ws,r,0,10,tSt);
    s(ws,r,0,'TOTAL PÓLIZAS',L(tSt)); mrg(M,r,0,r,9);
    primaConIVACells.length?f(ws,r,11,`SUM(${EC(r-polizas.length,11)}:${EC(r-1,11)})`,totPolVal,R(tSt)):n(ws,r,11,0,R(tSt));
    r++;
    return fin(ws,r,NC,[{wch:30},{wch:12},{wch:18},{wch:14},{wch:18},{wch:10},{wch:12},{wch:12},{wch:12},{wch:18},{wch:12},{wch:18}],M);
  };

  const crearPresupInterv=(cid,storageKey)=>{
    const lbl=COMP_LABEL[cid]||cid;

    const chapCells=[]; let iRow=0;

      s(ws,r,0,`CAP. ${cap.numero}`,ST.chapHdr()); blk(ws,r,1,ST.chapHdr());
      s(ws,r,2,cap.titulo,ST.chapHdr()); fillR(ws,r,3,NC,ST.chapHdr()); mrg(M,r,2,r,NC); r++;
      if(esP){
        ['Ítem','Descripción','Und','Cant.','Dedicación','V. Mes Base','Meses','Subtotal'].forEach((h,c)=>s(ws,r,c,h,ST.colHdr())); r++;
      } else {
        ['Ítem','Descripción','Und','','','V. Fijo','','Subtotal'].forEach((h,c)=>s(ws,r,c,h,ST.colHdr())); r++;
      }
      const iS=r;
      (cap.items||[]).forEach((item,ii)=>{
        const val=calcIt(item,cap.tipo);
        const st=iRow%2===0?ST.dataA():ST.dataB();

          blk(ws,r,6,st);
          f(ws,r,7,`${EC(r,5)}`,Math.round(val),R(st));

      });

      const sv=ST.subtot(); fillR(ws,r,0,6,sv);
      s(ws,r,1,`Subtotal ${cap.titulo}`,L(sv)); mrg(M,r,0,r,5);
      iS<=iE?f(ws,r,7,`SUM(${EC(iS,7)}:${EC(iE,7)})`,Math.round(sub),R(sv)):n(ws,r,7,0,R(sv));

      if(esP){
        const fmSt={...ST.subtot(),fill:fill(C.amb),font:fnt(C.ambH,10,true)};
        fillR(ws,r,0,6,fmSt); s(ws,r,1,`Subtotal × FM (${fm})`,L(fmSt)); mrg(M,r,0,r,5);
        f(ws,r,7,`${subCell}*${fmCell}`,Math.round(sub*fm),R(fmSt));
        chapCells.push({cell:EC(r,7),val:Math.round(sub*fm)});
      } else {
        chapCells.push({cell:subCell,val:Math.round(sub)});
      }
      r++; r++;
    });
    const totSt=ST.intTot(cc.hbg,cc.hfg); fillR(ws,r,0,6,L(totSt));
    s(ws,r,0,`TOTAL ${lbl.toUpperCase()}`,L(totSt)); mrg(M,r,0,r,5);
    f(ws,r,7,chapCells.map(x=>x.cell).join('+')||'0',Math.round(totalGeneral),R(totSt)); r++;
    return fin(ws,r,NC,[{wch:6},{wch:46},{wch:7},{wch:8},{wch:10},{wch:18},{wch:8},{wch:20}],M);
  };

  // ═══════════════════════════════════════════════════════
  // HOJAS APU (una por APU usado)
  // ═══════════════════════════════════════════════════════
  const APU_SC={material:{bg:C.matBg,fg:C.matFg},mano_obra:{bg:C.moBg,fg:C.moFg},maquinaria:{bg:C.maqBg,fg:C.maqFg},transporte:{bg:C.traBg,fg:C.traFg}};
  const crearHojaAPU=(apu)=>{
    const ws={},M=[],NC=5; let r=0;
    s(ws,r,0,`APU ${apu.codigo}  ·  ${apu.nombre}`,ST.titleDark(12)); fillR(ws,r,1,NC,ST.titleDark(12)); mrg(M,r,0,r,NC); r++;
    s(ws,r,0,'Código:',ST.lbl()); s(ws,r,1,apu.codigo,ST.val());
    s(ws,r,2,'Unidad:',ST.lbl()); s(ws,r,3,apu.unidad,ST.val()); blk(ws,r,4,ST.val()); blk(ws,r,5,ST.val()); r++; r++;
    ['Sección','Recurso','Und.','Cant. / Rend.','P. Unitario','Subtotal'].forEach((h,c)=>s(ws,r,c,h,ST.colHdr())); r++;
    const secTots=[]; let moCell=null,iRow=0;
    SECCIONES_APU.forEach(sec=>{
      const lineas=(apu.lineas||[]).filter(l=>l._sec===sec.id); if(!lineas.length)return;
      const sc=APU_SC[sec.id]||{bg:C.dark3,fg:C.white};
      s(ws,r,0,sec.label.toUpperCase(),ST.apuSecH(sc.bg,C.white)); fillR(ws,r,1,NC,ST.apuSecH(sc.bg,C.white)); mrg(M,r,0,r,NC); r++;
      const sS=r;
      lineas.forEach(l=>{
        const rec=recursos.find(rr=>rr.id===l.recursoId); if(!rec)return;
        const val=sec.usa==='cantidad'?(l.cantidad||0):(l.rendimiento||0),sub=val*(rec.precio||0);
        const st=iRow%2===0?{fill:fill(C.white),font:fnt(C.dark,10),border:box(),alignment:aln()}
                          :{fill:fill(sc.bg),  font:fnt(C.dark,10),border:box(),alignment:aln()};
        s(ws,r,0,sec.label,st); s(ws,r,1,rec.nombre,st); s(ws,r,2,rec.unidad||'',Cn(st));
        n(ws,r,3,val,R(st),'#,##0.0000'); n(ws,r,4,rec.precio||0,R(st));
        f(ws,r,5,`${EC(r,3)}*${EC(r,4)}`,Math.round(sub),R(st)); iRow++; r++;
      });
      const sE=r-1;
      const sVal=lineas.reduce((ss,l)=>{
        const rec=recursos.find(rr=>rr.id===l.recursoId); if(!rec)return ss;
        return ss+(sec.usa==='cantidad'?(l.cantidad||0):(l.rendimiento||0))*(rec.precio||0);
      },0);
      const sSt=ST.apuSubt(sc.bg,sc.fg);
      fillR(ws,r,0,4,sSt); s(ws,r,1,`Subtotal ${sec.label}`,L(sSt));
      sS<=sE?f(ws,r,5,`SUM(${EC(sS,5)}:${EC(sE,5)})`,Math.round(sVal),R(sSt)):n(ws,r,5,0,R(sSt));
      if(sec.id==='mano_obra')moCell=EC(r,5); secTots.push({cell:EC(r,5),val:Math.round(sVal)}); r++; r++;
    });
    const tlVal=secTots.reduce((ss,x)=>ss+x.val,0); const sv=ST.subtot();
    fillR(ws,r,0,4,sv); s(ws,r,1,'Total líneas',L(sv));
    f(ws,r,5,secTots.map(x=>x.cell).join('+')||'0',tlVal,R(sv)); const tlCell=EC(r,5); r++;
    const moTotal=calcTotalMO(apu.lineas,recursos); let prCell=null;
    if(moTotal>0&&moCell){
      const prVal=Math.round(moTotal*0.05);
      const prSt={fill:fill(C.amb),font:fnt(C.ambH,10,true),border:box(C.ambH),alignment:aln('right')};
      fillR(ws,r,0,4,prSt); s(ws,r,1,'Prestaciones sobre M.O. (5%)',L(prSt));
      f(ws,r,5,`${moCell}*0.05`,prVal,R(prSt)); prCell=EC(r,5); r++;
    }
    const vuVal=Math.round(calcAPUTotal(apu,recursos)); const vuSt=ST.apuTot();
    fillR(ws,r,0,4,vuSt); s(ws,r,1,'VALOR UNITARIO APU',L(vuSt)); mrg(M,r,0,r,4);
    prCell?f(ws,r,5,`${tlCell}+${prCell}`,vuVal,R(vuSt)):ws[EC(r,5)]={t:'n',f:tlCell,v:tlVal,s:R(vuSt),z:'#,##0'};
    r++;
    return fin(ws,r,NC,[{wch:22},{wch:46},{wch:7},{wch:14},{wch:16},{wch:18}],M);
  };

  // ═══════════════════════════════════════════════════════
  // ARMAR WORKBOOK según opción
  // ═══════════════════════════════════════════════════════
  const tieneObra2   = comps.includes('obra')||comps.length===0;
  const tieneInterv2 = comps.includes('interventoria');
  const tieneConsult2= comps.includes('consultoria');
  const totObraBase  = calcTotalConvergido(proyecto,apus,recursos);

  const _addResumen    = ()=>XLSX.utils.book_append_sheet(wb,crearResumen(),'Resumen');
  const _addPresup     = ()=>{ if(tieneObra2) XLSX.utils.book_append_sheet(wb,crearPresupuesto(),'Presupuesto Obra'); };
  const _addAU         = ()=>{ if(tieneObra2) XLSX.utils.book_append_sheet(wb,crearHojaAU(),'Cálculo A+U'); };
  const _addPolizas    = ()=>{
    if(tieneObra2)    XLSX.utils.book_append_sheet(wb,crearHojaPolizas('obra',totObraBase),'Pólizas Obra');
    if(tieneInterv2)  { const t=calcTotalPresupInterv(proyecto.presupInterv);  XLSX.utils.book_append_sheet(wb,crearHojaPolizas('interventoria',t),'Pólizas Interventoría'); }
    if(tieneConsult2) { const t=calcTotalPresupInterv(proyecto.presupConsult); XLSX.utils.book_append_sheet(wb,crearHojaPolizas('consultoria',t),'Pólizas Consultoría'); }
  };
  const _addEst        = ()=>{ if(tieneObra2) XLSX.utils.book_append_sheet(wb,crearHojaEstampillas(totObraBase),'Estampillas'); };
  const _addInterv     = ()=>{
    if(tieneInterv2)  XLSX.utils.book_append_sheet(wb,crearPresupInterv('interventoria','presupInterv'),'Presup. Interventoría');
    if(tieneConsult2) XLSX.utils.book_append_sheet(wb,crearPresupInterv('consultoria','presupConsult'),'Presup. Consultoría');
  };
  const _addAPUs       = ()=>{ if(apusUsados.length) XLSX.utils.book_append_sheet(wb,crearHojaAPUsConsolidada(),'APUs Proyectos'); };

  if(opcion==='todo')           { _addResumen();_addPresup();_addAU();_addPolizas();_addEst();_addInterv();_addAPUs(); }
  else if(opcion==='presupuesto'){ _addResumen();_addPresup(); }
  else if(opcion==='au')         { _addAU(); }
  else if(opcion==='polizas')    { _addPolizas(); }
  else if(opcion==='estampillas'){ _addEst(); }
  else if(opcion==='interventoria'){ _addInterv(); }
  else if(opcion==='consultoria'){ if(tieneConsult2) XLSX.utils.book_append_sheet(wb,crearPresupInterv('consultoria','presupConsult'),'Presup. Consultoría'); }
  else if(opcion==='apus')       { _addAPUs(); }
  else                           { _addResumen();_addPresup();_addAU();_addPolizas();_addEst();_addInterv();_addAPUs(); }

  // Hoja consolidada de APUs (todos en una sola hoja)
  const crearHojaAPUsConsolidada = () => {
    const ws={},M=[],NC=5; let r=0;
    s(ws,r,0,'APUs USADOS — DESGLOSE COMPLETO',ST.titleDark(13));
    fillR(ws,r,1,NC,ST.titleDark(13)); mrg(M,r,0,r,NC); r++;
    s(ws,r,0,`Proyecto: ${proyecto.nombre}`,ST.lbl()); fillR(ws,r,1,NC,ST.val()); mrg(M,r,0,r,NC); r++; r++;

    apusUsados.forEach((apu,ai)=>{
      // Header APU
      const hdSt={fill:fill(C.dark2),font:fnt(C.white,11,true),border:box(C.dark),alignment:aln()};
      s(ws,r,0,`${apu.codigo}`,hdSt);
      s(ws,r,1,apu.nombre,{...hdSt,alignment:aln()});
      fillR(ws,r,2,4,hdSt);
      s(ws,r,3,`Unidad: ${apu.unidad}`,{...hdSt,alignment:aln('right')});
      s(ws,r,4,`Valor: ${fmt(apu.valorUnitario)} / ${apu.unidad}`,{...hdSt,alignment:aln('right')});
      mrg(M,r,1,r,2); r++;

      // Column headers
      ['Sección','Recurso','Und.','Cant./Rend.','P. Unitario','Subtotal'].forEach((h,c)=>s(ws,r,c,h,ST.colHdr())); r++;

      const apuObj=apus.find(x=>x.id===apu.id)||{lineas:[]};
      const secTots=[]; let moCell=null; let iRow=0;

      SECCIONES_APU.forEach(sec=>{
        const ls=(apuObj.lineas||[]).filter(l=>{const rec=recursos.find(x=>x.id===l.recursoId);return rec&&rec.categoria===sec.id;});
        if(!ls.length) return;
        const sc=APU_SC[sec.id]||{bg:C.dark3,fg:C.white};
        s(ws,r,0,sec.label.toUpperCase(),ST.apuSecH(sc.bg,C.white));
        fillR(ws,r,1,NC,ST.apuSecH(sc.bg,C.white)); mrg(M,r,0,r,NC); r++;
        const sS=r;
        ls.forEach(l=>{
          const rec=recursos.find(x=>x.id===l.recursoId); if(!rec) return;
          const val=sec.usa==="cantidad"?(l.cantidad||0):(l.rendimiento||0),sub=val*(rec.precio||0);
          const stD=iRow%2===0?{fill:fill(C.white),font:fnt(C.dark,10),border:box(),alignment:aln()}:{fill:fill(sc.bg),font:fnt(C.dark,10),border:box(),alignment:aln()};
          s(ws,r,0,sec.label,stD); s(ws,r,1,rec.nombre,stD); s(ws,r,2,rec.unidad||'',Cn(stD));
          n(ws,r,3,val,R(stD),'#,##0.0000'); n(ws,r,4,rec.precio||0,R(stD));
          f(ws,r,5,`${EC(r,3)}*${EC(r,4)}`,Math.round(sub),R(stD)); iRow++; r++;
        });
        const sE=r-1;
        const sVal=ls.reduce((ss,l)=>{const rec=recursos.find(x=>x.id===l.recursoId);if(!rec)return ss;return ss+(sec.usa==="cantidad"?(l.cantidad||0):(l.rendimiento||0))*(rec.precio||0);},0);
        const sSt=ST.apuSubt(sc.bg,sc.fg);
        fillR(ws,r,0,4,sSt); s(ws,r,1,`Subtotal ${sec.label}`,L(sSt));
        sS<=sE?f(ws,r,5,`SUM(${EC(sS,5)}:${EC(sE,5)})`,Math.round(sVal),R(sSt)):n(ws,r,5,0,R(sSt));
        if(sec.id==='mano_obra') moCell=EC(r,5);
        secTots.push({cell:EC(r,5),val:Math.round(sVal)}); r++; r++;
      });

      const tlVal=secTots.reduce((ss,x)=>ss+x.val,0); const sv=ST.subtot();
      fillR(ws,r,0,4,sv); s(ws,r,1,'Total líneas',L(sv));
      f(ws,r,5,secTots.map(x=>x.cell).join('+')||'0',tlVal,R(sv)); const tlCell=EC(r,5); r++;
      const moTotal=calcTotalMO(apuObj.lineas,recursos); let prCell=null;
      if(moTotal>0&&moCell){
        const prVal=Math.round(moTotal*0.05);
        const prSt={fill:fill(C.amb),font:fnt(C.ambH,10,true),border:box(C.ambH),alignment:aln('right')};
        fillR(ws,r,0,4,prSt); s(ws,r,1,'Prestaciones sobre M.O. (5%)',L(prSt));
        f(ws,r,5,`${moCell}*0.05`,prVal,R(prSt)); prCell=EC(r,5); r++;
      }
      const vuVal=Math.round(calcAPUTotal(apu,recursos)); const vuSt=ST.apuTot();
      fillR(ws,r,0,4,vuSt); s(ws,r,1,'VALOR UNITARIO APU',L(vuSt)); mrg(M,r,0,r,4);
      if(prCell) f(ws,r,5,`${tlCell}+${prCell}`,vuVal,R(vuSt));
      else ws[EC(r,5)]={t:'n',f:tlCell,v:tlVal,s:R(vuSt),z:'#,##0'};
      r++; r++; // Space between APUs
    });

    return fin(ws,r,NC,[{wch:22},{wch:46},{wch:7},{wch:14},{wch:16},{wch:18}],M);
  };

  // ── Descargar ──────────────────────────────────────────
  const fname=`EDESO_${(proyecto.codigo||'proyecto').replace(/[\/\\:*?"<>|]/g,'_')}.xlsx`;
  descargarExcel(wb, fname);
}



// ── Panel Observaciones del Proyecto (drawer lateral con hilos) ──────────
const TAB_LABELS_MAP = {
  presupuesto_obra:"Presupuesto Obra",
  polizas_obra:"Pólizas Obra", polizas_interventoria:"Pólizas Interventoría",
  polizas_consultoria:"Pólizas Consultoría", estampillas:"Estampillas",
  calculo_au:"Cálculo A+U", apus_usados:"APUs Proyectos",
  presupInterv_:"Presup. Interventoría", presupConsult_:"Presup. Consultoría",
};
function tabLabelFromId(cid) {
  if(!cid) return "General";
  for(const [k,v] of Object.entries(TAB_LABELS_MAP)) if(cid.startsWith(k)) return v;
  if(cid.startsWith("apu_")) return "APU · "+cid.slice(4);
  if(cid.startsWith("au_"))  return "A+U · "+cid.slice(3);
  return cid;
}

function PanelObsProyecto({proyecto, perfil, session, onClose}) {
  const [obs,    setObs]    = useState([]);
  const [busy,   setBusy]   = useState(true);
  const [texto,  setTexto]  = useState("");
  const [replyTo,setReplyTo]= useState(null); // obs object being replied to
  const [tab,    setTab]    = useState("todas");

  const panelCargarRef = React.useRef(null);
  panelCargarRef.current = () => {
    _sb.from("observaciones").select("*")
      .eq("proyecto_id", proyecto.id)
      .is("parent_id", null)
      .order("created_at", {ascending:false})
      .then(({data:roots})=>{
        if(!roots?.length){ setObs([]); setBusy(false); return; }
        _sb.from("observaciones").select("*")
          .eq("proyecto_id", proyecto.id)
          .not("parent_id","is",null)
          .order("created_at",{ascending:true})
          .then(({data:replies})=>{
            const replyMap = {};
            (replies||[]).forEach(r=>{ (replyMap[r.parent_id]=replyMap[r.parent_id]||[]).push(r); });
            setObs(roots.map(r=>({...r, replies: replyMap[r.id]||[]})));
            setBusy(false);
          });
      });
  };

  useEffect(()=>{
    panelCargarRef.current();
    const ch = _sb.channel("obs_proj_"+proyecto.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"observaciones"},
        ()=>panelCargarRef.current())
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto.id]);

  const cargar = ()=>panelCargarRef.current();

  const enviar = async() => {
    if(!texto.trim()) return;
    const nueva = {
      proyecto_id:  proyecto.id,
      capitulo_id:  replyTo ? replyTo.capitulo_id : "general",
      item_index:   replyTo ? replyTo.item_index  : 0,
      tab_label:    replyTo ? replyTo.tab_label   : "General",
      linea_desc:   replyTo ? replyTo.linea_desc  : "",
      parent_id:    replyTo ? replyTo.id          : null,
      texto:        texto.trim(),
      user_id:      session?.user?.id,
      user_email:   session?.user?.email,
      user_nombre:  perfil?.nombre || session?.user?.email,
    };
    await _sb.from("observaciones").insert(nueva);
    setTexto(""); setReplyTo(null); cargar();
  };

  const fmtF = iso => {
    const d = new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})
           +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const tabs = ["todas", ...new Set(obs.map(o=>o.capitulo_id||"general").filter(Boolean))];
  const filtered = tab==="todas" ? obs : obs.filter(o=>(o.capitulo_id||"general")===tab);

  const bubbleStyle = (isMe, depth=0) => ({
    background: isMe?"#EFF6FF":"#F9FAFB",
    border:`1px solid ${isMe?"#BFDBFE":"#E5E7EB"}`,
    borderRadius:10, padding:"12px 14px",
    marginLeft: depth*20,
  });

  return React.createElement("div",{style:{
    position:"fixed",top:0,right:0,bottom:0,width:480,maxWidth:"95vw",
    background:"#fff",boxShadow:"-4px 0 32px rgba(0,0,0,.18)",
    zIndex:500,display:"flex",flexDirection:"column",fontFamily:"var(--sans)"
  }},
    // Header
    React.createElement("div",{style:{
      padding:"18px 20px",borderBottom:"1px solid #E5E7EB",
      display:"flex",alignItems:"center",justifyContent:"space-between",
      background:"#111827"
    }},
      React.createElement("div",null,
        React.createElement("div",{style:{color:"#fff",fontWeight:700,fontSize:16}},"💬 Observaciones"),
        React.createElement("div",{style:{color:"#9CA3AF",fontSize:12,marginTop:2}},proyecto.nombre)
      ),
      React.createElement("button",{onClick:onClose,style:{
        background:"none",border:"none",color:"#9CA3AF",fontSize:22,cursor:"pointer",padding:"2px 6px"
      }},"×")
    ),
    // Tab filter
    React.createElement("div",{style:{
      display:"flex",gap:0,overflowX:"auto",borderBottom:"1px solid #E5E7EB",
      background:"#F9FAFB",flexShrink:0
    }},
      tabs.map(t=>React.createElement("button",{
        key:t, onClick:()=>setTab(t),
        style:{
          padding:"8px 14px",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
          whiteSpace:"nowrap",
          background:tab===t?"#fff":"transparent",
          color:tab===t?"#B91C1C":"#6B7280",
          borderBottom:tab===t?"2px solid #B91C1C":"2px solid transparent",
        }
      }, t==="todas"?"Todas":tabLabelFromId(t)))
    ),
    // Lista obs
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:14}},
      busy
      ?React.createElement("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF"}},"Cargando...")
      :filtered.length===0
        ?React.createElement("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF"}},
            React.createElement("div",{style:{fontSize:32,marginBottom:8}},"💬"),
            "Sin observaciones aún")
        :filtered.map(o=>React.createElement("div",{key:o.id},
            // Root obs
            React.createElement("div",{style:bubbleStyle(o.user_id===session?.user?.id)},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}},
                React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
                  React.createElement("span",{style:{fontWeight:700,fontSize:13,color:"#111827"}},
                    o.user_nombre||o.user_email||"—"),
                  o.capitulo_id&&o.capitulo_id!=="general"&&React.createElement("span",{style:{
                    background:"#F3F4F6",color:"#6B7280",borderRadius:4,padding:"1px 8px",fontSize:10,fontWeight:600
                  }},tabLabelFromId(o.capitulo_id)),
                  o.linea_desc&&React.createElement("span",{style:{color:"#9CA3AF",fontSize:10}},o.linea_desc)
                ),
                React.createElement("span",{style:{fontSize:10,color:"#9CA3AF",flexShrink:0}},fmtF(o.created_at))
              ),
              React.createElement("div",{style:{fontSize:14,color:"#111827",lineHeight:1.6}},o.texto),
              React.createElement("button",{
                onClick:()=>setReplyTo(replyTo?.id===o.id?null:o),
                style:{
                  marginTop:8,background:"none",border:"none",
                  color:"#6B7280",fontSize:11,cursor:"pointer",padding:0,
                  fontWeight:600,display:"flex",alignItems:"center",gap:4
                }
              },(o.replies||[]).length>0?`↩ Responder · ${(o.replies||[]).length} respuesta${(o.replies||[]).length>1?"s":""}`:"↩ Responder")
            ),
            // Replies
            (o.replies||[]).length>0&&React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8,marginTop:8}},
              (o.replies||[]).map(r=>React.createElement("div",{key:r.id,style:bubbleStyle(r.user_id===session?.user?.id,1)},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:4}},
                  React.createElement("span",{style:{fontWeight:700,fontSize:12,color:"#374151"}},r.user_nombre||r.user_email||"—"),
                  React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},fmtF(r.created_at))
                ),
                React.createElement("div",{style:{fontSize:13,color:"#374151",lineHeight:1.5}},r.texto)
              ))
            ),
            // Reply input open
            replyTo?.id===o.id&&React.createElement("div",{style:{
              marginTop:8,marginLeft:20,display:"flex",gap:8,
              background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:10
            }},
              React.createElement("div",{style:{fontSize:11,color:"#6B7280",marginBottom:4,width:"100%"}},
                React.createElement("span",{style:{fontWeight:600}},"↩ Respondiendo a "+o.user_nombre),

// ── Panel de Observaciones por ítem (legacy - kept for ModuloObservaciones) ─
function PanelObservaciones({proyectoId, capituloId, itemIndex, perfil, session, readOnly, onCountChange}) {
  const [obs, setObs] = useState([]);
  const [texto, setTexto] = useState("");
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    if(!open) return;
    _sb.from("observaciones")
      .select("*")
      .eq("proyecto_id", proyectoId)
      .eq("capitulo_id", capituloId)
      .eq("item_index", itemIndex)
      .order("created_at", {ascending:true})
      .then(({data})=>{setObs(data||[]);onCountChange&&onCountChange((data||[]).length);});
    const ch=_sb.channel(`obs_${proyectoId}_${capituloId}_${itemIndex}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"observaciones",
        filter:`proyecto_id=eq.${proyectoId}`},
        p=>{
          if(p.new.capitulo_id===capituloId&&p.new.item_index===itemIndex)
            setObs(prev=>[...prev,p.new]);
        }
      ).subscribe();
    return()=>_sb.removeChannel(ch);
  },[open, proyectoId, capituloId, itemIndex]);

  const enviar = async()=>{
    if(!texto.trim()) return;
    const nueva = {
      proyecto_id: proyectoId, capitulo_id: capituloId, item_index: itemIndex,
      texto: texto.trim(),
      user_id: session?.user?.id,
      user_email: session?.user?.email,
      user_nombre: perfil?.nombre || session?.user?.email,
    };
    const {data} = await _sb.from("observaciones").insert(nueva).select().single();
    if(data){const next=[...obs,data];setObs(next);onCountChange&&onCountChange(next.length);}
    setTexto("");
  };

  const fmtH = iso=>{
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short"})+
           " "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});

  const count = obs.length;

  return React.createElement("div", {style:{display:"inline-block"}},
    React.createElement("button", {
      onClick:()=>setOpen(o=>!o),
      title:"Observaciones",
      style:{
        background: count>0?"#FEF3C7":"#F3F4F6",
        border:`1px solid ${count>0?"#FCD34D":"#E5E7EB"}`,
        borderRadius:6, padding:"2px 8px", fontSize:11, cursor:"pointer",
        color: count>0?"#92400E":"#6B7280", fontWeight:600,
        display:"flex", alignItems:"center", gap:4
      }
    }, "💬", count>0&&React.createElement("span",null,count)),
    open&&React.createElement("div",{
      style:{
        position:"fixed", top:0, left:0, right:0, bottom:0,
        background:"rgba(0,0,0,.4)", zIndex:1000,
        display:"flex", alignItems:"center", justifyContent:"center"
      },
      onClick:e=>e.target===e.currentTarget&&setOpen(false)
    },
      React.createElement("div",{
        style:{
          background:"#fff", borderRadius:12, padding:24, width:480, maxWidth:"95vw",
          maxHeight:"80vh", display:"flex", flexDirection:"column", gap:12,
          boxShadow:"0 20px 60px rgba(0,0,0,.3)"
        }
      },
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",{style:{fontWeight:700,fontSize:15}},"💬 Observaciones"),
          React.createElement("button",{
            onClick:()=>setOpen(false),
            style:{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6B7280"}
          },"×")
        ),
        React.createElement("div",{
          style:{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,minHeight:80}
        },
          obs.length===0
          ?React.createElement("div",{style:{textAlign:"center",color:"#9CA3AF",padding:"20px 0",fontSize:13}},"Sin observaciones aún")
          :obs.map((o,i)=>React.createElement("div",{key:o.id||i,
            style:{
              background: o.user_id===session?.user?.id?"#EFF6FF":"#F9FAFB",
              border:`1px solid ${o.user_id===session?.user?.id?"#BFDBFE":"#E5E7EB"}`,
              borderRadius:8, padding:"10px 14px"

            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
              React.createElement("span",{style:{fontWeight:600,fontSize:12,color:"#374151"}},o.user_nombre||o.user_email||"—"),
              React.createElement("span",{style:{fontSize:11,color:"#9CA3AF"}},fmtH(o.created_at))

// ── Asignar proyectos a Visor (usado en ModuloUsuarios) ────────────────────
function ModalAsignarProyectos({usuario, proyectos, onClose}) {
  const [accesos, setAccesos] = useState([]);
  const [busy, setBusy] = useState(true);
  const [saving, setSaving] = useState(null);

  // Carga siempre fresca al abrir
  const recargar = ()=>{
    setBusy(true);
    _sb.from("proyecto_accesos").select("proyecto_id").eq("user_id",usuario.id)
      .then(({data,error})=>{
        if(!error) setAccesos((data||[]).map(x=>String(x.proyecto_id)));
        setBusy(false);
      });
  };
  useEffect(()=>{ recargar(); },[usuario.id]);

  const toggle = async(pid)=>{
    const pidStr = String(pid);
    setSaving(pidStr);
    if(accesos.includes(pidStr)){
      const {error} = await _sb.from("proyecto_accesos")
        .delete().eq("user_id",usuario.id).eq("proyecto_id",pidStr);
      if(!error) setAccesos(prev=>prev.filter(x=>x!==pidStr));
    } else {
      const {error} = await _sb.from("proyecto_accesos")
        .insert({user_id:usuario.id, proyecto_id:pidStr});
      if(!error) setAccesos(prev=>[...prev,pidStr]);
    }
    setSaving(null);
  };

  return React.createElement("div",{
    className:"modal-bg",onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement("div",{className:"modal"},
      React.createElement("div",{className:"modal-title"},
        `Proyectos asignados a ${usuario.nombre||usuario.email}`),
      busy
      ?React.createElement("div",{style:{padding:20,textAlign:"center",color:"#6B7280"}},"Cargando...")
      :React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8,maxHeight:400,overflowY:"auto"}},
        proyectos.length===0
        ?React.createElement("div",{style:{color:"#6B7280",fontSize:13}},"No hay proyectos creados.")
        :proyectos.map(p=>React.createElement("label",{
            key:p.id,
            style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
                   background:accesos.includes(String(p.id))?"#EFF6FF":"#F9FAFB",
                   border:`1px solid ${accesos.includes(String(p.id))?"#BFDBFE":"#E5E7EB"}`,
                   borderRadius:8,cursor:saving===String(p.id)?"wait":"pointer",
                   opacity:saving===String(p.id)?0.7:1}
          },
          React.createElement("input",{
            type:"checkbox",checked:accesos.includes(String(p.id)),
            onChange:()=>toggle(p.id),disabled:saving===String(p.id),
            style:{width:16,height:16,cursor:"pointer"}
          }),
          React.createElement("div",null,
            React.createElement("div",{style:{fontWeight:600,fontSize:13}},p.nombre),
            React.createElement("div",{style:{fontSize:11,color:"#6B7280"}},p.codigo||"")
          )
        ))
      ),
      React.createElement("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:16}},
        React.createElement("button",{className:"btn-p",onClick:onClose},"Cerrar")
      )
    )
  );
}

// TAB OBSERVACIONES — presupuesto con hilos por línea
// ═══════════════════════════════════════════════════════
function TabObservaciones({proyecto, apus, recursos, perfil, session}) {
  const [allObs, setAllObs] = useState([]);
  const [busy, setBusy]     = useState(true);
  const [openId, setOpenId] = useState(null); // "capId_idx" string
  const [textos, setTextos] = useState({});   // keyed by lineKey
  const [replyTo, setReplyTo] = useState({}); // keyed by lineKey

  const lineKey = (capId, idx) => capId+"__"+idx;

  const obsTabRef = React.useRef(null);
  obsTabRef.current = () => {
    _sb.from("observaciones").select("*")
      .eq("proyecto_id", proyecto.id)
      .order("created_at", {ascending:true})
      .then(({data})=>{ setAllObs(data||[]); setBusy(false); });
  };

  useEffect(()=>{
    obsTabRef.current();
    const ch = _sb.channel("obs_tab_"+proyecto.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"observaciones"},
        ()=>obsTabRef.current())
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto.id]);

  const cargar = ()=>obsTabRef.current();

  const obsParaLinea = (capId, idx) =>
    allObs.filter(o=>o.capitulo_id===capId&&o.item_index===idx&&!o.parent_id);

  const respuestasDeObs = (obsId) =>
    allObs.filter(o=>o.parent_id===obsId);

  const enviar = async(capId, idx, cap, item, parentId=null) => {
    const k = lineKey(capId, idx);
    const txt = (textos[k]||"").trim();
    if(!txt) return;
    const apu = apus.find(a=>a.id===item?.apuId);
    await _sb.from("observaciones").insert({
      proyecto_id:  proyecto.id,
      capitulo_id:  capId,
      item_index:   idx,
      tab_label:    "Presupuesto Obra",
      linea_desc:   item?.descripcion || (apu?.nombre) || `Ítem ${idx+1}`,
      parent_id:    parentId||null,
      texto:        txt,
      user_id:      session?.user?.id,
      user_email:   session?.user?.email,
      user_nombre:  perfil?.nombre || session?.user?.email,
    });
    setTextos(t=>({...t,[k]:""}));
    setReplyTo(r=>({...r,[k]:null}));
    cargar();
  };

  const fmtF = iso => {
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short"})
           +" "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const res = calcProyecto(proyecto, apus, recursos);

  // ── Render de un hilo de observaciones ────────────────────────────────────
  const renderHilo = (capId, idx, cap, item) => {
    const k = lineKey(capId, idx);
    const raices = obsParaLinea(capId, idx);
    const isOpen = openId === k;
    const totalCount = raices.reduce((s,o)=>s+1+respuestasDeObs(o.id).length, 0);

    return React.createElement("div",{
      key:k,
      style:{borderTop:"1px solid #F3F4F6",padding:"4px 8px 4px 28px"}
    },
      // Botón abrir/cerrar hilo
      React.createElement("button",{
        onClick:()=>setOpenId(isOpen?null:k),
        style:{
          background: totalCount>0?"#FEF3C7":"#F3F4F6",
          border:`1px solid ${totalCount>0?"#FDE68A":"#E5E7EB"}`,
          borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer",
          color: totalCount>0?"#92400E":"#6B7280",fontWeight:600,
          display:"inline-flex",alignItems:"center",gap:5
        }
      },"💬 "+(totalCount>0?totalCount+" comentario"+(totalCount>1?"s":""):"Comentar")),

      // Hilo expandido
      isOpen&&React.createElement("div",{style:{marginTop:8,display:"flex",flexDirection:"column",gap:10}},
        // Observaciones existentes
        raices.length>0&&React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          raices.map(o=>{
            const replies = respuestasDeObs(o.id);
            const rk = k+"_r"+o.id;
            return React.createElement("div",{key:o.id},
              // Obs raíz
              React.createElement("div",{style:{
                background:o.user_id===session?.user?.id?"#EFF6FF":"#F9FAFB",
                border:`1px solid ${o.user_id===session?.user?.id?"#BFDBFE":"#E5E7EB"}`,
                borderRadius:8,padding:"10px 12px"
              }},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:4}},
                  React.createElement("span",{style:{fontWeight:700,fontSize:12,color:"#374151"}},o.user_nombre||"—"),
                  React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},fmtF(o.created_at))
                ),
                React.createElement("div",{style:{fontSize:13,color:"#111827",lineHeight:1.5,marginBottom:6}},o.texto),
                React.createElement("button",{
                  onClick:()=>setReplyTo(r=>({...r,[k]:r[k]===o.id?null:o.id})),
                  style:{background:"none",border:"none",fontSize:11,color:"#6B7280",cursor:"pointer",padding:0,fontWeight:600}
                },"↩ Responder"+(replies.length>0?" · "+replies.length:""))
              ),
              // Respuestas
              replies.length>0&&React.createElement("div",{style:{marginLeft:20,marginTop:6,display:"flex",flexDirection:"column",gap:6}},
                replies.map(r=>React.createElement("div",{key:r.id,style:{
                  background:r.user_id===session?.user?.id?"#F0FDF4":"#F8FAFC",
                  border:`1px solid ${r.user_id===session?.user?.id?"#BBF7D0":"#E5E7EB"}`,
                  borderRadius:8,padding:"8px 12px"
                }},
                  React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3,flexWrap:"wrap",gap:4}},
                    React.createElement("span",{style:{fontWeight:700,fontSize:11,color:"#374151"}},r.user_nombre||"—"),
                    React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},fmtF(r.created_at))
                  ),
                  React.createElement("div",{style:{fontSize:13,color:"#374151",lineHeight:1.5}},r.texto)
                ))
              ),
              // Input respuesta
              replyTo[k]===o.id&&React.createElement("div",{style:{marginLeft:20,marginTop:6,display:"flex",gap:6}},
                React.createElement("textarea",{
                  style:{flex:1,padding:"8px 10px",border:"1px solid #FDE68A",borderRadius:6,
                    fontSize:12,outline:"none",resize:"none",fontFamily:"var(--sans)",minHeight:36},
                  placeholder:"Responder a "+o.user_nombre+"...",
                  value:textos[k]||"",onChange:e=>setTextos(t=>({...t,[k]:e.target.value})),
                  onKeyDown:e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),enviar(capId,idx,cap,item,o.id)),
                  autoFocus:true
                }),
                React.createElement("button",{
                  onClick:()=>enviar(capId,idx,cap,item,o.id),
                  style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:6,
                    padding:"0 12px",fontWeight:700,fontSize:12,cursor:"pointer",alignSelf:"flex-end",height:36}
                },"↩")
              )
            );
          })
        ),
        // Nueva observación
        (!replyTo[k]||replyTo[k]==="new")&&React.createElement("div",{style:{display:"flex",gap:6}},
          React.createElement("textarea",{
            style:{flex:1,padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:6,
              fontSize:12,outline:"none",resize:"none",fontFamily:"var(--sans)",minHeight:36},
            placeholder:"Escribe una observación...",
            value:textos[k]||"",onChange:e=>setTextos(t=>({...t,[k]:e.target.value})),
            onKeyDown:e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),enviar(capId,idx,cap,item))
          }),
          React.createElement("button",{
            onClick:()=>enviar(capId,idx,cap,item),
            style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:6,
              padding:"0 12px",fontWeight:700,fontSize:12,cursor:"pointer",alignSelf:"flex-end",height:36}
          },"💬")
        )
      )
    );
  };

  if(busy) return React.createElement("div",{style:{padding:40,textAlign:"center",color:"#9CA3AF"}},"Cargando...");

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    (proyecto.capitulos||[]).map(cap=>{
      if(!(cap.items||[]).length) return null;
      const cdCap=(cap.items||[]).reduce((s,it)=>s+calcItem(it,apus,recursos),0);
      return React.createElement("div",{key:cap.id,className:"card",style:{overflow:"hidden"}},
        // Header capítulo
        React.createElement("div",{style:{
          background:"#1F2937",padding:"10px 20px",
          display:"flex",justifyContent:"space-between",alignItems:"center"
        }},
          React.createElement("div",{style:{display:"flex",gap:12,alignItems:"center"}},
            React.createElement("span",{style:{color:"#9CA3AF",fontFamily:"var(--mono)",fontSize:11}},`CAP. ${cap.numero}`),
            React.createElement("span",{style:{color:"#fff",fontWeight:700,fontSize:13}},cap.nombre)
          ),
          React.createElement("span",{style:{fontFamily:"var(--mono)",color:"#6EE7B7",fontWeight:700}},fmt(cdCap))
        ),
        // Ítems
        React.createElement("div",{style:{display:"flex",flexDirection:"column"}},
          (cap.items||[]).map((item,idx)=>{
            const apu=apus.find(a=>a.id===item.apuId);
            const vu=apu?calcAPUTotal(apu,recursos):0;
            const vt=(item.cantidad||0)*vu;
            const k=lineKey(cap.id,idx);
            const cnt=allObs.filter(o=>o.capitulo_id===cap.id&&o.item_index===idx).length;
            return React.createElement("div",{key:item.id,
              style:{borderBottom:"1px solid #F3F4F6",
                background:openId===k?"#FFFBF0":"#fff"}
            },
              // Fila ítem
              React.createElement("div",{style:{
                display:"grid",
                gridTemplateColumns:"60px 1fr 70px 100px 120px 130px",
                gap:8,padding:"10px 20px",alignItems:"center"
              }},
                React.createElement("code",{style:{fontFamily:"var(--mono)",fontSize:11,color:"var(--red)"}},
                  `${cap.numero}.${idx+1}`),
                React.createElement("div",null,
                  React.createElement("div",{style:{fontSize:13,fontWeight:500}},item.descripcion||(apu?.nombre||"—")),
                  apu&&React.createElement("div",{style:{fontSize:10,color:"#9CA3AF"}},apu.codigo)
                ),
                React.createElement("div",{style:{fontSize:11,color:"#6B7280",textAlign:"center"}},item.unidad||(apu?.unidad||"")),
                React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:12,textAlign:"right",color:"#6B7280"}},
                  fmtN(item.cantidad,2)),
                React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:12,textAlign:"right",color:"#6B7280"}},
                  apu?fmt(vu):"—"),
                React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:13,textAlign:"right",fontWeight:700}},
                  apu?fmt(vt):"—")
              ),
              // Hilo de observaciones
              renderHilo(cap.id, idx, cap, item)
            );
          })
        )
      );
    })
  );
}

  const [confirmDel, setConfirmDel] = useState(false);
  const esMio = msg.user_id && session?.user?.id && String(msg.user_id) === String(session.user.id);
  const reps  = allReps.filter(r=>Number(r.parent_id)===Number(msg.id));
  const rKey  = "reply__"+msg.id;

  const handleEliminar = () => {
    if(confirmDel) {
      eliminar(msg.id);
      setConfirmDel(false);
    } else {
      setConfirmDel(true);
    }
  };

  return React.createElement("div",{style:{marginLeft:depth*20}},
    React.createElement("div",{style:{
      background:esMio?(esRespuesta?"#F0FDF4":"#EFF6FF"):(esRespuesta?"#F8FAFC":"#F9FAFB"),
      border:`1px solid ${esMio?(esRespuesta?"#BBF7D0":"#BFDBFE"):"#E5E7EB"}`,
      borderRadius:8,padding:"10px 14px",
      outline:confirmDel?"2px solid #EF4444":"none"

function HiloObs({cid, idx, desc, tabLabel, allObs, session, enviar, eliminar, openKey, setOpenKey, textos, setTextos, replyTo, setReplyTo}) {
  const lk    = (c,i) => c+"__"+i;
  const k     = lk(cid,idx);
  const raices= allObs.filter(o=>o.capitulo_id===cid&&o.item_index===idx&&!o.parent_id);
  const allReps=allObs.filter(o=>o.parent_id!=null&&o.parent_id!==undefined);
  const total = allObs.filter(o=>o.capitulo_id===cid&&o.item_index===idx).length;
  const isOpen= openKey===k;

  const fmtF = iso => {
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})
           +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const enviarRespuesta = (rKey, parentId) => {
    const txt=(textos[rKey]||"").trim(); if(!txt) return;
    enviar(cid,idx,desc,tabLabel,parentId,rKey);
  };

  return React.createElement("div",{style:{padding:"6px 12px 10px 24px",borderTop:"1px solid #F3F4F6"}},
    React.createElement("button",{
      onClick:()=>setOpenKey(isOpen?null:k),
      style:{
        background:total>0?"#FEF3C7":"#F9FAFB",
        border:`1px solid ${total>0?"#FDE68A":"#E5E7EB"}`,
        borderRadius:6,padding:"3px 12px",fontSize:11,cursor:"pointer",
        color:total>0?"#92400E":"#6B7280",fontWeight:600,
        display:"inline-flex",alignItems:"center",gap:5
      }
    },"💬 "+(total>0?total+" comentario"+(total>1?"s":""):"Comentar")),

    isOpen&&React.createElement("div",{style:{marginTop:10,display:"flex",flexDirection:"column",gap:10}},
      raices.map(o=>React.createElement(BurbujaMensaje,{
        key:o.id,msg:o,depth:0,esRespuesta:false,
        allReps,session,eliminar,setReplyTo,replyTo,textos,setTextos,enviarRespuesta,fmtF
      })),
      React.createElement("div",{style:{display:"flex",gap:6}},
        React.createElement("textarea",{
          style:{flex:1,padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:6,
            fontSize:12,outline:"none",resize:"vertical",fontFamily:"var(--sans)",minHeight:60},
          placeholder:"Escribe una observación...",
          value:textos[k]||"",rows:3,
          onChange:e=>setTextos(t=>({...t,[k]:e.target.value}))
        }),
        React.createElement("button",{
          onClick:()=>enviar(cid,idx,desc,tabLabel,null,k),
          style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:6,
            padding:"0 14px",fontWeight:700,cursor:"pointer",alignSelf:"flex-end",height:44}
        },"💬")
      )
    )
  );
}

function TabObsView({proyecto, apus, recursos, perfil, session, esVisor, onClose}) {
  const [allObs, setAllObs] = useState([]);
  const [busy,   setBusy]   = useState(true);
  const [openKey,setOpenKey]= useState(null);
  const [textos, setTextos] = useState({});
  const [replyTo,setReplyTo]= useState({});
  const [tabActiva, setTabActiva] = useState("presupuesto");

  const lk = (cid,idx) => cid+"__"+idx;

  const obsViewRef = React.useRef(null);
  obsViewRef.current = () => {
    _sb.from("observaciones").select("*")
      .eq("proyecto_id", proyecto.id)
      .order("created_at",{ascending:true})
      .then(({data})=>{ setAllObs(data||[]); setBusy(false); });
  };

  useEffect(()=>{
    obsViewRef.current();
    const ch=_sb.channel("obsview_"+proyecto.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"observaciones"},
        ()=>obsViewRef.current())
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto.id]);

  const cargar = ()=>obsViewRef.current();

  const obsDeLinea  = (cid,idx) => allObs.filter(o=>o.capitulo_id===cid&&o.item_index===idx&&!o.parent_id);
  const repsDe      = (oid)     => allObs.filter(o=>o.parent_id===oid);
  const totalLinea  = (cid,idx) => allObs.filter(o=>o.capitulo_id===cid&&o.item_index===idx).length;

  const enviar = async(cid, idx, desc, tabLabel, parentId=null, textKey=null) => {
    const k = textKey || lk(cid,idx);
    const txt=(textos[k]||"").trim();
    if(!txt) return;
    const nueva = {
      proyecto_id:proyecto.id, capitulo_id:cid, item_index:idx,
      tab_label:tabLabel, linea_desc:desc,
      parent_id:parentId||null, texto:txt,
      user_id:session?.user?.id, user_email:session?.user?.email,
      user_nombre:perfil?.nombre||session?.user?.email,
    };
    // Optimistic update: add immediately to local state
    const tempObs = {...nueva, id: Date.now(), created_at: new Date().toISOString()};
    setAllObs(prev=>[...prev, tempObs]);
    setTextos(t=>({...t,[k]:""}));
    setReplyTo(r=>({...r,[k]:false}));
    // Then save to DB and refresh to get real ID
    await _sb.from("observaciones").insert(nueva);
    if(obsViewRef.current) obsViewRef.current();
  };

  const eliminar = async(obsId) => {
    const id = Number(obsId);
    if(!id) return;
    // Optimistic: quitar de UI de inmediato
    setAllObs(prev=>prev.filter(o=>Number(o.id)!==id && Number(o.parent_id)!==id));
    // Borrar respuestas primero (por FK), luego el comentario raíz
    await _sb.from("observaciones").delete().eq("parent_id", id);
    await _sb.from("observaciones").delete().eq("id", id);
    // Refrescar desde servidor
    setTimeout(()=>{ if(obsViewRef.current) obsViewRef.current(); }, 600);
  };

  const fmtF = iso => {
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})
           +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };


  const comps = proyecto.componentes||[];
  const tieneObra = comps.includes("obra")||comps.length===0;
  const tieneInterv = comps.includes("interventoria");
  const tieneConsult = comps.includes("consultoria");
  const apusUsados = getApusUsados(proyecto, apus, recursos);
  const tabs = [

// ── Almacenamiento: usa localStorage si está disponible, sino memoria ──
const _memStore = {};
const store = {
  getItem: (k) => {
    try { return localStorage.getItem(k); } catch(e) { return _memStore[k] || null; }
  },
  setItem: (k, v) => {
    try { localStorage.setItem(k, v); } catch(e) { _memStore[k] = v; }
  }
};

// ERROR BOUNDARY
// ═══════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("EDESO Error:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", minHeight: "100vh", gap: 16,
          fontFamily: "system-ui, sans-serif", background: "#F8F9FB",
          color: "#111827", padding: 32, textAlign: "center"
        }
      },
        React.createElement("div", { style: { fontSize: 48 } }, "⚠️"),
        React.createElement("h2", { style: { fontSize: 20, fontWeight: 700, margin: 0 } }, "Algo salió mal"),
        React.createElement("p", { style: { color: "#6B7280", maxWidth: 400, margin: 0 } },
          "Ocurrió un error inesperado. Tus datos están guardados. Recarga la página para continuar."
        ),
        React.createElement("details", { style: { maxWidth: 600, textAlign: "left" } },
          React.createElement("summary", { style: { cursor: "pointer", color: "#B91C1C" } }, "Ver detalle del error"),
          React.createElement("pre", {
            style: { background: "#1E293B", color: "#E2E8F0", padding: 16, borderRadius: 8,
                     fontSize: 12, overflow: "auto", marginTop: 8 }
          }, this.state.error ? this.state.error.toString() : "Error desconocido")
        ),
        React.createElement("button", {
          onClick: () => this.setState({ hasError: false, error: null }),
          style: {
            background: "#B91C1C", color: "#fff", border: "none",
            padding: "10px 24px", borderRadius: 8, cursor: "pointer",
            fontSize: 14, fontWeight: 600
          }
        }, "Intentar de nuevo")
      );
    }
    return this.props.children;
  }
}

// Inferir descripción del cambio comparando arrays
function inferirAccion(modulo, anterior, nuevo_) {
  if (!Array.isArray(anterior)||!Array.isArray(nuevo_)) return "Actualizó "+modulo;
  const nom = arr => (arr[0]?.nombre||arr[0]?.codigo||arr[0]?.descripcion||"");
  if (nuevo_.length>anterior.length) {
    const added=nuevo_.filter(n=>!anterior.find(a=>a.id===n.id));
    return "Creó en "+modulo+(nom(added)?": "+nom(added):"");
  }
  if (nuevo_.length<anterior.length) {
    const removed=anterior.filter(a=>!nuevo_.find(n=>n.id===a.id));
    return "Eliminó de "+modulo+(nom(removed)?": "+nom(removed):"");
  }
  const changed=nuevo_.filter(n=>{const o=anterior.find(a=>a.id===n.id);return o&&JSON.stringify(o)!==JSON.stringify(n);});
  return "Modificó en "+modulo+(nom(changed)?": "+nom(changed):"");
}

// ── Módulo Actividad ───────────────────────────────────
function ModuloActividad() {
  const [logs,setLogs]=useState([]);
  const [busy,setBusy]=useState(true);
  const [q,setQ]=useState("");
  useEffect(()=>{
    _sb.from("audit_log").select("*").order("created_at",{ascending:false}).limit(300)
      .then(({data})=>{setLogs(data||[]);setBusy(false);});
    const ch=_sb.channel("audit_live")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"audit_log"},
        p=>setLogs(prev=>[p.new,...prev].slice(0,300))
      ).subscribe();
    return()=>_sb.removeChannel(ch);
  },[]);
  const filtered=q?logs.filter(l=>
    (l.accion||"").toLowerCase().includes(q.toLowerCase())||
    (l.user_nombre||l.user_email||"").toLowerCase().includes(q.toLowerCase())||
    (l.modulo||"").toLowerCase().includes(q.toLowerCase())
  ):logs;
  const fmtF=iso=>{const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})+
           " "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});};
  return React.createElement("div",{className:"page"},
    React.createElement("div",{className:"page-hdr"},
      React.createElement("div",null,
        React.createElement("div",{className:"page-title"},"Actividad"),
        React.createElement("div",{className:"page-sub"},"Registro completo · Quién editó qué y cuándo")
      )
    ),
    React.createElement("div",{className:"card"},
      React.createElement("div",{className:"card-header"},
        React.createElement("input",{className:"ifield",style:{maxWidth:340},
          placeholder:"🔍  Filtrar por usuario, acción o módulo...",
          value:q,onChange:e=>setQ(e.target.value)}),
        React.createElement("span",{style:{fontSize:12,color:"var(--ink4)"}},
          filtered.length," registros")
      ),
      busy?React.createElement("div",{style:{padding:40,textAlign:"center",color:"var(--ink4)"}},"Cargando..."):
      React.createElement("table",{className:"tbl"},
        React.createElement("thead",null,
          React.createElement("tr",null,
            ["Fecha y hora","Usuario","Acción","Módulo"].map(h=>
              React.createElement("th",{key:h},h))
          )
        ),
        React.createElement("tbody",null,
          filtered.length===0
          ?React.createElement("tr",null,React.createElement("td",{colSpan:4,style:{textAlign:"center",padding:32,color:"var(--ink4)"}},"Sin registros"))
          :filtered.map((l,i)=>React.createElement("tr",{key:l.id||i},
              React.createElement("td",null,
                React.createElement("code",{style:{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink3)"}},
                  fmtF(l.created_at))
              ),
              React.createElement("td",null,
                React.createElement("div",{style:{fontWeight:600,fontSize:13}},l.user_nombre||"—"),
                React.createElement("div",{style:{fontSize:11,color:"var(--ink4)"}},l.user_email||"")
              ),
              React.createElement("td",null,l.accion||"—"),
              React.createElement("td",null,
                React.createElement("span",{style:{background:"var(--line2)",borderRadius:6,
                  padding:"2px 8px",fontSize:11,fontWeight:600}},l.modulo||"—")
              )
            ))
        )
      )
    )
  );
}

// ── Módulo Usuarios ────────────────────────────────────
function ModuloUsuarios({perfil,session,proyectos}) {
  const [usuarios,setUsuarios]=useState([]);
  const [busy,setBusy]=useState(true);
  const [editId,setEditId]=useState(null);
  const [editNom,setEditNom]=useState("");
  const [editRol,setEditRol]=useState("usuario");
  const [showNew,setShowNew]=useState(false);
  const [asignarModal,setAsignarModal]=useState(null);
  const [nEmail,setNEmail]=useState("");
  const [nNom,setNNom]=useState("");
  const [nPass,setNPass]=useState("");
  const [nRol,setNRol]=useState("usuario");
  const [msg,setMsg]=useState({txt:"",ok:false});

  const cargar=()=>{
    _sb.from("profiles").select("*").order("created_at",{ascending:true})
      .then(({data})=>{setUsuarios(data||[]);setBusy(false);});
  };
  useEffect(cargar,[]);

  const guardar=async uid=>{
    await _sb.from("profiles").update({nombre:editNom,rol:editRol}).eq("id",uid);
    setEditId(null);cargar();
  };

  const crear=async()=>{
    if(!nEmail||!nPass||!nNom){setMsg({txt:"Completa todos los campos",ok:false});return;}
    if(nPass.length<6){setMsg({txt:"La contraseña debe tener al menos 6 caracteres",ok:false});return;}
    const{data,error}=await _sb.auth.signUp({email:nEmail,password:nPass,
      options:{data:{nombre:nNom}}});
    if(error){setMsg({txt:"Error: "+error.message,ok:false});return;}
    if(data?.user){
      await _sb.from("profiles").upsert({id:data.user.id,email:nEmail,
        nombre:nNom,rol:nRol,created_at:new Date().toISOString()});
    }
    setMsg({txt:"✓ Usuario creado correctamente. El usuario ya puede ingresar.",ok:true});
    setShowNew(false);setNEmail("");setNNom("");setNPass("");
    setTimeout(cargar,1200);
  };

  if(perfil?.rol!=="admin") return React.createElement("div",{className:"page"},
    React.createElement("div",{className:"page-hdr"},
      React.createElement("div",{className:"page-title"},"Acceso restringido")
    ),
    React.createElement("div",{className:"card"},
      React.createElement("div",{className:"card-body",style:{padding:40,textAlign:"center",color:"var(--ink4)"}},
        "Solo los administradores pueden gestionar usuarios.")
    )
  );

  return React.createElement("div",{className:"page"},
    React.createElement("div",{className:"page-hdr"},
      React.createElement("div",null,
        React.createElement("div",{className:"page-title"},"Usuarios"),
        React.createElement("div",{className:"page-sub"},"Control de acceso al sistema")
      ),
      React.createElement("button",{className:"btn-p",onClick:()=>{setShowNew(true);setMsg({txt:"",ok:false});}},
        "+ Nuevo usuario")
    ),
    msg.txt&&React.createElement("div",{style:{
      background:msg.ok?"#F0FDF4":"#FEF2F2",
      border:`1px solid ${msg.ok?"#BBF7D0":"#FECACA"}`,
      borderRadius:8,padding:"10px 16px",
      color:msg.ok?"#15803D":"#B91C1C",fontSize:13,marginBottom:12}},msg.txt),
    showNew&&React.createElement("div",{className:"modal-bg",
      onClick:e=>e.target===e.currentTarget&&setShowNew(false)},
      React.createElement("div",{className:"modal"},
        React.createElement("div",{className:"modal-title"},"Nuevo usuario"),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:14}},
          React.createElement("div",null,
            React.createElement("label",{className:"lbl"},"Nombre completo"),
            React.createElement("input",{className:"ifield",value:nNom,
              onChange:e=>setNNom(e.target.value),placeholder:"Nombre Apellido"})
          ),
          React.createElement("div",null,
            React.createElement("label",{className:"lbl"},"Correo electrónico"),
            React.createElement("input",{className:"ifield",type:"email",value:nEmail,
              onChange:e=>setNEmail(e.target.value),placeholder:"correo@empresa.com"})
          ),
          React.createElement("div",null,
            React.createElement("label",{className:"lbl"},"Contraseña inicial"),
            React.createElement("input",{className:"ifield",type:"password",value:nPass,
              onChange:e=>setNPass(e.target.value),placeholder:"Mínimo 6 caracteres"})
          ),
          React.createElement("div",null,
            React.createElement("label",{className:"lbl"},"Rol"),
            React.createElement("select",{className:"ifield",value:nRol,onChange:e=>setNRol(e.target.value)},
              React.createElement("option",{value:"usuario"},"Usuario"),
              React.createElement("option",{value:"admin"},"Administrador")
            )
          ),
          React.createElement("div",{style:{display:"flex",gap:10,justifyContent:"flex-end"}},
            React.createElement("button",{className:"btn-s",onClick:()=>setShowNew(false)},"Cancelar"),
            React.createElement("button",{className:"btn-p",onClick:crear},"Crear usuario")
          )
        )
      )
    ),
    asignarModal&&React.createElement(ModalAsignarProyectos,{usuario:asignarModal,proyectos:proyectos||[],onClose:()=>setAsignarModal(null)}),
    React.createElement("div",{className:"card",style:{overflow:"hidden"}},
      React.createElement("table",{className:"tbl"},
        React.createElement("thead",null,
          React.createElement("tr",null,
            ["Nombre","Correo","Rol","Acciones"].map(h=>React.createElement("th",{key:h},h))
          )
        ),
        React.createElement("tbody",null,
          busy?React.createElement("tr",null,
            React.createElement("td",{colSpan:4,style:{textAlign:"center",padding:32}},"Cargando...")):
          usuarios.map(u=>
            editId===u.id
            ?React.createElement("tr",{key:u.id},
                React.createElement("td",null,
                  React.createElement("input",{className:"ifield",style:{minWidth:160},
                    value:editNom,onChange:e=>setEditNom(e.target.value)})
                ),
                React.createElement("td",null,
                  React.createElement("code",{style:{fontFamily:"var(--mono)",fontSize:12,color:"var(--ink3)"}},u.email)
                ),
                React.createElement("td",null,
                  React.createElement("select",{className:"ifield",value:editRol,onChange:e=>setEditRol(e.target.value)},
                    React.createElement("option",{value:"usuario"},"Usuario"),
                    React.createElement("option",{value:"editor"},"Editor"),
                    React.createElement("option",{value:"visor"},"Visor"),
                    React.createElement("option",{value:"jefe"},"Jefe (solo lectura)"),
                    React.createElement("option",{value:"admin"},"Administrador")
                  )
                ),
                React.createElement("td",null,
                  React.createElement("button",{className:"btn-p",
                    style:{fontSize:12,padding:"4px 12px",marginRight:6},
                    onClick:()=>guardar(u.id)},"Guardar"),
                  React.createElement("button",{className:"btn-s",
                    style:{fontSize:12,padding:"4px 12px"},
                    onClick:()=>setEditId(null)},"Cancelar")
                )
              )

          className:"ifield",style:{maxWidth:280},
          placeholder:"🔍 Buscar observación, usuario o proyecto...",

          value:filtroProy,onChange:e=>setFiltroProy(e.target.value)

          React.createElement("option",{value:""},"Todos los proyectos"),
          (proyectos||[]).map(p=>React.createElement("option",{key:p.id,value:String(p.id)},p.nombre))
        ),
        React.createElement("span",{style:{fontSize:12,color:"var(--ink4)"}},filtered.length," observaciones")
      ),

      ?React.createElement("div",{style:{padding:40,textAlign:"center",color:"var(--ink4)"}},"Cargando...")

        ?React.createElement("div",{style:{padding:40,textAlign:"center",color:"var(--ink4)"}},"Sin observaciones")
        :React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:0}},
          filtered.map((o,i)=>React.createElement("div",{
            key:o.id||i,
            style:{
              padding:"16px 20px",

              background:i%2===0?"#fff":"var(--line2)"

            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,flexWrap:"wrap",gap:6}},
              React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
                React.createElement("span",{style:{
                  background:"var(--red-soft)",color:"var(--red)",
                  borderRadius:6,padding:"2px 10px",fontSize:11,fontWeight:700
                }},proyNombre(o.proyecto_id)),
                React.createElement("span",{style:{
                  background:"var(--line2)",color:"var(--ink3)",

              ),
              React.createElement("code",{style:{fontFamily:"var(--mono)",fontSize:11,color:"var(--ink4)"}},fmtF(o.created_at))
            ),
            React.createElement("div",{style:{fontSize:14,color:"var(--ink)",lineHeight:1.6,marginBottom:6}},o.texto),
            React.createElement("div",{style:{fontSize:12,color:"var(--ink3)",fontWeight:600}},
