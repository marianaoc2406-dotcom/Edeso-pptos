    if(refsCap.length) fc(ws,r,5,refsCap.join('+'),cdPs,ST.tot()); else nc(ws,r,5,0,ST.tot());
    pc(ws,r,6,'100%',ST.tot()); r++;
    sc(ws,r,1,'Administración ('+pctA.toFixed(2)+'% s/CD total)',ST.rowA()); nc(ws,r,5,aEste,ST.mon()); r++;
    sc(ws,r,1,'Utilidad ('+pctU.toFixed(2)+'% s/CD total)',ST.rowB()); nc(ws,r,5,uEste,ST.mon()); r++;
    [0,2,3,4].forEach(function(ci){ sc(ws,r,ci,'',ST.tot2()); });
    sc(ws,r,1,'COSTO TOTAL (C.D. + C.I.)',ST.tot2());
    fc(ws,r,5,ref(filaCD,5)+'+'+ref(filaA,5)+'+'+ref(filaU,5),costoTotal,ST.tot2()); r++;

    // % de incidencia como fórmula viva contra el C.D. del presupuesto
    celdasPct.forEach(function(cp){
      fpc(ws,cp.r,6,'IF('+refA(filaCD,5)+'=0,0,'+ref(cp.r,5)+'/'+refA(filaCD,5)+')',cp.v,cp.st);
    });

    setRange(ws, [{wch:8},{wch:55},{wch:8},{wch:10},{wch:16},{wch:18},{wch:10}]);
    var nm = nombreUnico(ps.nombre||'Presupuesto');
    // Guardar dónde quedó cada capítulo para que el Resumen los enlace
    refCapPs[ps.id] = capsRefs.map(function(cr){ return {ref: link(nm, ref(cr.fila,5)), valor: cr.valor}; });
    refsCDPs.push(link(nm, ref(filaCD,5)));   // COSTO DIRECTO de esta hoja → lo usa el Cálculo A+U
    XLSX.utils.book_append_sheet(wb, ws, nm);
  });

  // ── EXTRAS: SG-SST / PMA / PMT / GESTIÓN SOCIAL ─────────────────────────
  var extrasDefs = [
    { campo:"sgSst",          titulo:"SG-SST" },
    { campo:"pma",            titulo:"PMA" },
    { campo:"pmt",            titulo:"PMT" },
    { campo:"gestionSocial",  titulo:"Gestion Social" }
  ];
  extrasDefs.forEach(function(ed) {
    var secs = proyecto["extras_"+ed.campo];
    if(!secs || !secs.length) return;
    var wsEx = {}, r = 0;

    // Título
    sc(wsEx,r,0,ed.titulo,{font:FT("FFFFFF",true,13),fill:FG("1F2937"),border:brd});
    sc(wsEx,r,1,"",{fill:FG("1F2937"),border:brd});
    sc(wsEx,r,2,"",{fill:FG("1F2937"),border:brd});
    sc(wsEx,r,3,"",{fill:FG("1F2937"),border:brd});
    sc(wsEx,r,4,"",{fill:FG("1F2937"),border:brd}); r++; r++;

    // Headers
    ["Sección / Ítem","Und","Cantidad","V. Unitario","Factor","Total"].forEach(function(h,ci){
      sc(wsEx,r,ci,h,ST.hdr());
    }); r++;

    var grandTotal = 0, refsSecEx = [];
    secs.forEach(function(sec) {
      var factor = sec.factorPrestacional||1;
      var itemsEx = sec.items||[];
      var subT = itemsEx.reduce(function(ss,it){
        return ss + (it.cantidad||0)*(it.valorUnitario||0);
      },0);
      var secTotal = subT * factor;
      grandTotal += secTotal;
      var filaSecEx = r;

      // Section header
      [0,1,2,3,4,5].forEach(function(ci){ sc(wsEx,r,ci,"",ST.cap()); });
      sc(wsEx,r,0,safe(sec.titulo||sec.nombre||""),ST.cap());
      if(factor !== 1) sc(wsEx,r,4,"x"+factor,ST.cap());
      if(itemsEx.length) fc(wsEx,filaSecEx,5,'SUM('+rng(filaSecEx+1,filaSecEx+itemsEx.length,5)+')',secTotal,ST.tot());
      else nc(wsEx,filaSecEx,5,0,ST.tot());
      refsSecEx.push(ref(filaSecEx,5));
      r++;

      // Items — Total = Cantidad × V.Unitario × Factor
      itemsEx.forEach(function(it,ii) {
        var vt = (it.cantidad||0)*(it.valorUnitario||0)*factor;
        var stR = ii%2===0?ST.rowA():ST.rowB();
        sc(wsEx,r,0,safe(it.descripcion||it.desc||""),stR);
        sc(wsEx,r,1,safe(it.unidad||""),{fill:stR.fill,border:brd,alignment:C_AL});
        ndc(wsEx,r,2,it.cantidad||0,{fill:stR.fill,border:brd,alignment:R_AL});
        nc(wsEx,r,3,it.valorUnitario||0,ST.mon(stR));
        ndc(wsEx,r,4,factor,{fill:stR.fill,border:brd,alignment:C_AL});
        fc(wsEx,r,5,ref(r,2)+'*'+ref(r,3)+'*'+ref(r,4),vt,{font:{bold:true},fill:stR.fill,border:brd,alignment:R_AL});
        r++;
      });
    });

    // Grand total
    r++;
    [0,1,2,3,4].forEach(function(ci){ sc(wsEx,r,ci,"",ST.tot2()); });
    sc(wsEx,r,0,"TOTAL "+ed.titulo,ST.tot2());
    if(refsSecEx.length) fc(wsEx,r,5,refsSecEx.join('+'),grandTotal,ST.tot2()); else nc(wsEx,r,5,0,ST.tot2()); r++;

    wsEx['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:5}}];
    setRange(wsEx,[{wch:50},{wch:8},{wch:10},{wch:18},{wch:8},{wch:18}]);
    var nmEx = nombreUnico(ed.titulo);
    refExtra[ed.campo] = link(nmEx, ref(r-1,5));   // celda TOTAL de esta hoja
    hojasExtras.push({ws:wsEx, nm:nmEx});
  });


  // ── 2. CÁLCULO A+U ────────────────────────────────────────────────────────
  // Réplica EXACTA de la tabla que se ve en la pestaña "Cálculo A+U":
  // Ítem | Descripción | Und. | Ded. | Cant. | Valor Base/Unit. | Meses | Total
  if(tieneObra) {
    var wsAU = {}, r = 0;
    var au = proyecto.au || {};
    var extras = getExtras(proyecto);          // calculado de las hojas, no de la caché
    var totalExtras = getExtrasTotal(proyecto);

    // El sistema usa (cd + totalAU) como base para los ítems tipo "otros" con base=total
    var totalAU_ = calcAUTotal(au, cd);
    var baseTot  = cd + totalAU_;

    // Título + C.D.
    sc(wsAU,r,0,'CÁLCULO A+U',{font:FT("FFFFFF",true,13),fill:FG("1F2937"),border:brd});
    [1,2,3,4,5,6,7].forEach(function(ci){ sc(wsAU,r,ci,'',{fill:FG("1F2937"),border:brd}); });
    r++;
    sc(wsAU,r,0,'Costo Directo (C.D.)',ST.lbl());
    [1,2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.lbl()); });
    var filaCDau = r;
    // C.D. = suma del COSTO DIRECTO de cada hoja de presupuesto
    if(refsCDPs.length) fc(wsAU,r,7,refsCDPs.join('+'),cd,ST.mon());
    else nc(wsAU,r,7,cd,ST.mon());
    r++;
    r++;

    // Encabezados — idénticos a la pantalla
    ['Ítem','Descripción','Und.','Ded.','Cant.','Valor Base/Unit.','Meses','Total']
      .forEach(function(h,ci){ sc(wsAU,r,ci,h,ST.hdr()); });
    r++;

    var refsAdmin = [];   // celdas que suman la Administración (A)
    var fila18Pol = null, fila18Est = null, fila18TB = null;
    var _val18Pol = 0, _val18Est = 0, _val18TB = 0;

    (au.secciones||[]).forEach(function(sec) {
      // Fila de SECCIÓN — su total es la Administración REAL: cada subsección ya
      // multiplicada por su factor prestacional (1.1 ×1.45, 1.3 ×1.70, el resto ×1).
      // Se escribe como fórmula al final, cuando ya se conocen las filas que la componen.
      var filaSec = r, refsSec = [], totalSec = 0;
      [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.cap()); });
      sc(wsAU,r,0,safe(sec.numero),ST.cap());
      sc(wsAU,r,1,safe(sec.titulo),ST.cap());
      r++;

      (sec.subsecciones||[]).forEach(function(sub) {
        if(sub.esSeparado) return;   // Imprevistos y Utilidad van en el pie, igual que en pantalla
        var itsAU = sub.items||[];
        var sv = calcAUSubseccion(sub, cd, baseTot);
        var filaSub = r;

        // Fila de SUBSECCIÓN
        [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.lbl()); });
        sc(wsAU,r,0,'  '+safe(sub.numero),ST.lbl());
        sc(wsAU,r,1,safe(sub.titulo),ST.lbl());
        if(itsAU.length) fc(wsAU,filaSub,7,'SUM('+rng(filaSub+1,filaSub+itsAU.length,7)+')',sv,{font:FT("B91C1C",true),fill:FG("F3F4F6"),border:brd,alignment:R_AL});
        else nc(wsAU,filaSub,7,0,{font:FT("B91C1C",true),fill:FG("F3F4F6"),border:brd,alignment:R_AL});
        r++;

        // Ítems
        itsAU.forEach(function(it, ii) {
          var stR = ii%2===0?ST.rowA():ST.rowB();
          var vIt = calcAUItem(it, sub.tipo, cd, baseTot);
          // Recordar dónde quedan los 3 ítems circulares, para verificarlos después
          var _d = String(it.descripcion||'').toLowerCase();
          if(_d.indexOf('póliza')>=0 || _d.indexOf('poliza')>=0) { fila18Pol = r; _val18Pol = vIt; }
          else if(_d.indexOf('estampilla')>=0) { fila18Est = r; _val18Est = vIt; }
          else if(_d.indexOf('transacci')>=0)  { fila18TB  = r; _val18TB  = vIt; }
          var esPersonal = sub.tipo==='personal';
          var esOtrosFijo = sub.tipo==='otros' && it.valorFijo;
          var esOtrosPct  = sub.tipo==='otros' && it.porcentaje!=null && !it.valorFijo;
          var tieneMeses  = it.meses!=null;

          sc(wsAU,r,0,'',stR);                                   // Ítem (vacío, como en pantalla)
          sc(wsAU,r,1,'    '+safe(it.descripcion),stR);          // Descripción
          sc(wsAU,r,2,safe(it.unidad||''),{fill:stR.fill,border:brd,alignment:C_AL}); // Und.

          // Ded.
          if(esPersonal) ndc(wsAU,r,3,Number(it.dedicacion)||0,{fill:stR.fill,border:brd,alignment:R_AL});
          else sc(wsAU,r,3,'—',{fill:stR.fill,border:brd,alignment:C_AL});

          // Cant.
          if(it.cantidad!=null) ndc(wsAU,r,4,Number(it.cantidad)||0,{fill:stR.fill,border:brd,alignment:R_AL});
          else if(it.porcentaje!=null) sc(wsAU,r,4,fmtN2(it.porcentaje)+'%',{fill:stR.fill,border:brd,alignment:R_AL});
          else sc(wsAU,r,4,'—',{fill:stR.fill,border:brd,alignment:C_AL});

          // Valor Base/Unit.
          if(esPersonal) nc(wsAU,r,5,it.valorMesBase||0,ST.mon(stR));
          else if(esOtrosFijo) nc(wsAU,r,5,it.valorFijo||0,ST.mon(stR));
          else if(esOtrosPct) sc(wsAU,r,5,fmtN2(it.porcentaje)+'% s/'+(it.baseCalculo==='total'?'Total':'C.D.'),{fill:stR.fill,border:brd,alignment:R_AL});
          else nc(wsAU,r,5,it.valorUnitario||0,ST.mon(stR));

          // Meses
          if(tieneMeses) n(wsAU,r,6,Number(it.meses)||0,'#,##0.##');
          else sc(wsAU,r,6,'—',{fill:stR.fill,border:brd,alignment:C_AL});

          // Total — fórmula viva cuando la cuenta es un producto
          var stT = {font:{bold:true},fill:stR.fill,border:brd,alignment:R_AL};
          if(esPersonal) {
            // Ded × Cant × Valor Mes × Meses
            fc(wsAU,r,7,ref(r,3)+'*'+ref(r,4)+'*'+ref(r,5)+'*'+ref(r,6),vIt,stT);
          } else if(esOtrosFijo) {
            fc(wsAU,r,7,ref(r,5),vIt,stT);
          } else if(esOtrosPct) {
            nc(wsAU,r,7,vIt,stT);   // % sobre C.D. / Total (se deja el valor del sistema)
          } else if(sub.tipo==='desplazamiento') {
            // Cant × Valor Unit × Meses (si no hay meses, el sistema usa 1)
            if(tieneMeses) fc(wsAU,r,7,ref(r,4)+'*'+ref(r,5)+'*'+ref(r,6),vIt,stT);
            else           fc(wsAU,r,7,ref(r,4)+'*'+ref(r,5),vIt,stT);
          } else {
            nc(wsAU,r,7,vIt,stT);
          }
          r++;
        });

        // Filas de prestaciones — idénticas a las de pantalla
        if(sub.id==='s1_1' && sv>0) {
          [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',{fill:FG("F0FDF4"),border:brd}); });
          sc(wsAU,r,0,'',{fill:FG("F0FDF4"),border:brd});
          sc(wsAU,r,1,'    Personal Profesional y Técnico + Prestaciones (×1.45)',{font:FT("15803D",true),fill:FG("F0FDF4"),border:brd});
          fc(wsAU,r,7,ref(filaSub,7)+'*1.45',sv*1.45,{font:FT("15803D",true),fill:FG("F0FDF4"),border:brd,alignment:R_AL});
          refsAdmin.push(ref(r,7)); refsSec.push(ref(r,7)); totalSec += sv*1.45; r++;
        } else if(sub.id==='s1_3' && sv>0) {
          [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',{fill:FG("EFF6FF"),border:brd}); });
          sc(wsAU,r,0,'',{fill:FG("EFF6FF"),border:brd});
          sc(wsAU,r,1,'    Personal Administrativo y Operativo + Prestaciones (×1.70)',{font:FT("1D4ED8",true),fill:FG("EFF6FF"),border:brd});
          fc(wsAU,r,7,ref(filaSub,7)+'*1.70',sv*1.70,{font:FT("1D4ED8",true),fill:FG("EFF6FF"),border:brd,alignment:R_AL});
          refsAdmin.push(ref(r,7)); refsSec.push(ref(r,7)); totalSec += sv*1.70; r++;
        } else if(sub.id!=='s1_1' && sub.id!=='s1_3') {
          refsAdmin.push(ref(filaSub,7));   // 1.2 y 1.4 a 1.8 entran sin factor
          refsSec.push(ref(filaSub,7)); totalSec += sv;
        }
      });

      // Ya conocemos las filas: el total de la sección es la suma de sus subsecciones
      // CON factor aplicado -> coincide exactamente con la Administración (A).
      if(refsSec.length) fc(wsAU,filaSec,7,refsSec.join('+'),totalSec,ST.tot());
      else nc(wsAU,filaSec,7,0,ST.tot());
    });

    // ── Pie: A — Administración / U — Utilidad / TOTAL A+U ───────────────────
    var pctU_ = res.pctU||0;
    var valU_ = cd*pctU_/100;
    var filaA = r;
    [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.tot()); });
    sc(wsAU,r,0,'A',ST.tot());
    sc(wsAU,r,1,'A — Administración  ·  Suma directa de ítems 1.1 a 1.8',ST.tot());
    if(refsAdmin.length) fc(wsAU,r,7,refsAdmin.join('+'),res.auGastos||0,ST.tot());
    else nc(wsAU,r,7,0,ST.tot());
    r++;

    var filaU = r;
    [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.tot()); });
    sc(wsAU,r,0,'U',ST.tot());
    sc(wsAU,r,1,'U — Utilidad  ·  '+fmtN2(pctU_)+'% sobre C.D.',ST.tot());
    fc(wsAU,r,7,ref(filaCDau,7)+'*'+(pctU_/100),valU_,ST.tot());
    r++;

    var pctAdm = cd>0 ? (res.auGastos||0)/cd*100 : 0;
    [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.tot2()); });
    sc(wsAU,r,0,'',ST.tot2());
    sc(wsAU,r,1,'TOTAL A+U ('+fmtN2(pctAdm+pctU_)+'%)',ST.tot2());
    fc(wsAU,r,7,ref(filaA,7)+'+'+ref(filaU,7),(res.auGastos||0)+valU_,ST.tot2());
    r++;
    r++;

    // Cierre (C.D. + C.I.) y extras
    sc(wsAU,r,0,'',ST.rowA()); sc(wsAU,r,1,'Costo Directo (C.D.)',ST.rowA());
    [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.rowA()); });
    var filaCD2 = r; fc(wsAU,r,7,ref(filaCDau,7),cd,ST.mon()); r++;
    sc(wsAU,r,0,'',ST.tot2()); sc(wsAU,r,1,'COSTO TOTAL (C.D. + C.I.)',ST.tot2());
    [2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.tot2()); });
    var filaTotAU = r;
    fc(wsAU,r,7,ref(filaCD2,7)+'+'+ref(filaA,7)+'+'+ref(filaU,7),res.total,ST.tot2()); r++;

    var refsEx2 = [ref(filaTotAU,7)];
    var filaCostosTot = null;
    // Cada extra se enlaza a la celda TOTAL de su propia hoja (el sistema los guarda
    // redondeados a pesos, por eso el ROUND).
    function filaExtra(campo, etiqueta, valor) {
      if(!(valor>0)) return;
      sc(wsAU,r,1,etiqueta,ST.rowA());
      if(refExtra[campo]) fc(wsAU,r,7,'ROUND('+refExtra[campo]+',0)',valor,ST.mon());
      else n(wsAU,r,7,valor);
      refsEx2.push(ref(r,7)); r++;
    }
    filaExtra('sgSst','SG-SST',extras.sgSst);
    filaExtra('pma','PMA',extras.pma);
    filaExtra('pmt','PMT',extras.pmt);
    filaExtra('gestionSocial','Gestión Social',extras.gestionSocial);
    if(totalExtras>0){
      sc(wsAU,r,1,'COSTOS TOTALES',ST.tot());
      [0,2,3,4,5,6].forEach(function(ci){ sc(wsAU,r,ci,'',ST.tot()); });
      filaCostosTot = r;
      fc(wsAU,r,7,refsEx2.join('+'),res.total+totalExtras,ST.tot()); r++;
    }

    wsAU['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:7}},    // título CÁLCULO A+U
                       {s:{r:1,c:0}, e:{r:1,c:6}}];   // etiqueta Costo Directo (C.D.)
    setRange(wsAU,[{wch:8},{wch:52},{wch:8},{wch:8},{wch:10},{wch:18},{wch:8},{wch:18}]);
    // El bloque de VERIFICACIÓN se escribe abajo, cuando ya existan las hojas de
    // Pólizas y Estampillas contra las que hay que compararse.
    _verif = { ws: wsAU, r: r+1, filaTot: filaTotAU,
               pol: fila18Pol, est: fila18Est, tb: fila18TB,
               vPol: _val18Pol, vEst: _val18Est, vTB: _val18TB };
    var nmAU = nombreUnico('Cálculo A+U');
    refTotAU  = link(nmAU, ref(filaTotAU,7));   // COSTO TOTAL (C.D. + C.I.)
    refAdminAU = link(nmAU, ref(filaA,7));      // A — Administración
    refUtilAU  = link(nmAU, ref(filaU,7));      // U — Utilidad
    refCDAU    = link(nmAU, ref(filaCDau,7));   // Costo Directo
    // Costo de obra para la Ficha = COSTO TOTAL, o COSTOS TOTALES si hay extras
    refObraTot = link(nmAU, ref(filaCostosTot!==null?filaCostosTot:filaTotAU, 7));
    XLSX.utils.book_append_sheet(wb, wsAU, nmAU);
  }

  // ── 3. PÓLIZAS OBRA ───────────────────────────────────────────────────────
  if(tieneObra) {
    var polObra = ((proyecto.polizasPorComp||{}).obra)||{};
    var plz = Number(polObra.plazoContractual)||Number((proyecto.au||{}).plazo)||0;
    var hObra = hojaPolizas(polObra.polizasActivas||[], res.total, plz, 'Pólizas Obra', refTotAU,
      '← COSTO TOTAL (C.D. + C.I.) del Cálculo A+U');
    refPolObraTot = hObra.refTotal; _totPolObra = hObra.total;
  }

  // ── 4. ESTAMPILLAS ────────────────────────────────────────────────────────
  if(tieneObra) {
    var wsE = {}, r = 0;
    var catEst2 = catEst||[];
    var munId = proyecto.municipioId;
    var mg = catEst2.find(function(g){ return g.id===munId; });
    var activas = mg ? (mg.items||[]) : [];

    // Base: el COSTO TOTAL del proyecto. Se pone en una celda visible y todas las
    // estampillas apuntan a ella.
    sc(wsE,r,0,'Base gravable',{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd});
    sc(wsE,r,1,'',{fill:FG("1F2937"),border:brd});
    var filaBaseE = r;
    fc(wsE,r,2,(refTotAU||String(NUM(res.total))),res.total,
       {font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd,alignment:R_AL});
    r++; r++;

    ['Estampilla','%','Valor'].forEach(function(c2,ci){ sc(wsE,r,ci,c2,ST.hdr()); }); r++;
    var totE = 0, filaE1 = r;
    activas.forEach(function(e,ii) {
      // El sistema redondea cada estampilla a pesos -> aquí también (ROUND en Excel)
      var val = Math.round(res.total*(Number(e.pctDef)||0)/100);
      totE += val;
      var stR = ii%2===0?ST.rowA():ST.rowB();
      sc(wsE,r,0,safe(e.nombre||e.tipo),stR);
      npct(wsE,r,1,Number(e.pctDef)||0,{fill:stR.fill,border:brd,alignment:C_AL});
      fc(wsE,r,2,'ROUND('+refA(filaBaseE,2)+'*'+ref(r,1)+'/100,0)',val,ST.mon(stR));
      r++;
    });
    sc(wsE,r,0,'TOTAL ESTAMPILLAS',ST.tot());
    sc(wsE,r,1,'',ST.tot());
    var _filaTotEst = r;
    if(activas.length) fc(wsE,r,2,'SUM('+rng(filaE1,r-1,2)+')',totE,ST.tot()); else nc(wsE,r,2,0,ST.tot());
    wsE['!merges'] = [{s:{r:filaBaseE,c:0}, e:{r:filaBaseE,c:1}}];
    setRange(wsE,[{wch:42},{wch:12},{wch:18}]);
    var nmEst = nombreUnico('Estampillas');
    refEstTot = link(nmEst, ref(_filaTotEst,2)); _totEstObra = totE;
    XLSX.utils.book_append_sheet(wb, wsE, nmEst);
  }

  // ── 4b. FACTOR MULTIPLICADOR ─────────────────────────────────────────────
  // Réplica de la calculadora del sistema: grupos, ítems, subtotales y
  //   FM = 1,00 (salario base) + suma de todas las cargas / 100
  // Todo con fórmulas: si cambias un %, el FM y TODA la interventoría se recalculan.
  if(tieneInt) {
    var wsFM = {}, r = 0;
    var fmD = Object.assign({}, FM_DEFAULTS, ((proyecto.presupInterv||{}).fmData)||{});
    var nmFM = nombreUnico('Factor Multiplicador');

    sc(wsFM,r,0,'⚙️ FACTOR MULTIPLICADOR',{font:FT("FFFFFF",true,13),fill:FG("1F2937"),border:brd});
    [1,2].forEach(function(ci){ sc(wsFM,r,ci,'',{fill:FG("1F2937"),border:brd}); });
    r++;
    sc(wsFM,r,0,'A.1 Salario Mensual (base fija)',{font:FT("92400E",true),fill:FG("FFFBEB"),border:brd});
    sc(wsFM,r,1,'',{fill:FG("FFFBEB"),border:brd});
    var filaBaseFM = r;
    nz(wsFM,r,2,1,'0.0000',{font:FT("92400E",true),fill:FG("FFFBEB"),border:brd,alignment:R_AL});
    r++;
    sc(wsFM,r,0,'Los demás se ingresan como % sobre el salario',{font:FT("92400E",false,10),fill:FG("FFFBEB"),border:brd});
    [1,2].forEach(function(ci){ sc(wsFM,r,ci,'',{fill:FG("FFFBEB"),border:brd}); });
    r++; r++;

    ['Concepto','%','Equivalente'].forEach(function(h,ci){ sc(wsFM,r,ci,h,ST.hdr()); }); r++;

    var refsSub = [];
    FM_GRUPOS.forEach(function(grp) {
      var filaG = r, subt = 0;
      var colG = grp.color.replace('#','');
      var bgG  = grp.bg.replace('#','');
      sc(wsFM,r,0,grp.titulo,{font:FT(colG,true),fill:FG(bgG),border:brd});
      sc(wsFM,r,1,'',{fill:FG(bgG),border:brd});
      sc(wsFM,r,2,'',{fill:FG(bgG),border:brd});
      r++;
      grp.items.forEach(function(item, ii) {
        var v = Number(fmD[item.key]) || 0;
        subt += v;
        var stR = ii%2===0?ST.rowA():ST.rowB();
        sc(wsFM,r,0,'  '+item.label,stR);
        nz(wsFM,r,1,v,'0.00"%"',{fill:stR.fill,border:brd,alignment:R_AL});
        fc(wsFM,r,2,ref(r,1)+'/100',v/100,{fill:stR.fill,border:brd,alignment:R_AL},'0.0000');
        r++;
      });
      // Subtotal del grupo: igual que en pantalla → "Subtotal: X% = 0.XXXX"
      fc(wsFM,filaG,1,'SUM('+rng(filaG+1,r-1,1)+')',subt,
         {font:FT(colG,true),fill:FG(bgG),border:brd,alignment:R_AL},'0.00"%"');
      fc(wsFM,filaG,2,ref(filaG,1)+'/100',subt/100,
         {font:FT(colG,true),fill:FG(bgG),border:brd,alignment:R_AL},'0.0000');
      refsSub.push(ref(filaG,1));
    });

    r++;
    var filaSumFM = r;
    sc(wsFM,r,0,'TOTAL CARGAS',ST.tot());
    var sumaFM = Object.keys(FM_DEFAULTS).reduce(function(a,k){ return a+(Number(fmD[k])||0); },0);
    fc(wsFM,r,1,refsSub.join('+'),sumaFM,{font:FT("FFFFFF",true),fill:FG("991B1B"),border:brd,alignment:R_AL},'0.00"%"');
    fc(wsFM,r,2,ref(r,1)+'/100',sumaFM/100,{font:FT("FFFFFF",true),fill:FG("991B1B"),border:brd,alignment:R_AL},'0.0000');
    r++;

    var filaFM = r;
    sc(wsFM,r,0,'FACTOR MULTIPLICADOR  =  1,00 + cargas',ST.tot2());
    sc(wsFM,r,1,'',ST.tot2());
    fc(wsFM,r,2,ref(filaBaseFM,2)+'+'+ref(filaSumFM,2), 1+sumaFM/100,
       {font:FT("FFFFFF",true,13),fill:FG("991B1B"),border:brd,alignment:R_AL},'0.0000');
    r++;

    refFM = link(nmFM, refA(filaFM,2));
    wsFM['!merges'] = [{s:{r:0,c:0}, e:{r:0,c:2}}];
    setRange(wsFM,[{wch:46},{wch:12},{wch:14}]);
    XLSX.utils.book_append_sheet(wb, wsFM, nmFM);
  }

  // ── 5. PRESUPUESTO INTERVENTORÍA ─────────────────────────────────────────
  if(tieneInt) {
    var wsI = {}, r = 0;
    var pi = proyecto.presupInterv||{};
    var fmD = pi.fmData||{};
    var fm = calcFMdesdeData(fmD);
    var _piPlazo = Number((((proyecto.polizasPorComp||{}).interventoria)||{}).plazoContractual)||Number(pi.plazo)||0;
    var _piPolD  = ((proyecto.polizasPorComp||{}).interventoria)||{};
    var _piEst   = getEstampillasMunicipio(catEst||[], proyecto.municipioId, "interv");
    var subtotal12 = calcTotalPresupInterv(pi);
    var RR = calcResumenInterv(subtotal12, _piEst, _piPolD.polizasActivas||[], _piPlazo);

    // Título
    sc(wsI,r,0,"PRESUPUESTO INTERVENTORÍA",{font:FT("FFFFFF",true,13),fill:FG("1D4ED8"),border:brd});
    [1,2,3,4].forEach(function(ci){ sc(wsI,r,ci,"",{fill:FG("1D4ED8"),border:brd}); });
    r++; r++;

    // Factor Multiplicador desglose
    // El desglose del FM vive en su propia hoja (igual que la calculadora del sistema).
    // Aquí solo se muestra el resultado, enlazado a esa hoja.
    sc(wsI,r,0,"Factor Multiplicador (FM)",ST.lbl());
    [1,2,3,4,5,6].forEach(function(ci){ sc(wsI,r,ci,"",ST.lbl()); });
    if(refFM) fc(wsI,r,7,refFM,fm,{font:FT("1D4ED8",true,12),fill:FG("EFF6FF"),border:brd,alignment:R_AL},'0.0000');
    else nz(wsI,r,7,fm,'0.0000',{font:FT("1D4ED8",true,12),fill:FG("EFF6FF"),border:brd,alignment:R_AL});
    r++;
    sc(wsI,r,0,"Ver el desglose completo en la hoja «Factor Multiplicador»",
       {font:FT("6B7280",false,10),fill:FG("F9FAFB"),border:brd});
    [1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",{fill:FG("F9FAFB"),border:brd}); });
    r++; r++;

    // Column headers
    ["Ítem","Und","Cantidad","V. Mes Base","Ded.","Meses","Factor","Total"].forEach(function(h,ci){
      sc(wsI,r,ci,h,ST.hdr());
    }); r++;

    // Capítulos e ítems — Total = fórmula (Cant × V.Base × Ded × Meses × FM)
    var refsCapI = [];
    (pi.capitulos||[]).forEach(function(cap) {
      var itemsI = cap.items||[];
      var subT = itemsI.reduce(function(ss,it){
        return ss+(cap.tipo==="personal"
          ?(Number(it.valorMesBase)||0)*(Number(it.cantidad)||0)*(Number(it.dedicacion)||1)*(Number(it.meses)||0)
          :(Number(it.cantidad)||0)*(Number(it.valorUnitario)||0)*(Number(it.meses)||1));
      },0);
      var capT = cap.tipo==="personal"?subT*fm:subT;
      var filaCapI = r;
      [0,1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",ST.cap()); });
      sc(wsI,r,0,safe(cap.titulo||cap.nombre||""),ST.cap());
      if(cap.tipo==="personal" && refFM) fc(wsI,filaCapI,6,refFM,fm,ST.cap(),'"×"0.0000');
      else if(cap.tipo==="personal") sc(wsI,r,6,"×"+fm,ST.cap());
      if(itemsI.length) fc(wsI,filaCapI,7,'SUM('+rng(filaCapI+1,filaCapI+itemsI.length,7)+')',capT,ST.tot());
      else nc(wsI,filaCapI,7,0,ST.tot());
      refsCapI.push(ref(filaCapI,7));
      r++;
      itemsI.forEach(function(it,ii) {
        var itV = cap.tipo==="personal"
          ?(Number(it.valorMesBase)||0)*(Number(it.cantidad)||0)*(Number(it.dedicacion)||1)*(Number(it.meses)||0)*fm
          :(Number(it.cantidad)||0)*(Number(it.valorUnitario)||0)*(Number(it.meses)||1);
        var stR = ii%2===0?ST.rowA():ST.rowB();
        sc(wsI,r,0,safe(it.descripcion||""),stR);
        sc(wsI,r,1,safe(it.unidad||""),{fill:stR.fill,border:brd,alignment:C_AL});
        ndc(wsI,r,2,it.cantidad||0,{fill:stR.fill,border:brd,alignment:R_AL});
        nc(wsI,r,3,it.valorMesBase||it.valorUnitario||0,ST.mon(stR));
        ndc(wsI,r,4,cap.tipo==="personal"?(Number(it.dedicacion)||1):1,{fill:stR.fill,border:brd,alignment:R_AL});
        n(wsI,r,5,cap.tipo==="personal"?(Number(it.meses)||0):(Number(it.meses)||1),'#,##0.##');
        // Factor → enlazado a la hoja "Factor Multiplicador"
        if(cap.tipo==="personal" && refFM) fc(wsI,r,6,refFM,fm,{fill:stR.fill,border:brd,alignment:C_AL},'0.0000');
        else ndc(wsI,r,6,cap.tipo==="personal"?fm:1,{fill:stR.fill,border:brd,alignment:C_AL});
        // Total = Cantidad × V.Base × Ded × Meses × Factor  (C×D×E×F×G)
        fc(wsI,r,7,ref(r,2)+'*'+ref(r,3)+'*'+ref(r,4)+'*'+ref(r,5)+'*'+ref(r,6),itV,
           {font:{bold:true},fill:stR.fill,border:brd,alignment:R_AL});
        r++;
      });
    });
    r++;

    // Resumen final
    var filaSub12 = r;
    [0,1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",ST.cap()); });
    sc(wsI,r,0,"SUBTOTAL (1+2)",ST.cap());
    if(refsCapI.length) fc(wsI,r,7,refsCapI.join('+'),subtotal12,ST.tot()); else nc(wsI,r,7,0,ST.tot());
    r++;

    // ── COSTOS DE PERFECCIONAMIENTO ─────────────────────────────────────
    // Ojo: esto también es CIRCULAR. Las estampillas, las pólizas y el 4x1000 se
    // calculan sobre el SUBTOTAL GENERAL / VALOR TOTAL, y a la vez están dentro de
    // ellos. El sistema lo resuelve iterando (calcResumenInterv). En Excel no se
    // puede cerrar el bucle, así que la BASE va en una celda visible (ya convergida)
    // y todo lo demás son fórmulas que apuntan a ella. Abajo hay una celda que avisa
    // si la base se desactualiza.
    r++;
    sc(wsI,r,0,"Base de perfeccionamiento (SUBTOTAL GENERAL convergido)",
       {font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd});
    [1,2,3,4,5,6].forEach(function(ci){ sc(wsI,r,ci,"",{fill:FG("1F2937"),border:brd}); });
    var filaBaseP = r;
    nc(wsI,r,7,RR.subtotalGeneral,{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd,alignment:R_AL});
    r++;

    // IVA: 19% del subtotal (1+2). Esto NO es circular.
    var filaIva = r;
    sc(wsI,r,0,"IVA 19% — Base antes de impuestos y pólizas",ST.rowA());
    [1,2,3,4,5,6].forEach(function(ci){ sc(wsI,r,ci,"",ST.rowA()); });
    fc(wsI,r,7,'ROUND('+ref(filaSub12,7)+'*0.19,0)',RR.iva,ST.mon()); r++;
    r++;

    // Estampillas — cada una = % sobre la base
    var refImp = null;
    if(_piEst.length) {
      [0,1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",ST.lbl()); });
      sc(wsI,r,0,"COSTOS DE PERFECCIONAMIENTO (IMPUESTOS)",ST.lbl()); r++;
      _piEst.forEach(function(e,ii) {
        var val = Math.round(RR.subtotalGeneral*(Number(e.pctDef)||0)/100);
        var stR = ii%2===0?ST.rowA():ST.rowB();
        sc(wsI,r,0,"  Estampilla "+safe(e.nombre||e.tipo||""),stR);
        [1,2,3,4,5].forEach(function(ci){ sc(wsI,r,ci,"",stR); });
        npct(wsI,r,6,Number(e.pctDef)||0,{fill:stR.fill,border:brd,alignment:C_AL});
        fc(wsI,r,7,'ROUND('+refA(filaBaseP,7)+'*'+ref(r,6)+'/100,0)',val,ST.mon(stR));
        r++;
      });
      var filaTotImp = r;
      sc(wsI,r,0,"Total Estampillas",ST.tot());
      [1,2,3,4,5].forEach(function(ci){ sc(wsI,r,ci,"",ST.tot()); });
      npct(wsI,r,6,(RR.tasaTotal||0)*100,{font:{bold:true},fill:FG("FEE2E2"),border:brd,alignment:C_AL});
      // El sistema redondea la TASA TOTAL sobre la base (no suma los redondeos uno a uno)
      fc(wsI,r,7,'ROUND('+refA(filaBaseP,7)+'*'+ref(r,6)+'/100,0)',RR.impuestos,ST.tot());
      refImp = ref(filaTotImp,7);
      r++;
    }
    r++;

    // Pólizas + 4x1000
    var refPolI = null, refTB = null;
    var nPols = (_piPolD.polizasActivas||[]).length;
    var filaPolI = null;
    if(nPols) {
      [0,1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",ST.lbl()); });
      sc(wsI,r,0,"COSTOS DE PERFECCIONAMIENTO (PÓLIZAS Y TRANSACCIONES BANCARIAS)",ST.lbl()); r++;
      filaPolI = r;
      sc(wsI,r,0,"  Pólizas y garantías ("+nPols+" pólizas · plazo "+_piPlazo+" meses)",ST.rowA());
      [1,2,3,4,5,6].forEach(function(ci){ sc(wsI,r,ci,"",ST.rowA()); });
      nc(wsI,r,7,RR.primasTotal,ST.mon());   // se enlaza a su hoja más abajo
      refPolI = ref(filaPolI,7);
      r++;
      // 4x1000 sobre la mitad = 0,2% del VALOR TOTAL (= base + IVA)
      sc(wsI,r,0,"  50% Impuesto 4/1000 (0,2% sobre valor total)",ST.rowB());
      [1,2,3,4,5,6].forEach(function(ci){ sc(wsI,r,ci,"",ST.rowB()); });
      fc(wsI,r,7,'ROUND(('+refA(filaBaseP,7)+'+'+ref(filaIva,7)+')*0.002,0)',RR.tb,ST.mon());
      refTB = ref(r,7);
      r++;
    }

    // Totales finales
    r++;
    var filaSubG = r;
    [0,1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",ST.cap()); });
    sc(wsI,r,0,"SUBTOTAL GENERAL",ST.cap());
    var partes = [ref(filaSub12,7)];
    if(refImp)  partes.push(refImp);
    if(refPolI) partes.push(refPolI);
    if(refTB)   partes.push(refTB);
    fc(wsI,r,7,partes.join('+'),RR.subtotalGeneral,ST.tot()); r++;

    [0,1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",ST.tot2()); });
    sc(wsI,r,0,"VALOR TOTAL INTERVENTORÍA",ST.tot2());
    var filaVTI = r;
    fc(wsI,r,7,ref(filaSubG,7)+'+'+ref(filaIva,7),RR.valorTotal,ST.tot2()); r++;

    // Semáforo: ¿la base sigue al día?
    r++;
    sc(wsI,r,0,"VERIFICACIÓN",{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd});
    [1,2,3,4,5,6,7].forEach(function(ci){ sc(wsI,r,ci,"",{fill:FG("1F2937"),border:brd}); });
    r++;
    sc(wsI,r,0,"La base de perfeccionamiento debe ser igual al SUBTOTAL GENERAL",ST.rowA());
    [1,2,3,4,5,6].forEach(function(ci){ sc(wsI,r,ci,"",ST.rowA()); });
    wsI[XLSX.utils.encode_cell({r:r,c:7})] = { t:'s',
      f:'IF(ROUND('+ref(filaSubG,7)+'-'+ref(filaBaseP,7)+',0)=0,"✓ cuadra",'+
        '"⚠ BASE DESACTUALIZADA: copia "&TEXT('+ref(filaSubG,7)+',"#,##0")&" en la celda de arriba")',
      v:'✓ cuadra',
      s:{font:FT('15803D',true),fill:FG('F0FDF4'),border:brd} };
    r++;

    setRange(wsI,[{wch:52},{wch:8},{wch:10},{wch:18},{wch:8},{wch:8},{wch:10},{wch:18}]);
    var nmI = nombreUnico("Presupuesto Interventoría");
    refIntTot = 'ROUND('+link(nmI, ref(filaVTI,7))+',0)';   // el sistema redondea esta base
    _wsIntv = { ws: wsI, filaPol: filaPolI, nombre: nmI };
    XLSX.utils.book_append_sheet(wb, wsI, nmI);
  }

  // ── Calcular totales correctos (igual que VER) ──────────────────────────
  // ── VERIFICACIÓN DE CUADRE (en la hoja Cálculo A+U) ──────────────────────
  // Los 3 ítems circulares de la 1.8 se comparan contra las hojas donde realmente
  // se calculan. Si no cuadran, la celda lo dice: nunca un descuadre silencioso.
  if(_verif) {
    var wsV = _verif.ws, rv = _verif.r;
    sc(wsV,rv,0,'VERIFICACIÓN',{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd});
    [1,2,3,4,5,6,7].forEach(function(ci){ sc(wsV,rv,ci,'',{fill:FG("1F2937"),border:brd}); });
    rv++;
    var _chk = function(etiqueta, filaItem, expr, esperado, actual) {
      if(filaItem===null || filaItem===undefined) return;
      sc(wsV,rv,0,'',ST.rowA());
      sc(wsV,rv,1,etiqueta,ST.rowA());
      [2,3,4,5,6].forEach(function(ci){ sc(wsV,rv,ci,'',ST.rowA()); });
      var ok = Math.abs(esperado-actual) < 1;
      wsV[XLSX.utils.encode_cell({r:rv,c:7})] = { t:'s',
        f:'IF(ROUND('+expr+'-'+ref(filaItem,7)+',0)=0,"✓ cuadra","⚠ DESCUADRE: debería ser "&TEXT('+expr+',"#,##0"))',
        v: ok ? '✓ cuadra' : ('⚠ DESCUADRE: debería ser '+Math.round(esperado)),
        s: { font:FT(ok?'15803D':'B91C1C',true), fill:FG(ok?'F0FDF4':'FEF2F2'), border:brd } };
      rv++;
    };
    if(refPolObraTot) _chk('Pólizas 1.8  vs  hoja Pólizas Obra', _verif.pol, refPolObraTot, _totPolObra, _verif.vPol);
    if(refEstTot)     _chk('Estampillas 1.8  vs  hoja Estampillas', _verif.est, refEstTot, _totEstObra, _verif.vEst);
    _chk('Transacciones Bancarias 1.8  =  0,2% del COSTO TOTAL', _verif.tb,
         'ROUND('+ref(_verif.filaTot,7)+'*0.002,0)', Math.round(res.total*0.002), _verif.vTB);
    setRange(wsV, wsV['!cols']);
  }

  var _extrasObraExp = getExtras(proyecto);
  var _obraTotal = res.total + getExtrasTotal(proyecto);
  var _intervSub  = calcTotalPresupInterv(proyecto.presupInterv);
  var _intervPolD = ((proyecto.polizasPorComp||{}).interventoria)||{};
  var _intervPlazo= Number(_intervPolD.plazoContractual)||Number((proyecto.presupInterv||{}).plazo)||0;
  var _intervEst  = getEstampillasMunicipio(catEst||[], proyecto.municipioId, "interv");
  var _intervTotal = Math.round(calcResumenInterv(_intervSub, _intervEst, _intervPolD.polizasActivas||[], _intervPlazo).valorTotal);

  // ── 6. PÓLIZAS INTERVENTORÍA ─────────────────────────────────────────────
  if(tieneInt) {
    var polInt = ((proyecto.polizasPorComp||{}).interventoria)||{};
    var plzI = Number(polInt.plazoContractual)||Number((proyecto.presupInterv||{}).plazo)||Number((proyecto.au||{}).plazo)||0;
    // La base va como VALOR: el VALOR TOTAL depende de estas pólizas y viceversa
    // (bucle). Se enlaza en el sentido útil: el presupuesto apunta a esta hoja.
    var hInt = hojaPolizas(polInt.polizasActivas||[], _intervTotal, plzI, 'Pólizas Interventoría', null,
      '← VALOR TOTAL del Presupuesto de Interventoría (calculado por iteración)');
    // Ahora sí: la fila "Pólizas y garantías" del presupuesto apunta a esta hoja
    if(_wsIntv && _wsIntv.filaPol !== null && _wsIntv.filaPol !== undefined) {
      fc(_wsIntv.ws, _wsIntv.filaPol, 7, hInt.refTotal, hInt.total, ST.mon());
      setRange(_wsIntv.ws, _wsIntv.ws['!cols']);
    }
  }
  var totalExtrasObra = getExtrasTotal(proyecto);
  var _fichaR = calcFichaFinanciera(proyecto, _obraTotal, _intervTotal, 0, 50);
  var _fichaBase = _fichaR.totalRecursos || _obraTotal; // SUBTOTAL RECURSOS A ADMINISTRAR

  // ── 7. PÓLIZAS EDESO ─────────────────────────────────────────────────────
  // OJO: la base (SUBTOTAL RECURSOS) depende de estas pólizas y viceversa — el
  // sistema lo resuelve iterando. En Excel no se puede enlazar en los dos sentidos
  // (sería referencia circular), así que aquí la base va como valor y es la Ficha
  // la que se enlaza a esta hoja.
  var refPolEdeso = null, _hojaEd = null;
  if(tieneObra || tieneInt) {
    var polEd = ((proyecto.polizasPorComp||{}).edeso)||{};
    // Mismo plazo que usa calcFichaFinanciera: si no hay plazo contractual explícito,
    // cae a la duración de la ficha. Antes el Excel caía a 0 y las pólizas EDESO
    // salían distintas a las del sistema.
    var plzEd = Number(polEd.plazoContractual) || Number((proyecto.fichaFinanciera||{}).duracion) || 0;
    _hojaEd = hojaPolizas(polEd.polizasActivas||[], _fichaBase, plzEd, 'Pólizas EDESO', null,
      '← SUBTOTAL RECURSOS A ADMINISTRAR (Ficha Financiera). Se calcula por iteración, por eso va como valor y no como enlace.');
    refPolEdeso = _hojaEd.refTotal;
  }

  // ── 8. FICHA FINANCIERA ───────────────────────────────────────────────────
  // Todo enlazado: Costo de obra → Cálculo A+U, Interventoría → su presupuesto,
  // Pólizas EDESO → su hoja, y el resto son fórmulas encadenadas dentro de la hoja.
  if(tieneObra || tieneInt) {
  var wsFF = {}, r = 0;
  var ff = proyecto.fichaFinanciera||{};
  var R = _fichaR;
  var pctHon = ff.pctHonoarios!==undefined ? ff.pctHonoarios : 0.08;
  var nmFF = nombreUnico('Ficha Financiera');
  var tieneConsult = comps.includes('consultoria');

  sc(wsFF,r,0,'FICHA FINANCIERA',{font:FT("FFFFFF",true,14),fill:FG("1F2937"),border:brd});
  [1,2,3,4].forEach(function(ci){ sc(wsFF,r,ci,'',{fill:FG("1F2937"),border:brd}); });
  r++; r++;

  sc(wsFF,r,0,'Concepto',ST.hdr());
  [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.hdr()); });
  sc(wsFF,r,4,'Valor',ST.hdr()); r++;

  // Filas del resumen financiero (col 4 = Valor)
  var fObra = r;
  sc(wsFF,r,0,'Costo de obra',ST.lbl()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
  // ROUND(...,0): el costo de obra que baja del A+U trae decimales (p.ej. ...,8848).
  // El sistema lo redondea a entero antes de usarlo en la Ficha; sin este ROUND el
  // Excel arrastraba el decimal y el SUBTOTAL salía $1 distinto (y desincronizaba la
  // base de EDESO). Redondeamos aquí igual que el sistema.
  if(refObraTot) fc(wsFF,r,4,'ROUND('+refObraTot+',0)',Math.round(R.obraTotal),ST.mon()); else nc(wsFF,r,4,Math.round(R.obraTotal),ST.mon());
  r++;

  var fInt = r;
  sc(wsFF,r,0,'Interventoría',ST.lbl()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
  if(refIntTot && R.intervTotal) fc(wsFF,r,4,refIntTot,R.intervTotal,ST.mon()); else nc(wsFF,r,4,R.intervTotal,ST.mon());
  r++;

  var fCons = null;
  if(tieneConsult) {
    fCons = r;
    sc(wsFF,r,0,'Consultoría / Diseño',ST.lbl()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
    nc(wsFF,r,4,R.consultTotal||0,ST.mon()); r++;
  }

  var fInd = r;   // Costos indirectos: se llena al final (= suma de los componentes de abajo)
  sc(wsFF,r,0,'Costos indirectos del proyecto',ST.lbl()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
  r++;

  var fSub = r;
  sc(wsFF,r,0,'SUBTOTAL RECURSOS A ADMINISTRAR',ST.tot2()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.tot2()); });
  var sumDir = ref(fObra,4)+'+'+ref(fInt,4)+(fCons!==null?('+'+ref(fCons,4)):'');
  // Igualar EXACTAMENTE a calcFichaFinanciera del sistema:
  //   subtotalDirecto = round(obra + interv)
  //   totalRecursos   = round(subtotalDirecto + indirecto)   ← doble redondeo
  // Antes el Excel omitía el segundo ROUND y salía $1 distinto al sistema.
  fc(wsFF,r,4,'ROUND(ROUND('+sumDir+',0)+'+ref(fInd,4)+',0)', R.totalRecursos, ST.tot2());
  refFichaB = link(nmFF, ref(fSub,4));
  r++; r++;

  var fHon = r;
  sc(wsFF,r,0,'HONORARIOS A.D.R.',ST.lbl()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
  fc(wsFF,r,4,'ROUND(ROUND('+sumDir+',0)*'+pctHon+',0)', R.honorarios, ST.mon());
  r++;

  var fIva = r;
  sc(wsFF,r,0,'IVA 19%',ST.lbl()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
  fc(wsFF,r,4,'ROUND('+ref(fHon,4)+'*0.19,0)', R.iva, ST.mon());
  r++;

  sc(wsFF,r,0,'TOTAL HONORARIOS POR ADMINISTRACIÓN',ST.tot2()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.tot2()); });
  fc(wsFF,r,4,ref(fHon,4)+'+'+ref(fIva,4), R.honorarios+R.iva, ST.tot2());
  r++;

  sc(wsFF,r,0,'VALOR TOTAL DE RECURSOS A INVERTIR',ST.tot2()); [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.tot2()); });
  fc(wsFF,r,4,'ROUND('+ref(fSub,4)+'+'+ref(fHon,4)+'+'+ref(fIva,4)+',0)', R.totalContrato, ST.tot2());
  r++; r++;

  // ── Componentes de Costos Indirectos ────────────────────────────────────
  sc(wsFF,r,0,'Componentes de Costos Indirectos',{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd});
  sc(wsFF,r,1,'Cant.',ST.hdr()); sc(wsFF,r,2,'Meses',ST.hdr());
  sc(wsFF,r,3,'V. Unitario',ST.hdr()); sc(wsFF,r,4,'Total',ST.hdr()); r++;

  var refsGrupo = [];   // totales de grupo que suman los Costos Indirectos
  var compDefs = [
    {key:'componentesPersonal',  label:'Personal',   sinUnitario:true },
    {key:'componentesSocial',    label:'Social'    },
    {key:'componentesLogistico', label:'Logístico' }
  ];
  compDefs.forEach(function(ct) {
    var items = (ff[ct.key]||[]).filter(function(it){ return it.activo!==false; });
    if(!items.length) return;
    var filaG = r, totG = 0;
    [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.cap()); });
    sc(wsFF,r,0,ct.label,ST.cap());
    r++;
    items.forEach(function(it, ii) {
      var v = (Number(it.cantidad)||0)*(Number(it.meses)||1)*(Number(it.valorUnit)||0);
      totG += v;
      var stR = ii%2===0?ST.rowA():ST.rowB();
      sc(wsFF,r,0,'  '+safe(it.descripcion),stR);
      if(ct.sinUnitario) {
        // Personal: igual que en el sistema, no se muestran cantidad ni valor unitario
        sc(wsFF,r,1,'',{fill:stR.fill,border:brd});
        n(wsFF,r,2,Number(it.meses)||1,'#,##0.##');
        sc(wsFF,r,3,'',{fill:stR.fill,border:brd});
        nc(wsFF,r,4,v,{font:{bold:true},fill:stR.fill,border:brd,alignment:R_AL});
      } else {
        ndc(wsFF,r,1,Number(it.cantidad)||0,{fill:stR.fill,border:brd,alignment:C_AL});
        n(wsFF,r,2,Number(it.meses)||1,'#,##0.##');
        nc(wsFF,r,3,it.valorUnit||0,ST.mon(stR));
        fc(wsFF,r,4,ref(r,1)+'*'+ref(r,2)+'*'+ref(r,3),v,{font:{bold:true},fill:stR.fill,border:brd,alignment:R_AL});
      }
      r++;
    });
    fc(wsFF,filaG,4,'SUM('+rng(filaG+1,r-1,4)+')',totG,ST.tot());
    refsGrupo.push(ref(filaG,4));
  });

  // Pólizas y Garantías EDESO — ahora va aquí dentro, enlazada a su hoja
  if((R.polizasEdeso||0) > 0 || refPolEdeso) {
    var filaEd = r;
    [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.cap()); });
    sc(wsFF,r,0,'Pólizas y Garantías EDESO',ST.cap());
    if(refPolEdeso) fc(wsFF,r,4,refPolEdeso,R.polizasEdeso||0,ST.tot());
    else nc(wsFF,r,4,R.polizasEdeso||0,ST.tot());
    refsGrupo.push(ref(filaEd,4));
    r++;
  }

  // Diseño / Consultoría — informativo: NO entra en los costos indirectos
  var itemsDis = (ff.componentesDiseno||[]).filter(function(it){ return it.activo!==false; });
  if(itemsDis.length) {
    var filaD = r, totD = 0;
    [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',ST.lbl()); });
    sc(wsFF,r,0,'Diseño / Consultoría (informativo)',ST.lbl());
    r++;
    itemsDis.forEach(function(it, ii) {
      var v = Number(it.valor)||((Number(it.cantidad)||0)*(Number(it.meses)||1)*(Number(it.valorUnit)||0));
      totD += v;
      var stR = ii%2===0?ST.rowA():ST.rowB();
      sc(wsFF,r,0,'  '+safe(it.descripcion),stR);
      [1,2,3].forEach(function(ci){ sc(wsFF,r,ci,'',{fill:stR.fill,border:brd}); });
      nc(wsFF,r,4,v,{font:{bold:true},fill:stR.fill,border:brd,alignment:R_AL});
      r++;
    });
    fc(wsFF,filaD,4,'SUM('+rng(filaD+1,r-1,4)+')',totD,ST.lbl());
  }

  // Ya conocemos los grupos: Costos indirectos = suma de ellos (redondeada, igual que el sistema)
  if(refsGrupo.length) fc(wsFF,fInd,4,'ROUND('+refsGrupo.join('+')+',0)', R.subtotalIndirecto, ST.mon());
  else nc(wsFF,fInd,4, R.subtotalIndirecto, ST.mon());

  setRange(wsFF,[{wch:45},{wch:10},{wch:8},{wch:18},{wch:20}]);
  XLSX.utils.book_append_sheet(wb, wsFF, nmFF);

  // ── AVISO DE BASE DESACTUALIZADA ────────────────────────────────────────
  // La base de las pólizas EDESO no se puede enlazar (sería referencia circular),
  // así que se pone un semáforo: si alguien edita el Excel y el SUBTOTAL cambia,
  // esta celda lo grita en vez de dejar pasar un descuadre silencioso.
  if(_hojaEd && refFichaB) {
    var wsEd = _hojaEd.ws, fb = _hojaEd.filaBase;
    var kAviso = XLSX.utils.encode_cell({r:fb+1, c:0});
    wsEd[kAviso] = { t:'s', f:'IF(ROUND('+refFichaB+'-'+ref(fb,2)+',0)=0,"✓ Base al día",'+
                    '"⚠ BASE DESACTUALIZADA — el SUBTOTAL de la Ficha cambió. Copia el nuevo valor aquí arriba o vuelve a exportar desde el sistema.")',
                    v:'✓ Base al día',
                    s:{font:FT('15803D',true),fill:FG('F0FDF4'),border:brd} };
    [1,2,3,4,5].forEach(function(ci){
      wsEd[XLSX.utils.encode_cell({r:fb+1, c:ci})] = { t:'s', v:'', s:{fill:FG('F0FDF4'),border:brd} };
    });
    var cols = wsEd['!cols'];
    setRange(wsEd, cols);
  }
  }

  // ── 9. RESUMEN ────────────────────────────────────────────────────────────
  var wsR = {}, r = 0;
  var extras2 = getExtras(proyecto);
  var totEx2 = (extras2.sgSst||0)+(extras2.pma||0)+(extras2.pmt||0)+(extras2.gestionSocial||0);

  s(wsR,r,0,'RESUMEN GENERAL'); r++; r++;
  ['Ítem','Capítulo','C.D.','% Incid.'].forEach(function(h,ci){ sc(wsR,r,ci,h,ST.hdr()); }); r++;

  // Una tabla de capítulos por cada presupuesto (igual a las tarjetas de la pestaña "📋 Resumen")
  var refsPs = [];
  presups.forEach(function(ps) {
    var capsR = ps.capitulos||[];
    var cdPs = capsR.reduce(function(ss,cap){
      return ss+(cap.items||[]).reduce(function(s2,it){ return s2+calcItem(it,apus,recursos,proyecto,ps); },0);
    },0);
    var filaPs = r;

    [0,1,2,3].forEach(function(ci){ sc(wsR,r,ci,'',ST.cap()); });
    sc(wsR,r,1,safe(ps.nombre||'Presupuesto Obra'),ST.cap());
    if(capsR.length) fc(wsR,filaPs,2,'SUM('+rng(filaPs+1,filaPs+capsR.length,2)+')',cdPs,ST.tot());
    else nc(wsR,filaPs,2,0,ST.tot());
    refsPs.push(ref(filaPs,2));
    r++;
    capsR.forEach(function(cap, ci2) {
      var cdC = (cap.items||[]).reduce(function(ss,it){ return ss+calcItem(it,apus,recursos,proyecto,ps); },0);
      s(wsR,r,0,safe(cap.numero)); s(wsR,r,1,safe(cap.nombre));
      // C.D. del capítulo → enlazado a la fila del capítulo en su hoja de presupuesto
      var lnkCap = (refCapPs[ps.id]||[])[ci2];
      if(lnkCap) fc(wsR,r,2,lnkCap.ref,cdC,ST.mon());
      else n(wsR,r,2,cdC);
      fpc(wsR,r,3,'IF('+refA(filaPs,2)+'=0,0,'+ref(r,2)+'/'+refA(filaPs,2)+')',(cdPs>0?cdC/cdPs:0));
      r++;
    });
    r++;
  });

  // Bloque de totales combinado del proyecto — igual al de la pestaña "📋 Resumen"
  var cdTotal = cd;
  var auAdmin = res.auGastos||0;
  var uTotal  = cdTotal*(res.pctU||0)/100;
  var costoTotalR = cdTotal+auAdmin+uTotal;   // === res.total (sin redondeos intermedios)
  var filaCDr = r, filaAr = r+1, filaUr = r+2, filaTotR = r+3;

  [0,1,2,3].forEach(function(ci){ sc(wsR,r,ci,'',ST.tot()); });
  sc(wsR,r,1,'Costo Directo (C.D.)',ST.tot());
  if(refsPs.length) fc(wsR,r,2,refsPs.join('+'),cdTotal,ST.tot()); else nc(wsR,r,2,0,ST.tot());
  pc(wsR,r,3,'100%',ST.tot()); r++;
  sc(wsR,r,1,'Administración ('+(res.pctA||0).toFixed(2)+'%)',ST.rowA());
  if(refAdminAU) fc(wsR,r,2,refAdminAU,auAdmin,ST.mon()); else nc(wsR,r,2,auAdmin,ST.mon());
  pc(wsR,r,3,(res.pctA||0).toFixed(2)+'%',ST.rowA()); r++;
  sc(wsR,r,1,'Utilidad ('+(res.pctU||0).toFixed(2)+'%)',ST.rowB());
  if(refUtilAU) fc(wsR,r,2,refUtilAU,uTotal,ST.mon());
  else fc(wsR,r,2,ref(filaCDr,2)+'*'+((res.pctU||0)/100),uTotal,ST.mon());
  pc(wsR,r,3,(res.pctU||0).toFixed(2)+'%',ST.rowB()); r++;
  [0,1,2,3].forEach(function(ci){ sc(wsR,r,ci,'',ST.tot2()); });
  sc(wsR,r,1,'COSTO TOTAL (C.D. + C.I.)',ST.tot2());
  fc(wsR,r,2,ref(filaCDr,2)+'+'+ref(filaAr,2)+'+'+ref(filaUr,2),costoTotalR,ST.tot2()); r++;
  var refsEx = [ref(filaTotR,2)];
  function filaExtraR(campo, etiqueta, valor) {
    if(!(valor>0)) return;
    s(wsR,r,1,etiqueta);
    if(refExtra[campo]) fc(wsR,r,2,'ROUND('+refExtra[campo]+',0)',valor,ST.mon());
    else n(wsR,r,2,valor);
    s(wsR,r,3,cdTotal>0?(valor/cdTotal*100).toFixed(3)+'%':'');
    refsEx.push(ref(r,2)); r++;
  }
  filaExtraR('sgSst','SG-SST',extras2.sgSst);
  filaExtraR('pma','PMA',extras2.pma);
  filaExtraR('pmt','PMT',extras2.pmt);
  filaExtraR('gestionSocial','Gestión Social',extras2.gestionSocial);
  if(totEx2>0){
    [0,1,2,3].forEach(function(ci){ sc(wsR,r,ci,'',ST.tot()); });
    sc(wsR,r,1,'COSTOS TOTALES',ST.tot());
    fc(wsR,r,2,refsEx.join('+'),costoTotalR+totEx2,ST.tot()); r++;
  }

  setRange(wsR,[{wch:8},{wch:55},{wch:20},{wch:10}]);
  XLSX.utils.book_append_sheet(wb, wsR, 'Resumen');

  // ── 10. HOJAS DE APUs Y RECURSOS (construidas al inicio para poder enlazarlas) ──
  hojasFin.forEach(function(h){ XLSX.utils.book_append_sheet(wb, h.ws, h.nm); });

  // ── EXPORT ───────────────────────────────────────────────────────────────
  // ── EXTRAS: hojas construidas antes (para poder enlazarlas desde el A+U) ──
  hojasExtras.forEach(function(h){ XLSX.utils.book_append_sheet(wb, h.ws, h.nm); });

  XLSX.writeFile(wb, (proyecto.nombre||'Proyecto').replace(/[\/\\?*\[\]:]/g,'').slice(0,50)+'.xlsx');
}




// ── Panel Observaciones del Proyecto (drawer lateral con hilos) ──────────
const TAB_LABELS_MAP = {
  presupuesto_obra:"Presupuesto Obra",
  polizas_obra:"Pólizas Obra", polizas_interventoria:"Pólizas Interventoría",
  polizas_consultoria:"Pólizas Consultoría", estampillas:"Estampillas",
  calculo_au:"Cálculo A+U", apus_usados:"APUs Proyectos",
  presupInterv_:"Presup. Interventoría", presupConsult_:"Presup. Consultoría",
};
function tabLabelFromId(cid) {
  if(!cid) return "General";
  for(const [k,v] of Object.entries(TAB_LABELS_MAP)) if(cid.startsWith(k)) return v;
  if(cid.startsWith("apu_")) return "APU · "+cid.slice(4);
  if(cid.startsWith("au_"))  return "A+U · "+cid.slice(3);
  return cid;
}

function PanelObsProyecto({proyecto, perfil, session, onClose}) {
  const [obs,    setObs]    = useState([]);
  const [busy,   setBusy]   = useState(true);
  const [texto,  setTexto]  = useState("");
  const [replyTo,setReplyTo]= useState(null); // obs object being replied to
  const [tab,    setTab]    = useState("todas");

  const panelCargarRef = React.useRef(null);
  panelCargarRef.current = () => {
    _sb.from("observaciones").select("*")
      .eq("proyecto_id", String(proyecto.id))
      .is("parent_id", null)
      .order("created_at", {ascending:false})
      .then(({data:roots})=>{
        if(!roots?.length){ setObs([]); setBusy(false); return; }
        _sb.from("observaciones").select("*")
          .eq("proyecto_id", String(proyecto.id))
          .not("parent_id","is",null)
          .order("created_at",{ascending:true})
          .then(({data:replies})=>{
            const replyMap = {};
            (replies||[]).forEach(r=>{ (replyMap[r.parent_id]=replyMap[r.parent_id]||[]).push(r); });
            setObs(roots.map(r=>({...r, replies: replyMap[r.id]||[]})));
            setBusy(false);
          });
      });
  };

  useEffect(()=>{
    panelCargarRef.current();
    const ch = _sb.channel("obs_proj_"+proyecto.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"observaciones"},
        ()=>panelCargarRef.current())
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto.id]);

  const cargar = ()=>panelCargarRef.current();

  const enviar = async() => {
    if(!texto.trim()) return;
    const nueva = {
      proyecto_id:  proyecto.id,
      capitulo_id:  replyTo ? replyTo.capitulo_id : "general",
      item_index:   replyTo ? replyTo.item_index  : 0,
      tab_label:    replyTo ? replyTo.tab_label   : "General",
      linea_desc:   replyTo ? replyTo.linea_desc  : "",
      parent_id:    replyTo ? replyTo.id          : null,
      texto:        texto.trim(),
      user_id:      session?.user?.id,
      user_email:   session?.user?.email,
      user_nombre:  perfil?.nombre || session?.user?.email,
    };
    const guardadoTexto = texto.trim();
    const {error} = await _sb.from("observaciones").insert(nueva);
    if(error){
      console.error("Guardar observación falló:", error);
      setTexto(guardadoTexto);
      alert("No se pudo guardar la observación:\n"+(error.message||error.details||"error desconocido")+
            "\n\nEl texto sigue en el cuadro para reintentar.");
      return;
    }
    setTexto(""); setReplyTo(null); cargar();
  };

  const fmtF = iso => {
    const d = new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})
           +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const tabs = ["todas", ...new Set(obs.map(o=>o.capitulo_id||"general").filter(Boolean))];
  const filtered = tab==="todas" ? obs : obs.filter(o=>(o.capitulo_id||"general")===tab);

  const bubbleStyle = (isMe, depth=0) => ({
    background: isMe?"#EFF6FF":"#F9FAFB",
    border:`1px solid ${isMe?"#BFDBFE":"#E5E7EB"}`,
    borderRadius:10, padding:"12px 14px",
    marginLeft: depth*20,
  });

  return React.createElement("div",{style:{
    position:"fixed",top:0,right:0,bottom:0,width:480,maxWidth:"95vw",
    background:"#fff",boxShadow:"-4px 0 32px rgba(0,0,0,.18)",
    zIndex:500,display:"flex",flexDirection:"column",fontFamily:"var(--sans)"
  }},
    // Header
    React.createElement("div",{style:{
      padding:"18px 20px",borderBottom:"1px solid #E5E7EB",
      display:"flex",alignItems:"center",justifyContent:"space-between",
      background:"#111827"
    }},
      React.createElement("div",null,
        React.createElement("div",{style:{color:"#fff",fontWeight:700,fontSize:16}},"💬 Observaciones"),
        React.createElement("div",{style:{color:"#9CA3AF",fontSize:12,marginTop:2}},proyecto.nombre)
      ),
      React.createElement("button",{onClick:onClose,style:{
        background:"none",border:"none",color:"#9CA3AF",fontSize:22,cursor:"pointer",padding:"2px 6px"
      }},"×")
    ),
    // Tab filter
    React.createElement("div",{style:{
      display:"flex",gap:0,overflowX:"auto",borderBottom:"1px solid #E5E7EB",
      background:"#F9FAFB",flexShrink:0
    }},
      tabs.map(t=>React.createElement("button",{
        key:t, onClick:()=>setTab(t),
        style:{
          padding:"8px 14px",border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
          whiteSpace:"nowrap",
          background:tab===t?"#fff":"transparent",
          color:tab===t?"#B91C1C":"#6B7280",
          borderBottom:tab===t?"2px solid #B91C1C":"2px solid transparent",
        }
      }, t==="todas"?"Todas":tabLabelFromId(t)))
    ),
    // Lista obs
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:14}},
      busy
      ?React.createElement("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF"}},"Cargando...")
      :filtered.length===0
        ?React.createElement("div",{style:{textAlign:"center",padding:40,color:"#9CA3AF"}},
            React.createElement("div",{style:{fontSize:32,marginBottom:8}},"💬"),
            "Sin observaciones aún")
        :filtered.map(o=>React.createElement("div",{key:o.id},
            // Root obs
            React.createElement("div",{style:bubbleStyle(o.user_id===session?.user?.id)},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}},
                React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
                  React.createElement("span",{style:{fontWeight:700,fontSize:13,color:"#111827"}},
                    o.user_nombre||o.user_email||"—"),
                  o.capitulo_id&&o.capitulo_id!=="general"&&React.createElement("span",{style:{
                    background:"#F3F4F6",color:"#6B7280",borderRadius:4,padding:"1px 8px",fontSize:10,fontWeight:600
                  }},tabLabelFromId(o.capitulo_id)),
                  o.linea_desc&&React.createElement("span",{style:{color:"#9CA3AF",fontSize:10}},o.linea_desc)
                ),
                React.createElement("span",{style:{fontSize:10,color:"#9CA3AF",flexShrink:0}},fmtF(o.created_at))
              ),
              React.createElement("div",{style:{fontSize:14,color:"#111827",lineHeight:1.6}},o.texto),
              React.createElement("button",{
                onClick:()=>setReplyTo(replyTo?.id===o.id?null:o),
                style:{
                  marginTop:8,background:"none",border:"none",
                  color:"#6B7280",fontSize:11,cursor:"pointer",padding:0,
                  fontWeight:600,display:"flex",alignItems:"center",gap:4
                }
              },(o.replies||[]).length>0?`↩ Responder · ${(o.replies||[]).length} respuesta${(o.replies||[]).length>1?"s":""}`:"↩ Responder")
            ),
            // Replies
            (o.replies||[]).length>0&&React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8,marginTop:8}},
              (o.replies||[]).map(r=>React.createElement("div",{key:r.id,style:bubbleStyle(r.user_id===session?.user?.id,1)},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:4}},
                  React.createElement("span",{style:{fontWeight:700,fontSize:12,color:"#374151"}},r.user_nombre||r.user_email||"—"),
                  React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},fmtF(r.created_at))
                ),
                React.createElement("div",{style:{fontSize:13,color:"#374151",lineHeight:1.5}},r.texto)
              ))
            ),
            // Reply input open
            replyTo?.id===o.id&&React.createElement("div",{style:{
              marginTop:8,marginLeft:20,display:"flex",gap:8,
              background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:10
            }},
              React.createElement("div",{style:{fontSize:11,color:"#6B7280",marginBottom:4,width:"100%"}},
                React.createElement("span",{style:{fontWeight:600}},"↩ Respondiendo a "+o.user_nombre),

// ── Panel de Observaciones por ítem (legacy - kept for ModuloObservaciones) ─
function PanelObservaciones({proyectoId, capituloId, itemIndex, perfil, session, readOnly, onCountChange}) {
  const [obs, setObs] = useState([]);
  const [texto, setTexto] = useState("");
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    if(!open) return;
    _sb.from("observaciones")
      .select("*")
      .eq("proyecto_id", String(proyectoId))
      .eq("capitulo_id", capituloId)
      .eq("item_index", itemIndex)
      .order("created_at", {ascending:true})
      .then(({data})=>{setObs(data||[]);onCountChange&&onCountChange((data||[]).length);});
    const ch=_sb.channel(`obs_${proyectoId}_${capituloId}_${itemIndex}`)
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"observaciones",
        filter:`proyecto_id=eq.${proyectoId}`},
        p=>{
          if(p.new.capitulo_id===capituloId&&p.new.item_index===itemIndex)
            setObs(prev=>[...prev,p.new]);
        }
      ).subscribe();
    return()=>_sb.removeChannel(ch);
  },[open, proyectoId, capituloId, itemIndex]);

  const enviar = async()=>{
    if(!texto.trim()) return;
    const nueva = {
      proyecto_id: proyectoId, capitulo_id: capituloId, item_index: itemIndex,
      texto: texto.trim(),
      user_id: session?.user?.id,
      user_email: session?.user?.email,
      user_nombre: perfil?.nombre || session?.user?.email,
    };
    const guardado = texto.trim();
    const {data, error} = await _sb.from("observaciones").insert(nueva).select().single();
    if(error){
      console.error("Guardar observación falló:", error);
      setTexto(guardado);
      alert("No se pudo guardar la observación:\n"+(error.message||error.details||"error desconocido"));
      return;
    }
    if(data){const next=[...obs,data];setObs(next);onCountChange&&onCountChange(next.length);}
    setTexto("");
  };

  const fmtH = iso=>{
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short"})+
           " "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const count = obs.length;

  return React.createElement("div", {style:{display:"inline-block"}},
    React.createElement("button", {
      onClick:()=>setOpen(o=>!o),
      title:"Observaciones",
      style:{
        background: count>0?"#FEF3C7":"#F3F4F6",
        border:`1px solid ${count>0?"#FCD34D":"#E5E7EB"}`,
        borderRadius:6, padding:"2px 8px", fontSize:11, cursor:"pointer",
        color: count>0?"#92400E":"#6B7280", fontWeight:600,
        display:"flex", alignItems:"center", gap:4
      }
    }, "💬", count>0&&React.createElement("span",null,count)),
    open&&React.createElement("div",{
      style:{
        position:"fixed", top:0, left:0, right:0, bottom:0,
        background:"rgba(0,0,0,.4)", zIndex:1000,
        display:"flex", alignItems:"center", justifyContent:"center"
      },
      onClick:e=>e.target===e.currentTarget&&setOpen(false)
    },
      React.createElement("div",{
        style:{
          background:"#fff", borderRadius:12, padding:24, width:480, maxWidth:"95vw",
          maxHeight:"80vh", display:"flex", flexDirection:"column", gap:12,
          boxShadow:"0 20px 60px rgba(0,0,0,.3)"
        }
      },
        React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",{style:{fontWeight:700,fontSize:15}},"💬 Observaciones"),
          React.createElement("button",{
            onClick:()=>setOpen(false),
            style:{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#6B7280"}
          },"×")
        ),
        React.createElement("div",{
          style:{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,minHeight:80}
        },
          obs.length===0
          ?React.createElement("div",{style:{textAlign:"center",color:"#9CA3AF",padding:"20px 0",fontSize:13}},"Sin observaciones aún")
          :obs.map((o,i)=>React.createElement("div",{key:o.id||i,
            style:{
              background: o.user_id===session?.user?.id?"#EFF6FF":"#F9FAFB",
              border:`1px solid ${o.user_id===session?.user?.id?"#BFDBFE":"#E5E7EB"}`,
              borderRadius:8, padding:"10px 14px"
            }},
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
              React.createElement("span",{style:{fontWeight:600,fontSize:12,color:"#374151"}},o.user_nombre||o.user_email||"—"),
              React.createElement("span",{style:{fontSize:11,color:"#9CA3AF"}},fmtH(o.created_at))
            ),
            React.createElement("div",{style:{fontSize:13,color:"#111827",lineHeight:1.5}},o.texto)
          ))
        ),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("input",{
            style:{flex:1,padding:"8px 12px",border:"1px solid #E5E7EB",borderRadius:8,fontSize:13,outline:"none"},
            placeholder:"Escribe una observación...",
            value:texto, onChange:e=>setTexto(e.target.value),
            onKeyDown:e=>e.key==="Enter"&&!e.shiftKey&&enviar()
          }),
          React.createElement("button",{
            onClick:enviar,
            style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:8,
                   padding:"8px 16px",fontWeight:600,fontSize:13,cursor:"pointer"}
          },"Enviar")
        )
      )
    )
  );
}

// ── Asignar proyectos a Visor (usado en ModuloUsuarios) ────────────────────
function ModalAsignarProyectos({usuario, proyectos, onClose}) {
  const [accesos, setAccesos] = useState([]);
  const [busy, setBusy] = useState(true);
  const [saving, setSaving] = useState(null);

  // Carga siempre fresca al abrir
  const recargar = ()=>{
    setBusy(true);
    _sb.from("proyecto_accesos").select("proyecto_id").eq("user_id",usuario.id)
      .then(({data,error})=>{
        if(!error) setAccesos((data||[]).map(x=>String(x.proyecto_id)));
        setBusy(false);
      });
  };
  useEffect(()=>{ recargar(); },[usuario.id]);

  const toggle = async(pid)=>{
    const pidStr = String(pid);
    setSaving(pidStr);
    if(accesos.includes(pidStr)){
      const {error} = await _sb.from("proyecto_accesos")
        .delete().eq("user_id",usuario.id).eq("proyecto_id",pidStr);
      if(!error) setAccesos(prev=>prev.filter(x=>x!==pidStr));
    } else {
      const {error} = await _sb.from("proyecto_accesos")
        .insert({user_id:usuario.id, proyecto_id:pidStr});
      if(!error) setAccesos(prev=>[...prev,pidStr]);
    }
    setSaving(null);
  };

  return React.createElement("div",{
    className:"modal-bg",onClick:e=>e.target===e.currentTarget&&onClose()},
    React.createElement("div",{className:"modal"},
      React.createElement("div",{className:"modal-title"},
        `Proyectos asignados a ${usuario.nombre||usuario.email}`),
      busy
      ?React.createElement("div",{style:{padding:20,textAlign:"center",color:"#6B7280"}},"Cargando...")
      :React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8,maxHeight:400,overflowY:"auto"}},
        proyectos.length===0
        ?React.createElement("div",{style:{color:"#6B7280",fontSize:13}},"No hay proyectos creados.")
        :proyectos.map(p=>React.createElement("label",{
            key:p.id,
            style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",
                   background:accesos.includes(String(p.id))?"#EFF6FF":"#F9FAFB",
                   border:`1px solid ${accesos.includes(String(p.id))?"#BFDBFE":"#E5E7EB"}`,
                   borderRadius:8,cursor:saving===String(p.id)?"wait":"pointer",
                   opacity:saving===String(p.id)?0.7:1}
          },
          React.createElement("input",{
            type:"checkbox",checked:accesos.includes(String(p.id)),
            onChange:()=>toggle(p.id),disabled:saving===String(p.id),
            style:{width:16,height:16,cursor:"pointer"}
          }),
          React.createElement("div",null,
            React.createElement("div",{style:{fontWeight:600,fontSize:13}},p.nombre),
            React.createElement("div",{style:{fontSize:11,color:"#6B7280"}},p.codigo||"")
          )
        ))
      ),
      React.createElement("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:16}},
        React.createElement("button",{className:"btn-p",onClick:onClose},"Cerrar")
      )
    )
  );
}

// TAB OBSERVACIONES — presupuesto con hilos por línea
// ═══════════════════════════════════════════════════════
function TabObservaciones({proyecto, apus, recursos, perfil, session}) {
  const [allObs, setAllObs] = useState([]);
  const [busy, setBusy]     = useState(true);
  const [openId, setOpenId] = useState(null); // "capId_idx" string
  const [textos, setTextos] = useState({});   // keyed by lineKey
  const [replyTo, setReplyTo] = useState({}); // keyed by lineKey

  const lineKey = (capId, idx) => capId+"__"+idx;

  const obsTabRef = React.useRef(null);
  obsTabRef.current = () => {
    _sb.from("observaciones").select("*")
      .eq("proyecto_id", String(proyecto.id))
      .order("created_at", {ascending:true})
      .then(({data})=>{ setAllObs(data||[]); setBusy(false); });
  };

  useEffect(()=>{
    obsTabRef.current();
    const ch = _sb.channel("obs_tab_"+proyecto.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"observaciones"},
        ()=>obsTabRef.current())
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto.id]);

  const cargar = ()=>obsTabRef.current();

  const obsParaLinea = (capId, idx) =>
    allObs.filter(o=>String(o.capitulo_id)===String(capId)&&String(o.item_index)===String(idx)&&!o.parent_id);

  const respuestasDeObs = (obsId) =>
    allObs.filter(o=>o.parent_id===obsId);

  const enviar = async(capId, idx, cap, item, parentId=null) => {
    const k = lineKey(capId, idx);
    const txt = (textos[k]||"").trim();
    if(!txt) return;
    const apu = apus.find(a=>a.id===item?.apuId);
    const {error} = await _sb.from("observaciones").insert({
      proyecto_id:  String(proyecto.id),
      capitulo_id:  capId,
      item_index:   idx,
      tab_label:    "Presupuesto Obra",
      linea_desc:   item?.descripcion || (apu?.nombre) || `Ítem ${idx+1}`,
      parent_id:    parentId||null,
      texto:        txt,
      user_id:      session?.user?.id,
      user_email:   session?.user?.email,
      user_nombre:  perfil?.nombre || session?.user?.email,
    });
    if(error){
      console.error("Guardar observación falló:", error);
      alert("No se pudo guardar la observación:\n"+(error.message||error.details||"error desconocido")+
            "\n\nEl texto sigue en el cuadro para reintentar.");
      return;
    }
    setTextos(t=>({...t,[k]:""}));
    setReplyTo(r=>({...r,[k]:null}));
    cargar();
  };

  const fmtF = iso => {
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short"})
           +" "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const res = calcProyecto(proyecto, apus, recursos);

  // ── Render de un hilo de observaciones ────────────────────────────────────
  const renderHilo = (capId, idx, cap, item) => {
    const k = lineKey(capId, idx);
    const raices = obsParaLinea(capId, idx);
    const isOpen = openId === k;
    const totalCount = raices.reduce((s,o)=>s+1+respuestasDeObs(o.id).length, 0);

    return React.createElement("div",{
      key:k,
      style:{borderTop:"1px solid #F3F4F6",padding:"4px 8px 4px 28px"}
    },
      // Botón abrir/cerrar hilo
      React.createElement("button",{
        onClick:()=>setOpenId(isOpen?null:k),
        style:{
          background: totalCount>0?"#FEF3C7":"#F3F4F6",
          border:`1px solid ${totalCount>0?"#FDE68A":"#E5E7EB"}`,
          borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer",
          color: totalCount>0?"#92400E":"#6B7280",fontWeight:600,
          display:"inline-flex",alignItems:"center",gap:5
        }
      },"💬 "+(totalCount>0?totalCount+" comentario"+(totalCount>1?"s":""):"Comentar")),

      // Hilo expandido
      isOpen&&React.createElement("div",{style:{marginTop:8,display:"flex",flexDirection:"column",gap:10}},
        // Observaciones existentes
        raices.length>0&&React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          raices.map(o=>{
            const replies = respuestasDeObs(o.id);
            const rk = k+"_r"+o.id;
            return React.createElement("div",{key:o.id},
              // Obs raíz
              React.createElement("div",{style:{
                background:o.user_id===session?.user?.id?"#EFF6FF":"#F9FAFB",
                border:`1px solid ${o.user_id===session?.user?.id?"#BFDBFE":"#E5E7EB"}`,
                borderRadius:8,padding:"10px 12px"
              }},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:4}},
                  React.createElement("span",{style:{fontWeight:700,fontSize:12,color:"#374151"}},o.user_nombre||"—"),
                  React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},fmtF(o.created_at))
                ),
                React.createElement("div",{style:{fontSize:13,color:"#111827",lineHeight:1.5,marginBottom:6}},o.texto),
                React.createElement("button",{
                  onClick:()=>setReplyTo(r=>({...r,[k]:r[k]===o.id?null:o.id})),
                  style:{background:"none",border:"none",fontSize:11,color:"#6B7280",cursor:"pointer",padding:0,fontWeight:600}
                },"↩ Responder"+(replies.length>0?" · "+replies.length:""))
              ),
              // Respuestas
              replies.length>0&&React.createElement("div",{style:{marginLeft:20,marginTop:6,display:"flex",flexDirection:"column",gap:6}},
                replies.map(r=>React.createElement("div",{key:r.id,style:{
                  background:r.user_id===session?.user?.id?"#F0FDF4":"#F8FAFC",
                  border:`1px solid ${r.user_id===session?.user?.id?"#BBF7D0":"#E5E7EB"}`,
                  borderRadius:8,padding:"8px 12px"
                }},
                  React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3,flexWrap:"wrap",gap:4}},
                    React.createElement("span",{style:{fontWeight:700,fontSize:11,color:"#374151"}},r.user_nombre||"—"),
                    React.createElement("span",{style:{fontSize:10,color:"#9CA3AF"}},fmtF(r.created_at))
                  ),
                  React.createElement("div",{style:{fontSize:13,color:"#374151",lineHeight:1.5}},r.texto)
                ))
              ),
              // Input respuesta
              replyTo[k]===o.id&&React.createElement("div",{style:{marginLeft:20,marginTop:6,display:"flex",gap:6}},
                React.createElement("textarea",{
                  style:{flex:1,padding:"8px 10px",border:"1px solid #FDE68A",borderRadius:6,
                    fontSize:12,outline:"none",resize:"none",fontFamily:"var(--sans)",minHeight:36},
                  placeholder:"Responder a "+o.user_nombre+"...",
                  value:textos[k]||"",onChange:e=>setTextos(t=>({...t,[k]:e.target.value})),
                  onKeyDown:e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),enviar(capId,idx,cap,item,o.id)),
                  autoFocus:true
                }),
                React.createElement("button",{
                  onClick:()=>enviar(capId,idx,cap,item,o.id),
                  style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:6,
                    padding:"0 12px",fontWeight:700,fontSize:12,cursor:"pointer",alignSelf:"flex-end",height:36}
                },"↩")
              )
            );
          })
        ),
        // Nueva observación
        (!replyTo[k]||replyTo[k]==="new")&&React.createElement("div",{style:{display:"flex",gap:6}},
          React.createElement("textarea",{
            style:{flex:1,padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:6,
              fontSize:12,outline:"none",resize:"none",fontFamily:"var(--sans)",minHeight:36},
            placeholder:"Escribe una observación...",
            value:textos[k]||"",onChange:e=>setTextos(t=>({...t,[k]:e.target.value})),
            onKeyDown:e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),enviar(capId,idx,cap,item))
          }),
          React.createElement("button",{
            onClick:()=>enviar(capId,idx,cap,item),
            style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:6,
              padding:"0 12px",fontWeight:700,fontSize:12,cursor:"pointer",alignSelf:"flex-end",height:36}
          },"💬")
        )
      )
    );
  };

  if(busy) return React.createElement("div",{style:{padding:40,textAlign:"center",color:"#9CA3AF"}},"Cargando...");

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:16}},
    (proyecto.capitulos||[]).map(cap=>{
      if(!(cap.items||[]).length) return null;
      const cdCap=(cap.items||[]).reduce((s,it)=>s+calcItem(it,apus,recursos,proyecto),0);
      return React.createElement("div",{key:cap.id,className:"card",style:{overflow:"hidden"}},
        // Header capítulo
        React.createElement("div",{style:{
          background:"#1F2937",padding:"10px 20px",
          display:"flex",justifyContent:"space-between",alignItems:"center"
        }},
          React.createElement("div",{style:{display:"flex",gap:12,alignItems:"center"}},
            React.createElement("span",{style:{color:"#9CA3AF",fontFamily:"var(--mono)",fontSize:11}},`CAP. ${cap.numero}`),
            React.createElement("span",{style:{color:"#fff",fontWeight:700,fontSize:13}},cap.nombre)
          ),
          React.createElement("span",{style:{fontFamily:"var(--mono)",color:"#6EE7B7",fontWeight:700}},fmt(cdCap))
        ),
        // Ítems
        React.createElement("div",{style:{display:"flex",flexDirection:"column"}},
          (cap.items||[]).map((item,idx)=>{
            const apu=apus.find(a=>a.id===item.apuId);
            const apuEf=apu?getApuEfectivo(apu,proyecto):null;
            const vu=apuEf?calcAPUTotal(apuEf,recursos,getPctHerramienta(proyecto)):0;
            const vt=(item.cantidad||0)*vu;
            const k=lineKey(cap.id,idx);
            const cnt=allObs.filter(o=>String(o.capitulo_id)===String(cap.id)&&String(o.item_index)===String(idx)).length;
            return React.createElement("div",{key:item.id,
              style:{borderBottom:"1px solid #F3F4F6",
                background:openId===k?"#FFFBF0":"#fff"}
            },
              // Fila ítem
              React.createElement("div",{style:{
                display:"grid",
                gridTemplateColumns:"60px 1fr 70px 100px 120px 130px",
                gap:8,padding:"10px 20px",alignItems:"center"
              }},
                React.createElement("code",{style:{fontFamily:"var(--mono)",fontSize:11,color:"var(--red)"}},
                  `${cap.numero}.${idx+1}`),
                React.createElement("div",null,
                  React.createElement("div",{style:{fontSize:13,fontWeight:500}},(apu?.nombre)||item.descripcion||"—"),
                  apu&&React.createElement("div",{style:{fontSize:10,color:"#9CA3AF"}},apu.codigo)
                ),
                React.createElement("div",{style:{fontSize:11,color:"#6B7280",textAlign:"center"}},(apu?.unidad)||item.unidad||""),
                React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:12,textAlign:"right",color:"#6B7280"}},
                  fmtN(item.cantidad,2)),
                React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:12,textAlign:"right",color:"#6B7280"}},
                  apu?fmt3(vu):"—"),
                React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:13,textAlign:"right",fontWeight:700}},
                  apu?fmt(vt):"—")
              ),
              // Hilo de observaciones
              renderHilo(cap.id, idx, cap, item)
            );
          })
        )
      );
    })
  );
}

// TABOBSVIEW — Presupuesto con 💬 por línea (visor + editor obs mode)
// ═══════════════════════════════════════════════════════
// ── Burbuja individual de mensaje ────────────────────────────────────────
function BurbujaMensaje({msg, depth, esRespuesta, allReps, session, eliminar, setReplyTo, replyTo, textos, setTextos, enviarRespuesta, fmtF}) {
  const [confirmDel, setConfirmDel] = useState(false);
  const esMio = msg.user_id && session?.user?.id && String(msg.user_id) === String(session.user.id);
  const reps  = allReps.filter(r=>String(r.parent_id)===String(msg.id));
  const rKey  = "reply__"+msg.id;

      }),
