  // Iterar hasta converger (max 10 veces)
  let total = cd + ciBase;
  for (let i = 0; i < 10; i++) {
    const pol = calcPolTotal(total);
    const newTotal = cd + ciBase + pol;
    if (Math.abs(newTotal - total) < 1) break;
    total = newTotal;
  }
  return total;
}

function getApusUsados(p, apus, recursos, ps) {
  const ordered = []; // [{apuId, itemRef}] in order of appearance
  const seen = new Set();
  const addItem = (item) => {
    if (item.apuId && !seen.has(item.apuId)) {
      seen.add(item.apuId);
      ordered.push(item.apuId);
    }
  };
  if (ps) {
    // Solo la hoja (presupuestoObra) indicada
    (ps.capitulos || []).forEach(c => (c.items || []).forEach(addItem));
  } else {
    // Legacy capitulos
    (p.capitulos || []).forEach(c => (c.items || []).forEach(addItem));
    // New presupuestosObra (todas las hojas)
    (p.presupuestosObra || []).forEach(psx => (psx.capitulos||[]).forEach(c => (c.items||[]).forEach(addItem)));
  }
  // Return in order, with apuOverrides applied
  return ordered.map(id => {
    const a = apus.find(x=>x.id===id);
    if (!a) return null;
    const overrideLineas = p.apuOverrides && p.apuOverrides[id];
    const overrideNombre = p.apuNombreOverrides && p.apuNombreOverrides[id];
    return { ...a, nombre: overrideNombre || a.nombre, lineas: overrideLineas || a.lineas, valorUnitario: calcAPUTotal({...a, lineas: overrideLineas||a.lineas}, recursos, getPctHerramienta(p, ps)), _hasOverride: !!overrideLineas, _hasNombreOverride: !!overrideNombre };
  }).filter(Boolean);
}

              _codOrig: codStr,
              nombre: String(col1).trim(),
              unidad: col2 && typeof col2 === "string" ? String(col2).trim() : "un",
              lineas: []
            };
            apusParsed.push(apuActualLocal);
            seccionActual = null;
            continue;
          }

          if (!apuActualLocal) continue;

          // Fila de sección (col0 null, col1 tiene nombre de sección, sin cantidad/precio)
          if (col0 === null && col1 && col3 === null && col4 === null) {
            const cat = detectarCategoria(col1);
            if (cat) { seccionActual = cat; continue; }
          }

          // Fila de recurso: col0=null, col1=nombre, col2=unidad, col3=precio, col4=cantidad/rendimiento
          const esRecursoClasico = col0 === null && col1 && typeof col1 === "string" && seccionActual;

          if (esRecursoClasico) {
            const nombre    = String(col1).trim();
            const unidadRec = col2 ? String(col2).trim() : null;
            const precio    = col3 !== null && typeof col3 === "number" ? col3 : 0;
            const cantidad  = col4 !== null && typeof col4 === "number" ? col4 : null;
            const esHerramientaMenor = nombre.toLowerCase().includes("herramienta menor");
            apuActualLocal.lineas.push({
              _nombre: nombre,
              _categoria: seccionActual,
              _esHerramientaMenor: esHerramientaMenor,
              _cantidad: cantidad,
              _precio: precio,
              _unidad: unidadRec
            });
          }
        }

        if (!apusParsed.length) {
          setImportApuError("No se encontraron APUs. Verifica que el archivo tenga el formato correcto.");
          return;
        }

        // Ahora construir recursos y APUs
        const pref = prefijo.trim().toUpperCase();
        const nuevosRecursos = [];
        const nuevosApus = [];
        const mapaConservar = {};
        const mapaExcel = {};
        recursos.forEach(r => { mapaConservar[String(r.nombre||"").toLowerCase()] = r.id; });

        const getRecursoId = (nombre, categoria, unidad, precio) => {
          const key = nombre.toLowerCase().trim();
          if ((modoRecursos[categoria]||modoRecursos) === "actualizar") {
            if (!mapaExcel[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaExcel[key] = idR;
            }
            return mapaExcel[key];
          } else {
            if (!mapaConservar[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaConservar[key] = idR;
            }
            return mapaConservar[key];
          }
        };

        apusParsed.forEach((ap, idx) => {
          const numStr = String(idx + 1).padStart(2, "0");
          const codigo = `${pref}-${numStr}`;
          const lineasApu = [];

          ap.lineas.forEach(l => {
            if (l._esHerramientaMenor) {
              const nomH = "Herramienta menor (5%)";
              const recId = getRecursoId(nomH, "maquinaria", "%M.O.", 0);
              lineasApu.push({ id: Date.now()+Math.random(), recursoId: recId, _sec:"maquinaria", _esHerramienta5:true, rendimiento:0.05, cantidad:null });
              return;
            }

            const unidadR = l._unidad || (l._categoria === "mano_obra" ? "día" : l._categoria === "maquinaria" ? "hr" : l._categoria === "transporte" ? "viaje" : "un");
            const recId = getRecursoId(l._nombre, l._categoria, unidadR, l._precio || 0);
            const sec = SECCIONES_APU.find(s => s.id === l._categoria);
            const usaCantidad = sec ? sec.usa === "cantidad" : false;
            lineasApu.push({
              id: Date.now() + Math.random(),
              recursoId: recId,
              _sec: l._categoria,
              cantidad: usaCantidad ? (l._cantidad !== null ? l._cantidad : 1) : null,
              rendimiento: !usaCantidad ? (l._cantidad !== null ? l._cantidad : 1) : null
            });
          });

          nuevosApus.push({
            id: Date.now() + Math.random(),
            codigo,
            nombre: ap.nombre,
            unidad: ap.unidad,
            lineas: lineasApu
          });
        });

        // Aplicar recursos nuevos
        if (nuevosRecursos.length) {
          setRecursos(prev => [...prev, ...nuevosRecursos]);
        }

        // Luego APUs
        setApus(prev => {
          let agregados = 0, actualizados = 0;
          const mapa = [...prev];
          nuevosApus.forEach(a => {
            const idx2 = mapa.findIndex(ex => String(ex.codigo||"").toLowerCase() === a.codigo.toLowerCase());
            if (idx2 >= 0) { mapa[idx2] = { ...mapa[idx2], nombre: a.nombre, unidad: a.unidad, lineas: a.lineas }; actualizados++; }
            else { mapa.push(a); agregados++; }
          });
          const totalLineas = nuevosApus.reduce((s,a) => s + a.lineas.length, 0);
          setImportApuOk(`✓ ${agregados} APUs creados · ${nuevosRecursos.length} recursos nuevos · ${totalLineas} líneas`);
          return mapa;
        });

        setShowImportModal(false);
        setImportPrefijo("");
      } catch(err) {
        console.error(err);
        setImportApuError("Error leyendo el archivo: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // ── IMPORTAR DESDE FORMATO CCE (Colombia Compra Eficiente) ────────
  // Cada APU está en su propia hoja. Secciones fijas:
  // Equipo: filas 30-38 (col C=nombre, L=tarifa/hr, M=rendimiento, O=vr)
  // Fila 39: Herramienta menor 5%
  // Materiales: filas 45-54 (col C=nombre, K=unidad, L=cant, M=precio, O=vr)
  // Transporte: filas 60-62 (col C=material, O=vr)
  // Mano de obra: filas 68-73 (col D=nombre, J=jornal, L=factor, M=rendimiento, O=vr)

  const importarDesdeCCE = (e, prefijo, modoRecursos="conservar") => {
    setImportApuError(""); setImportApuOk("");
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    if (!prefijo.trim()) { setImportPrefijoError("Escribe un prefijo antes de seleccionar el archivo"); return; }
    setImportPrefijoError("");

    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array" });

        // Identify APU sheets: those with commas in name and not known non-APU sheets
        const NON_APU = ["DATOS ENTRADA ITEM ", "AU", "PROPUESTA ECONOMICA OBRA", "INTERVENTORÍA", "FM"];
        const apuSheetNames = wb.SheetNames.filter(s => s.includes(",") && !NON_APU.includes(s));

        if (!apuSheetNames.length) {
          setImportApuError("No se encontraron hojas de APU. Verifica que el archivo sea formato CCE con hojas nombradas como '1,1', '2,3', etc.");
          return;
        }

        const pref = prefijo.trim().toUpperCase();
        const nuevosRecursos = [];
        const nuevosApus = [];
        const mapaConservar = {};
        const mapaExcel = {};
        recursos.forEach(r => { mapaConservar[String(r.nombre||"").toLowerCase().trim()] = r.id; });

        const getOrCreateRecurso = (nombre, categoria, unidad, precio) => {
          const key = nombre.toLowerCase().trim();
          if ((modoRecursos[categoria]||modoRecursos) === "actualizar") {
            if (!mapaExcel[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id: idR, nombre, codigo: `${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad: unidad || "un", precio: precio || 0, categoria });
              mapaExcel[key] = idR;
            }
            return mapaExcel[key];
          } else {
            if (!mapaConservar[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id: idR, nombre, codigo: `${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad: unidad || "un", precio: precio || 0, categoria });
              mapaConservar[key] = idR;
            }
            return mapaConservar[key];
          }
        };

        apuSheetNames.forEach((sheetName, idx) => {
          const ws = wb.Sheets[sheetName];

          // Helper: get cell value by address (e.g. "D25")
          const cv = (addr) => {
            const cell = ws[addr];
            if (!cell) return null;
            return cell.v !== undefined ? cell.v : null;
          };
          const cvStr = (addr) => { const v = cv(addr); return v != null ? String(v).trim() : null; };
          const cvNum = (addr) => { const v = cv(addr); return typeof v === "number" ? v : null; };

          // Row 25: C25=código, D25=descripción, M25=unidad, O25=cantidad
          const desc = cvStr("D25") || sheetName;
          const unidad = cvStr("M25") || "un";

          const numStr = String(idx + 1).padStart(2, "0");
          const codigo = `${pref}-${numStr}`;
          const lineas = [];

          // ── EQUIPO (filas 30-38) ──
          // C=nombre, L=tarifa/hora, M=rendimiento
          for (let row = 30; row <= 38; row++) {
            const nombre = cvStr(`C${row}`);
            const rendimiento = cvNum(`M${row}`);
            const tarifa = cvNum(`L${row}`) || 0;
            if (!nombre || rendimiento == null) continue;
            const recId = getOrCreateRecurso(nombre, "maquinaria", "hr", tarifa);
            lineas.push({ id: Date.now()+Math.random(), recursoId: recId, _sec: "maquinaria", rendimiento, cantidad: null });
          }

          // Herramienta menor 5% MO (fila 39)
          const hmRecId = getOrCreateRecurso("Herramienta menor (5%)", "maquinaria", "%M.O.", 0);
          lineas.push({id:Date.now()+Math.random(), recursoId:hmRecId, _sec:"maquinaria", _esHerramienta5:true, rendimiento:0.05, cantidad:null});

          // ── MATERIALES ──
          // Buscar encabezado "II. MATERIALES" entre filas 34-50, datos empiezan 4 filas después
          let matHeaderRow = -1;
          for (let row = 34; row <= 50; row++) {
            const v = cvStr(`C${row}`);
            if (v && v.includes("II.")) { matHeaderRow = row; break; }
          }
          if (matHeaderRow > 0) {
            const matDataStart = matHeaderRow + 4; // header + 3 rows de encabezados
            for (let row = matDataStart; row < matDataStart + 12; row++) {
              const nombre = cvStr(`C${row}`);
              if (!nombre || nombre.includes("SUBTOTAL") || nombre.includes("III.")) break;
              const cant = cvNum(`L${row}`);
              const precio = cvNum(`M${row}`) || 0;
              const und = cvStr(`K${row}`) || "un";
              if (cant == null) continue;
              const recId = getOrCreateRecurso(nombre, "material", und, precio);
              lineas.push({ id: Date.now()+Math.random(), recursoId: recId, _sec: "material", cantidad: cant, rendimiento: null });
            }
          }

          // ── TRANSPORTE ──
          // Buscar "III. TRANSPORTES", datos 3 filas después
          let trHeaderRow = -1;
          for (let row = 50; row <= 68; row++) {
            const v = cvStr(`C${row}`);
            if (v && v.includes("III.")) { trHeaderRow = row; break; }
          }
          if (trHeaderRow > 0) {
            const trDataStart = trHeaderRow + 3;
            for (let row = trDataStart; row < trDataStart + 5; row++) {
              const nombre = cvStr(`C${row}`);
              if (!nombre || nombre.includes("SUBTOTAL") || nombre.includes("IV.")) break;
              const vr = cvNum(`O${row}`);
              if (vr == null) continue;
              const recId = getOrCreateRecurso(nombre, "transporte", "global", vr);
              lineas.push({ id: Date.now()+Math.random(), recursoId: recId, _sec: "transporte", cantidad: 1, rendimiento: null });
            }
          }

          // ── MANO DE OBRA ──
          // Buscar "IV. MANO DE OBRA", datos 4 filas después
          // C=cantidad, D=nombre, J=jornal, M=rendimiento, O=vr
          let moHeaderRow = -1;
          for (let row = 58; row <= 80; row++) {
            const v = cvStr(`C${row}`);
            if (v && v.includes("IV.")) { moHeaderRow = row; break; }
          }
          if (moHeaderRow > 0) {
            const moDataStart = moHeaderRow + 4;
            for (let row = moDataStart; row < moDataStart + 8; row++) {
              const nombre = cvStr(`D${row}`);
              if (!nombre || nombre.includes("SUBTOTAL")) break;
              const rendimiento = cvNum(`M${row}`);
              const jornal = cvNum(`J${row}`) || 0;
              if (rendimiento == null) continue;
              const recId = getOrCreateRecurso(nombre, "mano_obra", "día", jornal);
              lineas.push({ id: Date.now()+Math.random(), recursoId: recId, _sec: "mano_obra", rendimiento, cantidad: null });
            }
          }

          nuevosApus.push({ id: Date.now()+Math.random(), codigo, nombre: desc, unidad, lineas });
        });

        if (!nuevosApus.length) { setImportApuError("No se encontraron APUs válidos en el archivo."); return; }

        if (nuevosRecursos.length) setRecursos(prev => [...prev, ...nuevosRecursos]);

        setApus(prev => {
          let agregados = 0, actualizados = 0;
          const mapa = [...prev];
          nuevosApus.forEach(a => {
            const idx2 = mapa.findIndex(ex => String(ex.codigo||"").toLowerCase() === a.codigo.toLowerCase());
            if (idx2 >= 0) { mapa[idx2] = { ...mapa[idx2], nombre: a.nombre, unidad: a.unidad, lineas: a.lineas }; actualizados++; }
            else { mapa.push(a); agregados++; }
          });
          const totalLineas = nuevosApus.reduce((s,a) => s + a.lineas.length, 0);
          setImportApuOk(`✓ ${agregados} APUs importados · ${nuevosRecursos.length} recursos nuevos · ${totalLineas} líneas`);
          return mapa;
        });

        setShowImportModal(false);
        setImportPrefijo("");
      } catch(err) {
        console.error(err);
        setImportApuError("Error leyendo el archivo CCE: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // ── IMPORTAR FORMATO SIF (tablas internas: Equipos, Materiales, M de Obra, Transporte) ──
  const NON_APU_SIF = new Set(["Presentacion","Ppto TIPO","Cant","AIU","Cuadrillas","M de Obra",
    "Materiales","Transporte","Equipos","PMA-GS-SST","Factor Prestacional 2026",
    "Plantilla_Apu (2)","Plantilla_Apu","Indice","Personal C.C","Personal profesional - técnico",
    "Gastos administrativos Obra","Base_Referencia_SIF","PMT","APU CARACTERIZACION VIAL",
    "APU GEORREFERENCIACION","OBRA_IMPUESTOS","OBRA_PÓLIZAS","Ensayos de laboratorio",
    "Análisis_Reajustes_OBRA","Concre 2000 PSI","Concre 3000 PSI"]);

  const importarDesdeSIF = (e, prefijo, modoRecursos="conservar") => {
    setImportApuError(""); setImportApuOk("");
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    if (!prefijo.trim()) { setImportPrefijoError("Escribe un prefijo antes de seleccionar el archivo"); return; }
    setImportPrefijoError("");

    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        const pref = prefijo.trim().toUpperCase();

        // Build lookup tables from internal sheets
        const buildLookup = (sheetName, priceCol=3) => {
          const map = {};
          if (!wb.SheetNames.includes(sheetName)) return map;
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
          rows.forEach((row, i) => {
            if (i < 9) return; // skip headers
            if (!row[0] || !row[1]) return;
            const cod = String(row[0]).trim();
            map[cod] = {
              nombre: String(row[1]).trim(),
              unidad: row[2] ? String(row[2]).trim() : "un",
              precio: typeof row[priceCol] === "number" ? row[priceCol] : 0
            };
          });
          return map;
        };

        const equipos    = buildLookup("Equipos",    3);
        const materiales = buildLookup("Materiales", 3);
        const transporte = buildLookup("Transporte", 3);
        const moTable    = buildLookup("M de Obra",  4); // col E = jornal+prestaciones

        // Detect APU sheets
        const apuSheets = wb.SheetNames.filter(s => !NON_APU_SIF.has(s) && (s[0] >= "0" && s[0] <= "9" || s.includes(".")));
        if (!apuSheets.length) { setImportApuError("No se encontraron hojas de APU. Verifica que sea un archivo formato SIF."); return; }

        const nuevosRecursos = [];
        const nuevosApus = [];
        // mapaConservar: para modo conservar — reutiliza existentes por nombre
        // mapaExcel: para modo actualizar — crea recursos nuevos con precios del Excel
        const mapaConservar = {};
        const mapaExcel = {};
        recursos.forEach(r => { mapaConservar[String(r.nombre||"").toLowerCase().trim()] = r.id; });

        const getOrCreate = (nombre, categoria, unidad, precio) => {
          const key = nombre.toLowerCase().trim();
          if ((modoRecursos[categoria]||modoRecursos) === "actualizar") {
            // Siempre crear recurso nuevo con precio del Excel (nunca reutilizar el existente)
            if (!mapaExcel[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaExcel[key] = idR;
            }
            return mapaExcel[key];
          } else {
            // Modo conservar: reutilizar existente o crear nuevo
            if (!mapaConservar[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaConservar[key] = idR;
            }
            return mapaConservar[key];
          }
        };

        apuSheets.forEach((sname, idx) => {
          const ws = wb.Sheets[sname];
          const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
          if (rows.length < 21) return;

          // Row 21 (index 20): col D=codigo, col E=descripcion
          const r21 = rows[20] || [];
          const desc  = r21[4] ? String(r21[4]).trim() : sname;
          const unidad = (() => { for (let j=5; j<12; j++) { if(r21[j] && typeof r21[j]==="string" && r21[j].trim().length<=6) return r21[j].trim(); } return "un"; })();

          const numStr = String(idx + 1).padStart(2, "0");
          const codigo = `${pref}-${numStr}`;
          const lineas = [];

          rows.forEach(row => {
            if (!row[0]) return;
            const cod = String(row[0]).trim();
            const cantJ = typeof row[9] === "number" ? row[9] : null; // col J
            const cantI = typeof row[8] === "number" ? row[8] : null; // col I
            const cantG = typeof row[6] === "number" ? row[6] : null; // col G (transporte)

            if (cod.startsWith("EQ") && equipos[cod] && cantJ != null) {
              const rec = equipos[cod];
              const recId = getOrCreate(rec.nombre, "maquinaria", rec.unidad, rec.precio);
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"maquinaria", rendimiento:cantJ, cantidad:null });
            } else if (cod.startsWith("MAT") && materiales[cod] && (cantI != null)) {
              const rec = materiales[cod];
              const recId = getOrCreate(rec.nombre, "material", rec.unidad, rec.precio);
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"material", cantidad:cantI, rendimiento:null });
            } else if (cod.startsWith("MO") && moTable[cod] && cantJ != null) {
              const rec = moTable[cod];
              const recId = getOrCreate(rec.nombre, "mano_obra", rec.unidad, rec.precio);
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"mano_obra", rendimiento:cantJ, cantidad:null });
            } else if (cod.startsWith("TR") && transporte[cod] && (cantG != null || cantJ != null)) {
              const rec = transporte[cod];
              const recId = getOrCreate(rec.nombre, "transporte", rec.unidad, rec.precio);
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"transporte", cantidad:cantG||cantJ, rendimiento:null });
            }
          });

          // Herramienta menor 5% — siempre agregar
          const hmRecId2 = getOrCreate("Herramienta menor (5%)", "maquinaria", "%M.O.", 0);
          lineas.push({id:Date.now()+Math.random(), recursoId:hmRecId2, _sec:"maquinaria", _esHerramienta5:true, rendimiento:0.05, cantidad:null});

          nuevosApus.push({ id:Date.now()+Math.random(), codigo, nombre:desc, unidad, lineas });
        });

        if (!nuevosApus.length) { setImportApuError("No se encontraron APUs válidos."); return; }

        // Agregar recursos nuevos (en modo actualizar son nuevos con precio del Excel,
        // en modo conservar son solo los que no existían)
        if (nuevosRecursos.length) setRecursos(prev => [...prev, ...nuevosRecursos]);

        setApus(prev => {
          let agregados=0, actualizados=0;
          const mapa = [...prev];
          nuevosApus.forEach(a => {
            const i2 = mapa.findIndex(ex => String(ex.codigo||"").toLowerCase() === a.codigo.toLowerCase());
            if (i2 >= 0) { mapa[i2] = {...mapa[i2], nombre:a.nombre, unidad:a.unidad, lineas:a.lineas}; actualizados++; }
            else { mapa.push(a); agregados++; }
          });
          const totalLineas = nuevosApus.reduce((s,a)=>s+a.lineas.length,0);
          setImportApuOk(`✓ ${agregados} APUs importados · ${nuevosRecursos.length} recursos nuevos · ${totalLineas} líneas`);
          return mapa;
        });

        setShowImportModal(false);
        setImportPrefijo("");
      } catch(err) {
        console.error(err);
        setImportApuError("Error leyendo el archivo: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // ── IMPORTAR FORMATO EDESO MUNICIPIOS (hoja APU única + hojas INSUMOS) ──────
  const importarDesdeEdesoMun = (e, prefijo, modoRecursos="conservar") => {
    setImportApuError(""); setImportApuOk("");
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    if (!prefijo.trim()) { setImportPrefijoError("Escribe un prefijo antes de seleccionar el archivo"); return; }
    setImportPrefijoError("");

    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        const pref = prefijo.trim().toUpperCase();

        // Build lookup tables from INSUMOS sheets
        const buildInsumos = (sheetName, priceCol=3) => {
          const map = {};
          if (!wb.SheetNames.includes(sheetName)) return map;
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
          rows.forEach((row, i) => {
            if (i < 7) return;
            if (!row[0] || !row[1]) return;
            const cod = String(row[0]).trim();
            map[cod] = {
              nombre: String(row[1]).trim(),
              unidad: row[2] ? String(row[2]).trim() : "un",
              precio: typeof row[priceCol] === "number" ? row[priceCol] : 0
            };
          });
          return map;
        };

        const insuEq  = buildInsumos("INSUMOS EQUIPOS",    3);
        const insuMat = buildInsumos("INSUMOS MATERIALES", 3);
        const insuMO  = buildInsumos("INSUMOS MANO DE OBRA", 6); // col G = jornal
        const insuTr  = buildInsumos("INSUMOS TRANSPORTES", 3);
        // Fallback to shorter names
        const eqMap   = Object.keys(insuEq).length  ? insuEq  : buildInsumos("EQUIPOS",    3);
        const matMap  = Object.keys(insuMat).length ? insuMat : buildInsumos("MATERIALES", 3);
        const moMap   = Object.keys(insuMO).length  ? insuMO  : buildInsumos("MANO DE OBRA", 6);
        const trMap   = Object.keys(insuTr).length  ? insuTr  : buildInsumos("TRANSPORTES", 3);

        const nuevosRecursos = [];
        const nuevosApus = [];
        const mapaConservar = {};
        const mapaExcel = {};
        recursos.forEach(r => { mapaConservar[String(r.nombre||"").toLowerCase().trim()] = r.id; });

        const getOrCreate = (nombre, categoria, unidad, precio) => {
          const key = nombre.toLowerCase().trim();
          if ((modoRecursos[categoria]||modoRecursos) === "actualizar") {
            if (!mapaExcel[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaExcel[key] = idR;
            }
            return mapaExcel[key];
          } else {
            if (!mapaConservar[key]) {
              const idR = Date.now() + Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaConservar[key] = idR;
            }
            return mapaConservar[key];
          }
        };

        // Parse a single APU sheet or a block of rows from APU sheet
        const parseApuRows = (rows, startRow, apuIdx) => {
          const r = rows[startRow];
          const desc = r[1] ? String(r[1]).trim() : `APU ${apuIdx+1}`;
          const unidad = r[2] ? String(r[2]).trim() : "un";
          const numStr = String(apuIdx+1).padStart(2,"0");
          const codigo = `${pref}-${numStr}`;
          const lineas = [];

          let sec = null;
          // Find end of this APU (next APU start or end of rows)
          let endRow = rows.length;
          for (let j = startRow+1; j < rows.length; j++) {
            const rj = rows[j];
            if (rj[0] && typeof rj[0]==="number" && rj[1] && typeof rj[1]==="string" && rj[1].length>20) {
              endRow = j; break;
            }
          }

          for (let j = startRow+1; j < endRow; j++) {
            const row = rows[j];
            if (!row[0]) continue;
            const col0 = String(row[0]).trim();

            // Section headers
            if (col0.includes("I.") || col0.toUpperCase().includes("EQUIPO")) { sec="maquinaria"; continue; }
            if (col0.includes("II.") || col0.toUpperCase().includes("MATERIAL")) { sec="material"; continue; }
            if (col0.includes("III.") || col0.toUpperCase().includes("TRANSPORT")) { sec="transporte"; continue; }
            if (col0.includes("IV.") || col0.toUpperCase().includes("MANO DE OBRA")) { sec="mano_obra"; continue; }
            if (col0.includes("V.") || col0.toUpperCase().includes("SERVICIO")) { sec=null; continue; }
            if (col0.toUpperCase().includes("SUBTOTAL") || col0.toUpperCase().includes("CÓDIGO") || col0.toUpperCase().includes("CODIGO")) continue;

            if (!sec) continue;

            // Lookup resource
            const lookup = sec==="maquinaria" ? eqMap : sec==="material" ? matMap : sec==="transporte" ? trMap : moMap;
            const rec = lookup[col0];
            const nombre = rec ? rec.nombre : (row[1] ? String(row[1]).trim() : col0);
            const unidadRec = rec ? rec.unidad : (row[2] ? String(row[2]).trim() : "un");
            const precio = rec ? rec.precio : (typeof row[3]==="number" ? row[3] : 0);

            // Skip SUBTOTAL rows and header rows
            if (!nombre || nombre.toUpperCase().includes("SUBTOTAL") || nombre.toUpperCase()==="CÓDIGO" || nombre.toUpperCase()==="CODIGO") continue;

            // Herramienta menor
            if (col0==="HEQ001" || nombre.toUpperCase().includes("HERRAMIENTA MENOR")) {
              const hmId = getOrCreate("Herramienta menor (5%)", "maquinaria", "%M.O.", 0);
              lineas.push({ id:Date.now()+Math.random(), recursoId:hmId, _sec:"maquinaria", _esHerramienta5:true, rendimiento:0.05, cantidad:null });
              continue;
            }

            const recId = getOrCreate(nombre, sec, unidadRec, precio);

            if (sec==="material") {
              const cant = typeof row[3]==="number" ? row[3] : null;
              if (cant==null) continue;
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:sec, cantidad:cant, rendimiento:null });
            } else if (sec==="mano_obra") {
              // col C=cantidad, col D=jornal, col E=rendimiento
              const rend = typeof row[4]==="number" ? row[4] : (typeof row[3]==="number" ? row[3] : null);
              if (rend==null) continue;
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:sec, rendimiento:rend, cantidad:null });
            } else {
              // equipo y transporte: col D=tarifa col E=rendimiento
              const rend = typeof row[4]==="number" ? row[4] : null;
              if (rend==null) continue;
              lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:sec, rendimiento:rend, cantidad:null });
            }
          }
          return { id:Date.now()+Math.random(), codigo, nombre:desc, unidad, lineas };
        };

        let apuIdx = 0;

        // Parse main APU sheet
        const apuSheetNames = ["APU", "APU GEORREFERENCIACIÓN", "APU GEORREFERENCIACION", "APU CARACTERIZACIÓN", "APU CARACTERIZACION"];
        apuSheetNames.forEach(sname => {
          if (!wb.SheetNames.includes(sname)) return;
          const ws = wb.Sheets[sname];
          const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

          // Find all APU start rows
          const starts = [];
          rows.forEach((row, i) => {
            if (row[0] && typeof row[0]==="number" && row[1] && typeof row[1]==="string" && row[1].length>20)
              starts.push(i);
          });

          starts.forEach(startRow => {
            const apu = parseApuRows(rows, startRow, apuIdx++);
            if (apu.lineas.length > 0) nuevosApus.push(apu);
          });
        });

        if (!nuevosApus.length) { setImportApuError("No se encontraron APUs. Verifica que sea un archivo formato EDESO Municipios."); return; }

        if (nuevosRecursos.length) setRecursos(prev => [...prev, ...nuevosRecursos]);

        setApus(prev => {
          let agregados=0, actualizados=0;
          const mapa = [...prev];
          nuevosApus.forEach(a => {
            const i2 = mapa.findIndex(ex => String(ex.codigo||"").toLowerCase()===a.codigo.toLowerCase());
            if (i2>=0) { mapa[i2]={...mapa[i2],nombre:a.nombre,unidad:a.unidad,lineas:a.lineas}; actualizados++; }
            else { mapa.push(a); agregados++; }
          });
          const totalLineas = nuevosApus.reduce((s,a)=>s+a.lineas.length,0);
          setImportApuOk(`✓ ${agregados} APUs importados · ${nuevosRecursos.length} recursos nuevos · ${totalLineas} líneas`);
          return mapa;
        });

        setShowImportModal(false);
        setImportPrefijo("");
      } catch(err) {
        console.error(err);
        setImportApuError("Error leyendo el archivo: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  // ── IMPORTADOR INTELIGENTE ────────────────────────────────────────────────
  const PALABRAS_SECCION = {
    mano_obra:   ["mano de obra","mano obra","m.o.","personal","trabajador","operario"],
    material:    ["material","materiales","insumo","insumos"],
    maquinaria:  ["maquinaria","equipo","equipos","herramienta","herramientas","maquinaria - equipo"],
    transporte:  ["transporte","transportes","flete","fletes"],
  };

  const detectarSeccionSmart = txt => {
    if (!txt) return null;
    const t = String(txt).toLowerCase().replace(/[-–—.]/g," ").replace(/\s+/g," ").trim();
    for (const [cat, palabras] of Object.entries(PALABRAS_SECCION))
      if (palabras.some(p => t.includes(p))) return cat;
    return null;
  };

  const abrirSmartImport = e => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        setSmartImport({
          paso: 1,
          wb,
          sheetNames: wb.SheetNames,
          selectedSheets: wb.SheetNames.length === 1 ? new Set([wb.SheetNames[0]]) : new Set(),
          previewRows: [],
          previewSheet: wb.SheetNames[0],
          colDesc: null, colUnidad: null, colPrecio: null, colCantidad: null,
          prefijo: importPrefijo,
        });
      } catch(err) { setImportApuError("Error leyendo el archivo: " + err.message); }
    };
    reader.readAsArrayBuffer(file);
  };

  const smartGetPreview = (wb, sheetName, startRow=0) => {
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
    return { rows: rows.slice(startRow, startRow+25), totalRows: rows.length, startRow };
  };

  // ── IMPORTAR FORMATO APU COL (hoja única, bloques por APU) ─────────────
  const importarDesdeAPUCol = (e, prefijo, modoRecursos="conservar") => {
    setImportApuError(""); setImportApuOk("");
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    if (!prefijo.trim()) { setImportPrefijoError("Escribe un prefijo antes de seleccionar el archivo"); return; }
    setImportPrefijoError("");

    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        // Find the APU sheet
        const sheetName = wb.SheetNames.find(s => s.toUpperCase().includes("APU")) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
        const pref = prefijo.trim().toUpperCase();

        const nuevosRecursos = [];
        const nuevosApus = [];
        const mapaConservar = {};
        const mapaExcel = {};
        recursos.forEach(r => { mapaConservar[String(r.nombre||"").toLowerCase().trim()] = r.id; });

        const getOrCreate = (nombre, categoria, unidad, precio) => {
          const key = nombre.toLowerCase().trim();
          const modo = (modoRecursos[categoria]||modoRecursos||"conservar");
          if (modo === "actualizar") {
            if (!mapaExcel[key]) {
              const idR = Date.now()+Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaExcel[key] = idR;
            }
            return mapaExcel[key];
          } else {
            if (!mapaConservar[key]) {
              const idR = Date.now()+Math.random();
              nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
              mapaConservar[key] = idR;
            }
            return mapaConservar[key];
          }
        };

        let apuIdx = 0;
        let apuActual = null;
        let secActual = null;

        rows.forEach((row, i) => {
          if (!row || row.every(v => v === null)) return;
          const colA = row[0] ? String(row[0]).trim() : "";
          const colG = row[6]; // jornal MO
          const colH = row[7]; // unidad materiales / tipo equipo
          const colI = row[8]; // tarifa/precio/cantidad
          const colJ = row[9]; // rendimiento

          // Detectar inicio de APU
          if (colA.startsWith("ITEM:")) {
            const codigoOrig = colA.replace("ITEM:","").trim();
            const unidad = colI ? String(colI).replace("UNIDAD:","").trim() : "un";
            // Descripción está en siguiente fila
            const descRow = rows[i+1];
            const desc = descRow && descRow[0] ? String(descRow[0]).replace("DESCRIPCIÓN:","").trim() : codigoOrig;
            const numStr = String(++apuIdx).padStart(2,"0");
            apuActual = { id:Date.now()+Math.random(), codigo:`${pref}-${numStr}`, nombre:desc, unidad:unidad||"un", lineas:[] };
            nuevosApus.push(apuActual);
            secActual = null;
            return;
          }

          if (!apuActual) return;

          // Detectar sección
          if (/^I\.\s*EQUIPO/i.test(colA))       { secActual = "maquinaria"; return; }
          if (/^II\.\s*MATER/i.test(colA))        { secActual = "material";   return; }
          if (/^III\.\s*TRANS/i.test(colA))       { secActual = "transporte"; return; }
          if (/^IV\.\s*MANO/i.test(colA))         { secActual = "mano_obra";  return; }
          if (/^Herramienta$/i.test(colA))         { secActual = "herramienta_sec"; return; }
          if (/^I\.COSTOS/i.test(colA)||/^Precio unitario/i.test(colA)) { secActual = null; return; }
          // Skip header rows and subtotals
          if (!colA || /^Descripci[oó]n/i.test(colA) || /Sub-Total/i.test(String(colJ||""))) return;

          if (secActual === "maquinaria") {
            const nombre = colA;
            const tarifa = typeof colI === "number" ? colI : 0;
            const rend   = typeof colJ === "number" ? colJ : null;
            if (!nombre || nombre.length < 3 || rend === null || rend === 0) return;
            // rendimiento en este formato es unidades/hora → precio por unidad APU = tarifa/rendimiento
            const precioUnitario = tarifa / rend;
            const recId = getOrCreate(nombre, "maquinaria", "hr", tarifa);
            // Guardamos rendimiento como 1/rend para que calcule bien: precio*rendimiento = tarifa/rend*1 = correcto
            apuActual.lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"maquinaria", rendimiento: 1/rend, cantidad:null });

          } else if (secActual === "material") {
            const nombre = colA;
            const und    = row[7] ? String(row[7]).trim() : "un"; // col H = unidad
            const cant   = typeof colI === "number" ? colI : null; // col I = cantidad
            const precio = typeof colJ === "number" ? colJ : 0;   // col J = precio unitario
            if (!nombre || nombre.length < 3 || cant === null) return;
            const recId = getOrCreate(nombre, "material", und, precio);
            apuActual.lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"material", cantidad:cant, rendimiento:null });

          } else if (secActual === "transporte") {
            const nombre = colA;
            const tarifa = typeof colJ === "number" ? colJ : 0;  // col J = tarifa
            const cant   = typeof colI === "number" ? colI : null; // col I = M3-Km
            if (!nombre || nombre.length < 3 || cant === null) return;
            const recId = getOrCreate(nombre, "transporte", "global", tarifa);
            apuActual.lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"transporte", cantidad:cant, rendimiento:null });

          } else if (secActual === "mano_obra") {
            const nombre = colA;
            const jornal = typeof colI === "number" ? colI : 0;  // col I = jornal total
            const rend   = typeof colJ === "number" ? colJ : null; // col J = rendimiento
            if (!nombre || nombre.length < 3 || rend === null || rend === 0) return;
            // rendimiento en este formato = unidades/día → precio por unidad APU = jornal/rendimiento
            const recId = getOrCreate(nombre, "mano_obra", "día", jornal);
            apuActual.lineas.push({ id:Date.now()+Math.random(), recursoId:recId, _sec:"mano_obra", rendimiento: 1/rend, cantidad:null });

          } else if (secActual === "herramienta_sec") {
            if (/herramienta menor/i.test(colA)) {
              const pct = typeof colI === "number" ? colI : 0.05; // col I = porcentaje real
              const hmId = getOrCreate("Herramienta menor", "maquinaria", "%M.O.", 0);
              apuActual.lineas.push({ id:Date.now()+Math.random(), recursoId:hmId, _sec:"maquinaria", _esHerramienta5:true, rendimiento:pct, cantidad:null });
            }
          }
        });

        if (!nuevosApus.length) { setImportApuError("No se encontraron APUs. Verifica que el archivo tenga el formato APU COL."); return; }

        if (nuevosRecursos.length) setRecursos(prev => [...prev, ...nuevosRecursos]);

        setApus(prev => {
          let agregados = 0;
          const mapa = [...prev];
          nuevosApus.forEach(a => {
            const i2 = mapa.findIndex(ex => String(ex.codigo||"").toLowerCase() === a.codigo.toLowerCase());
            if (i2 >= 0) mapa[i2] = { ...mapa[i2], nombre:a.nombre, unidad:a.unidad, lineas:a.lineas };
            else { mapa.push(a); agregados++; }
          });
          const totalLineas = nuevosApus.reduce((s,a) => s+a.lineas.length, 0);
          setImportApuOk(`✓ ${agregados} APUs importados · ${nuevosRecursos.length} recursos nuevos · ${totalLineas} líneas`);
          return mapa;
        });

        setShowImportModal(false);
        setImportPrefijo("");
      } catch(err) {
        console.error(err);
        setImportApuError("Error leyendo el archivo: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const ejecutarSmartImport = () => {
    const { wb, selectedSheets, colMap, prefijo } = smartImport;
    if (!prefijo?.trim()) { setImportPrefijoError("Escribe un prefijo"); return; }
    if (colMap?.apu?.desc == null) { setImportApuError("Indica al menos la columna de descripción del APU"); return; }
    setImportApuError("");

    const pref = prefijo.trim().toUpperCase();
    const nuevosRecursos = [];
    const nuevosApus = [];
    const mapaConservar = {};
    const mapaExcel = {};
    recursos.forEach(r => { mapaConservar[String(r.nombre||"").toLowerCase().trim()] = r.id; });

    const getOrCreate = (nombre, categoria, unidad, precio) => {
      const key = nombre.toLowerCase().trim();
      const modo = (importModoRecursos[categoria]||"conservar");
      if (modo === "actualizar") {
        if (!mapaExcel[key]) {
          const idR = Date.now()+Math.random();
          nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
          mapaExcel[key] = idR;
        }
        return mapaExcel[key];
      } else {
        if (!mapaConservar[key]) {
          const idR = Date.now()+Math.random();
          nuevosRecursos.push({ id:idR, nombre, codigo:`${pref}-R${String(nuevosRecursos.length+1).padStart(2,'0')}`, unidad:unidad||"un", precio:precio||0, categoria });
          mapaConservar[key] = idR;
        }
        return mapaConservar[key];
      }
    };

    const apuMap  = colMap.apu       || {};
    const eqMap2  = colMap.equipo    || {};
    const matMap2 = colMap.material  || {};
    const trMap2  = colMap.transporte|| {};
    const moMap2  = colMap.mano_obra || {};
    const seccionRows = smartImport.seccionRows || {};
    const manualApuRows = smartImport.apuRows || []; // manually marked APU rows

    // Build sorted section boundaries
    const secBoundaries = Object.entries(seccionRows)
      .map(([sec, rowIdx]) => ({ sec, rowIdx }))
      .sort((a,b) => a.rowIdx - b.rowIdx);

    const getSecForRow = (absRowIdx) => {
      let current = null;
      for (const b of secBoundaries) {
        if (absRowIdx >= b.rowIdx) current = b.sec;
        else break;
      }
      return current;
    };

    // If manual APU rows are set, use them to identify APUs
    const useManualApus = manualApuRows.length > 0;

    const cv = (row, idx) => idx!=null && idx>=0 ? row[idx] ?? null : null;
    const cvStr = (row, idx) => { const v=cv(row,idx); return v!=null?String(v).trim():null; };
    const cvNum = (row, idx) => { const v=cv(row,idx); return typeof v==="number"?v:(v!=null&&!isNaN(Number(v))?Number(v):null); };

    let apuIdx = 0;

    [...selectedSheets].forEach(sheetName => {
      const ws = wb.Sheets[sheetName];
      if (!ws) return;
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });

      let apuActual = null;
      let secActual = null; // "equipo" | "material" | "transporte" | "mano_obra"

      let rowAbsIdx = 0;
      rows.forEach(row => {
        if (!row || row.every(v=>v===null)) { rowAbsIdx++; return; }

        const cleanVal = (v) => v ? String(v).trim().replace(/^(ITEM:|DESCRIPCI[ÓO]N:|UNIDAD:|DESCRIPCION:)\s*/i, '').trim() : null;

        const desc  = apuMap.desc    != null ? cleanVal(row[apuMap.desc])    : null;
        const und   = apuMap.unidad  != null ? cleanVal(row[apuMap.unidad])  : null;

        // Determine current section from seccionRows boundaries
        const secFromBoundary = getSecForRow(rowAbsIdx);

        // Detect APU: either manual selection or automatic detection
        const descStr = desc ? String(desc).trim() : null;
        const undStr  = und  ? String(und).trim()  : null;
        const isBoundaryRow = secBoundaries.some(b => b.rowIdx === rowAbsIdx);

        const isManualAPU = useManualApus && manualApuRows.includes(rowAbsIdx);
        const isAutoAPU = !useManualApus && (() => {
          const esUnidadTexto = undStr && undStr.length<=10 && isNaN(Number(undStr)) && !/subtotal|c[oó]digo|descripci/i.test(undStr);
          const esDescLarga = descStr && descStr.length > 25;
          const esEncabezado = descStr && /^(descripci[oó]n|c[oó]digo|cargos personal|item de pago|subtotal)$/i.test(descStr.trim());
          return esDescLarga && (esUnidadTexto || apuMap.unidad==null) && !isBoundaryRow && !esEncabezado && !detectarSeccionSmart(descStr);

function calcFMdesdeData(fmData) {
  var d = fmData || FM_DEFAULTS;
  var keys = Object.keys(FM_DEFAULTS);
  var suma = keys.reduce(function(s,k){ return s + (Number(d[k]) || 0); }, 0);
  return parseFloat((1 + suma/100).toFixed(4));
}


function TabPresupuestoInterventoria({ proyecto, setPActivo, readOnly, plantillasInt, storageKey, perfil, session, catalogoEstampillas }) {
  const SK = storageKey || "presupInterv";
  const defaultData = () => ({
    fmData: Object.assign({}, FM_DEFAULTS),
    plazo: 0,
    estampillasActivas: null,  // null = usar defaults del catálogo
    capitulos: [
      { id: "pic_1", numero: 1, titulo: "Personal Profesional, Técnico y Administrativo", tipo: "personal", items: [] },
      { id: "pic_2", numero: 2, titulo: "Otros Gastos (Se paga a necesidad previa aprobación del supervisor)", tipo: "otros", items: [] }
    ]
  });

  const data = proyecto[SK] && proyecto[SK].capitulos
    ? proyecto[SK]
    : defaultData();

  const setData = (next) => {
    if (readOnly) return;
    if(window.__markEditing) window.__markEditing("interv");
    setPActivo(p => ({ ...p, [SK]: typeof next === "function" ? next(p[SK] && p[SK].capitulos ? p[SK] : defaultData()) : next }));
  };

  const fmData = data.fmData || Object.assign({}, FM_DEFAULTS);
  const fm = calcFMdesdeData(fmData);
  const capitulos = data.capitulos || [];

  const calcItem = (item, tipo) => {
    if (tipo === "personal") {
      return (Number(item.valorMesBase)||0) * (Number(item.cantidad)||0) * (Number(item.dedicacion)||1) * (Number(item.meses)||0);
    }
    return (Number(item.cantidad)||0) * (Number(item.valorUnitario)||0) * (Number(item.meses)||1);
  };

  const subtotalCap = (cap) => (cap.items||[]).reduce((s,i) => s + calcItem(i, cap.tipo), 0);
  const totalCap = (cap) => cap.tipo === "personal" ? subtotalCap(cap) * fm : subtotalCap(cap);
  const totalGeneral = capitulos.reduce((s, cap) => s + totalCap(cap), 0);

  // State
  const [capEdit,    setCapEdit]    = React.useState(null);  // id del cap editando nombre
  const [modalSec,   setModalSec]   = React.useState(null);  // { capId, editItemId? }
  const [formItem,   setFormItem]   = React.useState({});
  const [showPlant,  setShowPlant]  = React.useState(false); // selector plantillas
  const [busqPlant,  setBusqPlant]  = React.useState("");
  const [delCapConf, setDelCapConf] = React.useState(null);

  // Resumen perfeccionamiento (después de hooks)
  const catEst = catalogoEstampillas || [];
  // Todas las estampillas del municipio (sin filtro de tipo)
  const todasEstMunicipio = getEstampillasMunicipio(catEst, proyecto.municipioId);
  // Si no hay selección guardada, usar defaults del catálogo (aplicaInterv !== false)
  const estampillasActivasIds = data.estampillasActivas !== null && data.estampillasActivas !== undefined
    ? data.estampillasActivas
    : todasEstMunicipio.filter(e => e.aplicaInterv !== false).map(e => e.id);
  const estampillasSeleccionadas = todasEstMunicipio.filter(e => estampillasActivasIds.includes(e.id));
  const polizasSaved = (proyecto.polizasPorComp || {})[SK === "presupInterv" ? "interventoria" : "consultoria"] || {};
  const polizasActivas = polizasSaved.polizasActivas || [];
  const auPlazo = Number((proyecto.au || {}).plazo) || 0;
  const plazoMeses = Number(polizasSaved.plazoContractual) || auPlazo;
  const resumen = calcResumenInterv(totalGeneral, estampillasSeleccionadas, polizasActivas, plazoMeses);

  const toggleEstampilla = (id) => {
    if (readOnly) return;
    setData(prev => {
      const curr = prev.estampillasActivas !== null && prev.estampillasActivas !== undefined
        ? prev.estampillasActivas
        : todasEstMunicipio.filter(e => e.aplicaInterv !== false).map(e => e.id);
      const next = curr.includes(id) ? curr.filter(x => x !== id) : [...curr, id];
      return Object.assign({}, prev, { estampillasActivas: next });
    });
  };

  const setFMField = (key, val) => {
    if (readOnly) return;
    setData(prev => {
      var fd = Object.assign({}, FM_DEFAULTS, prev.fmData || {});
      fd[key] = val;

  const usarPlantilla = (plt) => {

// EXPORTAR PROYECTO A EXCEL

// Helper robusto para descargar Excel
function descargarExcel(wb, filename) {
  // Always use Blob method — works in file://, GitHub Pages, and all browsers
  try {
    const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array', cellStyles:true});
    const blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  } catch(e) {
    console.error('Download failed:', e);
    alert('Error al descargar el archivo: ' + e.message);
  }
}

function calcPol(p, vBase, plazo) {
    var pct=Number(p.pct)||0, pctP=Number(p.pctPrima)||0, mEx=Number(p.mesesExtra)||0;
    var va=Math.round(vBase*pct/100);
    var valor=Math.round(va*pctP/100);
    var tt=plazo+mEx;
    var dias=Math.round(tt*365/12);
    var siva=dias>0?Math.round(valor*dias/365):0;
    var civa=Math.round(siva*1.19);
    return {va:va,valor:valor,tt:tt,dias:dias,siva:siva,civa:civa};
  }

// ═══════════════════════════════════════════════════════════════════════════
// EXTRAS (SG-SST / PMA / PMT / Gestión Social)
//
// El valor de cada extra vive en su propia hoja (proyecto.extras_<campo>: secciones
// con ítems y factor prestacional). Antes se guardaba además una COPIA en
// au.extras.<campo>, que solo se refrescaba si abrías esa pestaña en modo edición.
// Esa copia se desincronizaba y contaminaba el costo total del proyecto.
//
// Regla nueva: si la hoja existe, ELLA MANDA. La copia solo se usa como respaldo
// para proyectos viejos que nunca tuvieron hoja.
// ═══════════════════════════════════════════════════════════════════════════
function calcExtraDeHoja(secs) {
  return (secs || []).reduce(function(st, sec) {
    var sub = (sec.items || []).reduce(function(s2, it) {
      return s2 + (Number(it.cantidad) || 0) * (Number(it.valorUnitario) || 0);
    }, 0);
    return st + sub * (Number(sec.factorPrestacional) || 1);
  }, 0);
}

function getExtra(proyecto, campo) {
  if (!proyecto) return 0;
  var secs = proyecto['extras_' + campo];
  if (Array.isArray(secs) && secs.length) return Math.round(calcExtraDeHoja(secs));
  // Sin hoja: se respeta el valor guardado (proyectos antiguos)
  return Math.round(Number(((proyecto.au || {}).extras || {})[campo]) || 0);
}

function getExtras(proyecto) {
  return {
    sgSst:         getExtra(proyecto, 'sgSst'),
    pma:           getExtra(proyecto, 'pma'),
    pmt:           getExtra(proyecto, 'pmt'),
    gestionSocial: getExtra(proyecto, 'gestionSocial')
  };
}

function getExtrasTotal(proyecto) {
  var e = getExtras(proyecto);
  return e.sgSst + e.pma + e.pmt + e.gestionSocial;
}

// ═══════════════════════════════════════════════════════════════════════════
// CONVERGENCIA A+U · Pólizas, Estampillas y Transacciones Bancarias se calculan
// sobre el COSTO TOTAL, pero a la vez viven DENTRO de él (subsección 1.8):
//
//   Costo Total ──► Pólizas + Estampillas + Transacciones ──► Administración 1.8
//        ▲                                                            │
//        └──────────────── suben el Costo Total ◄────────────────────┘
//
// Un solo paso NO basta: deja el proyecto subvalorado. Hay que iterar hasta que
// la base usada y el total resultante sean el mismo número.
// ═══════════════════════════════════════════════════════════════════════════
function _hallarSub18(au) {
  var secs = (au && au.secciones) || [];
  for (var i = 0; i < secs.length; i++) {
    var subs = secs[i].subsecciones || [];
    for (var j = 0; j < subs.length; j++) {
      var sb = subs[j], tit = String(sb.titulo || '').toLowerCase();
      if (sb.id === 's1_8' || String(sb.numero) === '1.8' || tit.indexOf('otros') === 0) return sb;
    }
  }
  return null;
}

function _escribirItems18(proj, vBase, catEst) {
  var au = proj.au, sub = _hallarSub18(au);
  if (!sub) return false;
  sub.items = sub.items || [];

  var polData = ((proj.polizasPorComp || {})['obra']) || {};
  var plazo   = Number(polData.plazoContractual) || Number(au.plazo) || 0;
  var totPol  = (polData.polizasActivas || []).reduce(function(s2, p) {
    var va    = Math.round(vBase * (Number(p.pct) || 0) / 100);
    var valor = Math.round(va * (Number(p.pctPrima) || 0) / 100);
    var dias  = Math.round((plazo + (Number(p.mesesExtra) || 0)) * 365 / 12);
    var siva  = dias > 0 ? Math.round(valor * dias / 365) : 0;
    return s2 + Math.round(siva * 1.19);
  }, 0);

  var munGrp = (catEst || []).find(function(g){ return g.id === proj.municipioId; }) || null;
  var totEst = (munGrp ? (munGrp.items || []) : []).reduce(function(s2, e) {
    return s2 + Math.round(vBase * (Number(e.pctDef) || 0) / 100);
  }, 0);

  var totTB = Math.round(vBase * 0.004 * 0.5);   // 4x1000 sobre la mitad = 0,2%

  function upsert(match, descripcion, valor, pref) {
    var idx = sub.items.findIndex(function(i){ return match(String(i.descripcion || '').toLowerCase()); });
    var it  = { id: idx >= 0 ? sub.items[idx].id : (pref + Date.now()),
                descripcion: descripcion, unidad: 'un',
                valorFijo: valor, porcentaje: null, baseCalculo: 'cd' };
    if (idx >= 0) sub.items[idx] = it; else sub.items.push(it);
  }
  upsert(function(d){ return d.indexOf('póliza')>=0 || d.indexOf('poliza')>=0; }, 'Pólizas', totPol, 'pol_au_');
  upsert(function(d){ return d.indexOf('estampilla')>=0; }, 'Estampillas', totEst, 'est_au_');
  upsert(function(d){ return d.indexOf('transacci')>=0; }, 'Transacciones Bancarias', totTB, 'tb_au_');
  return true;
}

// Devuelve el proyecto con la 1.8 ya convergida. No muta el original.
function convergerAU(proyecto, apus, recursos, catEst, maxIter) {
  if (!proyecto || !proyecto.au) return proyecto;
  var comps = proyecto.componentes || [];
  if (comps.length && comps.indexOf('obra') === -1) return proyecto;
  var proj = JSON.parse(JSON.stringify(proyecto));
  var MAX  = maxIter || 100;
  for (var i = 0; i < MAX; i++) {
    var base  = calcProyecto(proj, apus, recursos).total;
    if (!_escribirItems18(proj, base, catEst)) return proyecto;
    var nuevo = calcProyecto(proj, apus, recursos).total;
    if (Math.abs(nuevo - base) < 1) break;   // base usada == total resultante
  }
  return proj;
}

// ═══════════════════════════════════════════════════════════════════════════
// DETECTOR DE ÍTEMS PROBLEMÁTICOS
// Un ítem que apunta a un APU borrado se convierte en $0 EN SILENCIO (el código
// hace apus.find(...) y si no lo encuentra usa 0). En un presupuesto de miles de
// millones nadie nota un renglón en cero. Esta función los saca a la luz.
// ═══════════════════════════════════════════════════════════════════════════
function detectarProblemas(proyecto, apus, recursos) {
  var probs = [];
  var presups = (proyecto.presupuestosObra && proyecto.presupuestosObra.length)
    ? proyecto.presupuestosObra
    : [{ id:'p0', nombre:'Presupuesto Obra', capitulos: proyecto.capitulos||[] }];

  presups.forEach(function(ps) {
    (ps.capitulos||[]).forEach(function(cap) {
      (cap.items||[]).forEach(function(item, ii) {
        var apu = apus.find(function(a){ return a.id === item.apuId; });
        var ref = (ps.nombre||'Obra') + ' · Cap. ' + (cap.numero||'?') + '.' + (ii+1);
        var nombre = item.descripcion || '';
        if (!apu) {
          probs.push({ tipo:'huerfano', ref:ref, nombre: nombre || '(sin nombre)',
            detalle:'Apunta a un APU que ya no existe → vale $0' });
          return;
        }
        var apuEf = getApuEfectivo(apu, proyecto);
        var vu = calcAPUTotal(apuEf, recursos, getPctHerramienta(proyecto, ps));
        if (!(vu > 0)) {
          probs.push({ tipo:'apu_cero', ref:ref, nombre: apuEf.nombre || nombre,
            detalle:'El APU existe pero su valor unitario es $0 (¿sin recursos?)' });
        } else if (!(Number(item.cantidad) > 0)) {
          probs.push({ tipo:'cant_cero', ref:ref, nombre: apuEf.nombre || nombre,
            detalle:'Cantidad en 0 → el ítem no suma nada' });
        }
      });
    });
  });
  return probs;
}

function exportarProyectoExcel(proyecto, apus, recursos, opcion, catEst) {
  // El Excel es el entregable: se converge SIEMPRE antes de generarlo, pase lo que
  // pase en la app. Así el archivo nunca sale con la 1.8 desfasada.
  proyecto = convergerAU(proyecto, apus, recursos, catEst || []);
  proyecto = Object.assign({}, proyecto, { _catalogoEst: catEst || [] });
  var res      = calcProyecto(proyecto, apus, recursos);
  var cd       = res.cd;
  var comps    = proyecto.componentes || [];
  var tieneObra  = comps.includes('obra') || comps.length === 0;
  var tieneInt   = comps.includes('interventoria');
  var wb = XLSX.utils.book_new();

  var presups = (proyecto.presupuestosObra && proyecto.presupuestosObra.length)
    ? proyecto.presupuestosObra
    : [{ id:'p0', nombre:'Presupuesto Obra', capitulos: proyecto.capitulos||[] }];

  // ── Helpers ──────────────────────────────────────────────────────────────
  function fmtN(n) { return n||0; }
  function fmtN2(x) { return (Number(x)||0).toFixed(2); }
  function safe(s) { return String(s||''); }
  function sheetName(n) {
    return n.replace(/[\/\\?\*\[\]:]/g,'').slice(0,31).trim() || 'Hoja';
  }

  // Cell writer
  function ws_set(ws, r, c, val, type) {
    var cell = XLSX.utils.encode_cell({r:r, c:c});
    ws[cell] = { v: val, t: type||'s' };
  }
  // ── PRECISIÓN ────────────────────────────────────────────────────────────
  // Regla: la celda guarda el valor EXACTO (con todos sus decimales, igual que
  // el sistema por dentro) y el FORMATO ($#,##0) hace que se vea igual que en
  // pantalla. Así, cualquier SUM() o fórmula dentro de Excel da exactamente el
  // mismo número que el sistema, sin quedar un peso arriba o abajo.
  function NUM(v) { var x = Number(v); return isFinite(x) ? x : 0; }
  function colL(c) { return XLSX.utils.encode_col(c); }
  function ref(r, c) { return colL(c) + (r+1); }          // F12
  function refA(r, c) { return '$'+colL(c)+'$'+(r+1); }   // $F$12
  function rng(r1, r2, c) { return ref(r1,c) + ':' + ref(r2,c); }
  function n(ws, r, c, val, fmt) {
    var cell = XLSX.utils.encode_cell({r:r,c:c});
    ws[cell] = {v:NUM(val), t:'n', z:fmt||'$#,##0'};
  }
  function nDec(ws, r, c, val) {
    var cell = XLSX.utils.encode_cell({r:r,c:c});
    ws[cell] = {v:NUM(val), t:'n', z:'#,##0.0000'};
  }
  function s(ws, r, c, val) { ws_set(ws, r, c, safe(val), 's'); }
  function setRange(ws, data) {
    var maxR = 0, maxC = 0;
    Object.keys(ws).forEach(function(k) {
      if(k[0]==='!') return;
      var d = XLSX.utils.decode_cell(k);
      if(d.r > maxR) maxR = d.r;
      if(d.c > maxC) maxC = d.c;
    });
    ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:maxR,c:maxC}});
    if(data) ws['!cols'] = data;
  }

  // ── Estilos Excel ────────────────────────────────────────────────────────
  var bT={style:"thin"}, bM={style:"medium"};
  var brd={top:bT,bottom:bT,left:bT,right:bT};
  var brdM={top:bM,bottom:bM,left:bM,right:bM};
  var R_AL={horizontal:"right"}, C_AL={horizontal:"center"};
  function FG(rgb){ return {fgColor:{rgb:rgb}}; }
  function FT(rgb,bold,sz){ return {color:{rgb:rgb},bold:!!bold,sz:sz||10}; }
  var ST = {
    hdr:  function(){ return {font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd,alignment:C_AL}; },
    cap:  function(){ return {font:FT("FFFFFF",true,10),fill:FG("374151"),border:brd}; },
    tot:  function(){ return {font:FT("FFFFFF",true,11),fill:FG("B91C1C"),border:brdM,alignment:R_AL}; },
    tot2: function(){ return {font:FT("FFFFFF",true,11),fill:FG("7F1D1D"),border:brd,alignment:R_AL}; },
    rowA: function(){ return {fill:FG("FFFFFF"),border:brd}; },
    rowB: function(){ return {fill:FG("F9FAFB"),border:brd}; },
    lbl:  function(){ return {font:FT("111827",true),fill:FG("F3F4F6"),border:brd}; },
    mon:  function(st){ return {fill:(st&&st.fill)||FG("FFFFFF"),border:brd,alignment:R_AL}; },
    info: function(){ return {font:FT("1E40AF",false),fill:FG("EFF6FF"),border:brd}; },
  };
  function sc(ws,r,c,val,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={v:safe(val),t:"s",s:st||ST.rowA()}; }
  function nc(ws,r,c,val,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={v:NUM(val),t:"n",z:"$#,##0",s:st||ST.mon()}; }
  function ndc(ws,r,c,val,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={v:NUM(val),t:"n",z:"#,##0.0000",s:st||ST.rowA()}; }
  function pc(ws,r,c,val,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={v:safe(val),t:"s",s:st||{fill:FG("F3F4F6"),border:brd,alignment:C_AL}}; }
  // Celda con FÓRMULA viva de Excel (=D5*E5, =SUM(F5:F9)...). Guarda además el
  // valor calculado por el sistema como valor en caché: si abres el archivo sin
  // recalcular ves el mismo número, y si Excel recalcula da exactamente igual.
  function fc(ws,r,c,formula,val,st,z){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={t:"n",f:formula,v:NUM(val),z:z||"$#,##0",s:st||ST.mon()}; }
  // Fórmula con formato de porcentaje (el valor es la fracción: 0.1234 => 12.34%)
  function fpc(ws,r,c,formula,val,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={t:"n",f:formula,v:NUM(val),z:"0.00%",s:st||{fill:FG("F3F4F6"),border:brd,alignment:C_AL}}; }
  // Número que se ve como porcentaje pero vale 5 (no 0.05) — para % de pólizas
  function npct(ws,r,c,val,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={v:NUM(val),t:"n",z:'0.00"%"',s:st||{fill:FG("FFFFFF"),border:brd,alignment:C_AL}}; }
  // Numérico con borde y formato libre (plazo, meses, días…)
  function nz(ws,r,c,val,z,st){ var k=XLSX.utils.encode_cell({r:r,c:c}); ws[k]={v:NUM(val),t:"n",z:z||"#,##0",s:st||{fill:FG("FFFFFF"),border:brd,alignment:C_AL}}; }

  // Hoja de pólizas (Obra / Interventoría / EDESO) con fórmulas vivas que
  // reproducen paso a paso el mismo cálculo redondeado del sistema.
  function hojaPolizas(polizas, valorBase, plazo, nombreHoja, refBase, notaBase) {
    var ws = {}, r = 0;
    // Fila 1: la BASE ASEGURADA, en una sola celda. Todas las pólizas de la hoja
    // apuntan a ella, así que cambiándola se recalcula toda la hoja.
    sc(ws,r,0,'Base asegurada',{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd});
    sc(ws,r,1,'',{fill:FG("1F2937"),border:brd});
    var filaBase = r;
    if(refBase) fc(ws,r,2,refBase,valorBase,{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd,alignment:R_AL});
    else nc(ws,r,2,valorBase,{font:FT("FFFFFF",true,11),fill:FG("1F2937"),border:brd,alignment:R_AL});
    sc(ws,r,3,notaBase||'',{font:FT("D1D5DB",false,10),fill:FG("1F2937"),border:brd});
    [4,5,6,7,8,9].forEach(function(ci){ sc(ws,r,ci,'',{fill:FG("1F2937"),border:brd}); });
    var VB = refA(filaBase,2);   // $C$1 — todas las fórmulas de la hoja la usan
    r++; r++;
    ['Póliza','% Valor','V.Asegurar','% Prima','VA×%Prima','Plazo (m)','+ Meses','Días','Prima s/IVA','Prima c/IVA']
      .forEach(function(h,ci){ sc(ws,r,ci,h,ST.hdr()); });
    r++;
    var first = r, totP = 0;
    (polizas||[]).forEach(function(p) {
      var c2 = calcPol(p, valorBase, plazo);
      totP += c2.civa;
      sc(ws,r,0,safe(p.nombre||''),ST.rowA());
      npct(ws,r,1,Number(p.pct)||0);
      fc(ws,r,2,'ROUND('+VB+'*'+ref(r,1)+'/100,0)',c2.va);
      npct(ws,r,3,Number(p.pctPrima)||0);
      fc(ws,r,4,'ROUND('+ref(r,2)+'*'+ref(r,3)+'/100,0)',c2.valor);
      nz(ws,r,5,plazo,'0');
      nz(ws,r,6,Number(p.mesesExtra)||0,'0');
      fc(ws,r,7,'ROUND(('+ref(r,5)+'+'+ref(r,6)+')*365/12,0)',c2.dias,
         {fill:FG("FFFFFF"),border:brd,alignment:C_AL},'0');
      fc(ws,r,8,'IF('+ref(r,7)+'>0,ROUND('+ref(r,4)+'*'+ref(r,7)+'/365,0),0)',c2.siva);
      fc(ws,r,9,'ROUND('+ref(r,8)+'*1.19,0)',c2.civa);
      r++;
    });
    var last = r-1;
    var filaTotPol = r;
    sc(ws,r,0,'TOTAL PÓLIZAS c/IVA',ST.tot());
    [1,2,3,4,5,6,7,8].forEach(function(ci){ sc(ws,r,ci,'',ST.tot()); });
    if(last>=first) fc(ws,r,9,'SUM('+rng(first,last,9)+')',totP,ST.tot());
    else n(ws,r,9,0);
    setRange(ws,[{wch:35},{wch:10},{wch:16},{wch:10},{wch:16},{wch:10},{wch:8},{wch:8},{wch:16},{wch:16}]);
    var nmPol = nombreUnico(nombreHoja);
    XLSX.utils.book_append_sheet(wb, ws, nmPol);
    return { ws: ws, nombre: nmPol, refTotal: link(nmPol, ref(filaTotPol,9)),
             refBaseCell: link(nmPol, refA(filaBase,2)), filaBase: filaBase, total: totP };
  }

  // ── ENLACES ENTRE HOJAS ──────────────────────────────────────────────────
  // Cada valor apunta con una fórmula a la celda de la hoja donde realmente se
  // calcula: Recursos → APUs → Presupuesto → Resumen / A+U → Pólizas y Estampillas.
  // Así, haciendo clic en la celda, Excel te lleva al origen del número.
  var usedNames = {};
  function q(nm){ return "'" + String(nm).replace(/'/g,"''") + "'"; }
  function link(hoja, celda){ return q(hoja)+'!'+celda; }
  var refVU     = {};   // psId -> apuId -> 'APUs · X'!F12   (V. Unitario del APU)
  var refPrecio = {};   // recursoId -> 'Recursos'!E5        (precio del recurso)
  var refTotAU  = null; // 'Cálculo A+U'!H22                 (COSTO TOTAL C.D.+C.I.)
  var refAdminAU = null, refUtilAU = null, refCDAU = null, refObraTot = null;
  var hojasExtras = [];   // SG-SST / PMA / PMT / Gestión Social (se añaden al final)
  var refExtra = {};      // campo -> celda TOTAL de su hoja
  var refFM = null;      // celda del Factor Multiplicador (hoja propia)
  var _wsIntv = null;    // para enlazar después la fila de pólizas a su hoja
  var refPolObraTot = null, refEstTot = null;   // totales de Pólizas Obra / Estampillas
  var _totPolObra = 0, _totEstObra = 0;
  var _verif = null;      // datos para el bloque de VERIFICACIÓN del A+U
  var refIntTot = null; // 'Presupuesto Interventoría'!H..   (VALOR TOTAL interventoría)
  var refFichaB = null; // 'Ficha Financiera'!B..            (SUBTOTAL RECURSOS)
  var hojasFin  = [];   // hojas construidas ya, pero añadidas al final del libro

  function nombreUnico(base) {
    var nm = sheetName(base);
    if(usedNames[nm]) { usedNames[nm]++; nm = nm.slice(0,28)+'_'+usedNames[nm]; } else usedNames[nm]=1;
    return nm;
  }

  // ── 0a. HOJA DE RECURSOS (el origen de todos los precios) ────────────────
  var HOJA_REC = null;
  (function() {
    var recsUsados = {};
    presups.forEach(function(ps) {
      getApusUsados(proyecto, apus, recursos, ps).forEach(function(apu) {
        var ao = apus.find(function(a){ return a.id===apu.id; })||{};
        var lns = (proyecto.apuOverrides&&proyecto.apuOverrides[apu.id])||(ao.lineas||[]);
        lns.forEach(function(l){ if(l.recursoId) recsUsados[l.recursoId] = true; });
      });
    });
    var lista = recursos.filter(function(rc){ return recsUsados[rc.id]; });
    if(!lista.length) return;
    var wsR2 = {}, r = 0;
    HOJA_REC = nombreUnico('Recursos');
    sc(wsR2,r,0,'RECURSOS · precios base del proyecto',{font:FT("FFFFFF",true,12),fill:FG("1F2937"),border:brd});
    [1,2,3,4].forEach(function(ci){ sc(wsR2,r,ci,'',{fill:FG("1F2937"),border:brd}); });
    r++;
    ['Código','Recurso','Und','Categoría','Precio'].forEach(function(h,ci){ sc(wsR2,r,ci,h,ST.hdr()); });
    r++;
    var CATS = {material:'Materiales', mano_obra:'Mano de Obra', maquinaria:'Maquinaria / Equipo', transporte:'Transporte'};
    lista.forEach(function(rc, i) {
      var st = i%2===0?ST.rowA():ST.rowB();
      sc(wsR2,r,0,safe(rc.codigo),st);
      sc(wsR2,r,1,safe(rc.nombre),st);
      sc(wsR2,r,2,safe(rc.unidad||''),{fill:st.fill,border:brd,alignment:C_AL});
      sc(wsR2,r,3,CATS[rc.categoria]||safe(rc.categoria),st);
      nc(wsR2,r,4,rc.precio||0,ST.mon(st));
      refPrecio[rc.id] = link(HOJA_REC, ref(r,4));
      r++;
    });
    setRange(wsR2,[{wch:12},{wch:45},{wch:10},{wch:20},{wch:16}]);
    hojasFin.push({ws:wsR2, nm:HOJA_REC});
  })();

  // ── 0b. HOJAS DE APUs (una por presupuesto, con su % de herramienta) ─────
  presups.forEach(function(psA) {
    var wsAPU = {}, r = 0;
    var apusUsados = getApusUsados(proyecto, apus, recursos, psA);
    var pctHerr = getPctHerramienta(proyecto, psA);
    if(!apusUsados.length) return;
    var nmA = presups.length>1 ? nombreUnico('APUs · '+(psA.nombre||'Obra')) : nombreUnico('APUs Proyectos');
    refVU[psA.id] = {};

    sc(wsAPU,r,0,'APUs · '+safe(psA.nombre||'Presupuesto Obra'),{font:FT("FFFFFF",true,12),fill:FG("1F2937"),border:brd});
    [1,2,3,4].forEach(function(ci){ sc(wsAPU,r,ci,'',{fill:FG("1F2937"),border:brd}); });
    sc(wsAPU,r,5,'Herramienta menor: '+(pctHerr*100).toFixed(1)+'% M.O.',{font:FT("FFFFFF",true,10),fill:FG("1F2937"),border:brd,alignment:R_AL});
    r++;
    ['Código','Recurso','Und','Cantidad/Rendimiento','P. Unitario','Subtotal'].forEach(function(h,ci){ sc(wsAPU,r,ci,h,ST.hdr()); });
    r++;

    apusUsados.forEach(function(apu) {
      var ao = apus.find(function(a){ return a.id===apu.id; })||{};
      var lineas = (proyecto.apuOverrides&&proyecto.apuOverrides[apu.id])||(ao.lineas||[]);
      var totalMO = calcTotalMO(lineas, recursos);
      var vu = calcAPUTotal(ao.id?Object.assign({},ao,{lineas:lineas}):{lineas:lineas}, recursos, pctHerr);

      var filaVU = r, refsSec = [];
      sc(wsAPU,r,0,safe(apu.codigo),ST.cap());
      sc(wsAPU,r,1,safe(apu.nombre),ST.cap());
      sc(wsAPU,r,2,'',ST.cap());
      sc(wsAPU,r,3,'Unidad: '+safe(apu.unidad),ST.cap());
      sc(wsAPU,r,4,'V. UNITARIO',ST.cap());
      refVU[psA.id][apu.id] = link(nmA, ref(filaVU,5));   // ← aquí vive el V. Unitario
      r++;

      SECCIONES_APU.forEach(function(sec) {
        var ls = lineas.filter(function(l) {
          var rec = recursos.find(function(rr){ return rr.id===l.recursoId; });
          return rec && rec.categoria===sec.id;
        });
        var conHerr = (sec.id==='maquinaria' && totalMO>0);
        if(!ls.length && !conHerr) return;
        var sub = ls.reduce(function(ss,l){ return ss+calcLinea(l,recursos,lineas); },0);
        var moExtra = conHerr ? totalMO*pctHerr : 0;
        var nFilas = ls.filter(function(l){ return !!recursos.find(function(rr){ return rr.id===l.recursoId; }); }).length + (conHerr?1:0);
        var filaSec = r;

        [0,2,3,4].forEach(function(ci){ sc(wsAPU,r,ci,'',ST.lbl()); });
        sc(wsAPU,r,1,'  '+sec.label,ST.lbl());
        if(nFilas>0) fc(wsAPU,filaSec,5,'SUM('+rng(filaSec+1,filaSec+nFilas,5)+')',sub+moExtra,ST.mon());
        else nc(wsAPU,filaSec,5,0,ST.mon());
        refsSec.push(ref(filaSec,5));
        r++;

        ls.forEach(function(l) {
          var rec = recursos.find(function(rr){ return rr.id===l.recursoId; });
          if(!rec) return;
          var val = sec.usa==='cantidad' ? (l.cantidad||0) : (l.rendimiento||0);
          var subL = calcLinea(l,recursos,lineas);
          sc(wsAPU,r,0,safe(rec.codigo),ST.rowA());
          sc(wsAPU,r,1,safe(rec.nombre),ST.rowA());
          sc(wsAPU,r,2,safe(rec.unidad||''),{fill:FG('FFFFFF'),border:brd,alignment:C_AL});
          ndc(wsAPU,r,3,val);
          // P. Unitario → enlazado a la hoja Recursos
          if(refPrecio[rec.id]) fc(wsAPU,r,4,refPrecio[rec.id],rec.precio||0,ST.mon());
          else nc(wsAPU,r,4,rec.precio||0,ST.mon());
          fc(wsAPU,r,5,ref(r,3)+'*'+ref(r,4),subL,ST.mon());
          r++;
        });
        if(conHerr) {
          sc(wsAPU,r,0,'-',ST.info());
          sc(wsAPU,r,1,'Herramienta menor ('+(pctHerr*100).toFixed(1)+'% M.O.)',ST.info());
          sc(wsAPU,r,2,'%M.O.',{fill:FG('EFF6FF'),border:brd,alignment:C_AL});
          ndc(wsAPU,r,3,pctHerr,{fill:FG('EFF6FF'),border:brd,alignment:R_AL});
          nc(wsAPU,r,4,totalMO,ST.mon());
          fc(wsAPU,r,5,ref(r,3)+'*'+ref(r,4),moExtra,{font:FT('1E40AF',true),fill:FG('EFF6FF'),border:brd,alignment:R_AL});
          r++;
        }
      });
      if(refsSec.length) fc(wsAPU,filaVU,5,refsSec.join('+'),vu,{font:FT('FFFFFF',true,10),fill:FG('374151'),border:brd,alignment:R_AL});
      else nc(wsAPU,filaVU,5,vu,{font:FT('FFFFFF',true,10),fill:FG('374151'),border:brd,alignment:R_AL});
      r++;
    });

    setRange(wsAPU,[{wch:12},{wch:45},{wch:10},{wch:18},{wch:16},{wch:16}]);
    hojasFin.push({ws:wsAPU, nm:nmA});
  });

  // ── 1. PRESUPUESTOS DE OBRA ───────────────────────────────────────────────
  var refCapPs = {};    // psId -> [ {ref} ] para enlazar desde el Resumen
  var refsCDPs = [];    // celdas COSTO DIRECTO de cada hoja de presupuesto
  presups.forEach(function(ps) {
    var caps = ps.capitulos || [];
    var cdPs = caps.reduce(function(sum, cap) {
      return sum + (cap.items||[]).reduce(function(s2, it) { return s2 + calcItem(it,apus,recursos,proyecto,ps); }, 0);
    }, 0);
    var ws = {}, r = 0;

    // Header info
    sc(ws,r,0,'PROYECTO',ST.lbl()); sc(ws,r,1,proyecto.nombre||'',ST.info()); r++;
    sc(ws,r,0,'CÓDIGO',ST.lbl()); sc(ws,r,1,proyecto.codigo||'',ST.info()); r++;
    sc(ws,r,0,'CONTRATANTE',ST.lbl()); sc(ws,r,1,proyecto.contratante||'',ST.info()); r++;
    sc(ws,r,0,'PRESUPUESTO',ST.lbl()); sc(ws,r,1,ps.nombre||'',ST.info()); r++;
    r++;

    // Column headers — idénticas a la tabla que se ve en "Ver"
    ['Ítem','Descripción','Und','Cantidad','V. Unitario','V. Total','% Incid.'].forEach(function(h,ci){ sc(ws,r,ci,h,ST.hdr()); });
    r++;

    // Items — V. Total sale de una fórmula (=Cantidad × V.Unitario) y el total de
    // capítulo de un =SUM() de sus ítems, con los valores guardados sin redondear.
    var refsCap = [], celdasPct = [], capsRefs = [];
    caps.forEach(function(cap) {
      var itemsCap = cap.items||[];
      var cdCap = itemsCap.reduce(function(ss,it){ return ss+calcItem(it,apus,recursos,proyecto,ps); },0);
      var filaCap = r;
      // Chapter row
      [0,2,3,4].forEach(function(ci){ sc(ws,r,ci,'',ST.cap()); });
      sc(ws,r,1,'CAP. '+safe(cap.numero)+' — '+safe(cap.nombre),ST.cap());
      if(itemsCap.length) fc(ws,filaCap,5,'SUM('+rng(filaCap+1,filaCap+itemsCap.length,5)+')',cdCap,ST.tot());
      else nc(ws,filaCap,5,0,ST.tot());
      celdasPct.push({r:filaCap, v:(cdPs>0?cdCap/cdPs:0), st:ST.cap()});
      refsCap.push(ref(filaCap,5));
      capsRefs.push({fila:filaCap, valor:cdCap});
      r++;
      itemsCap.forEach(function(item, ii) {
        var apu = apus.find(function(a){ return a.id===item.apuId; });
        var apuEfectivo = apu ? getApuEfectivo(apu, proyecto) : null;
        // Sin redondeos intermedios: misma cuenta exacta que usa la vista "Ver" (calcAPUTotal/calcItem).
        var vu = apuEfectivo ? calcAPUTotal(apuEfectivo,recursos,getPctHerramienta(proyecto,ps)) : 0;
        var vt = calcItem(item,apus,recursos,proyecto,ps);
        var st2=ii%2===0?ST.rowA():ST.rowB();
        sc(ws,r,0,safe(cap.numero)+'.'+(ii+1),{font:{color:{rgb:'B91C1C'},bold:true},fill:st2.fill,border:brd});
        sc(ws,r,1,(apuEfectivo?safe(apuEfectivo.nombre):'')||safe(item.descripcion),st2);
        sc(ws,r,2,(apu?safe(apu.unidad):'')||safe(item.unidad),{fill:st2.fill,border:brd,alignment:C_AL});
        ndc(ws,r,3,item.cantidad||0,{fill:st2.fill,border:brd,alignment:R_AL});
        // V. Unitario → enlazado a la celda V.UNITARIO del APU en su hoja de APUs
        var lnkVU = apu && refVU[ps.id] && refVU[ps.id][apu.id];
        if(lnkVU) fc(ws,r,4,lnkVU,vu,ST.mon(st2));
        else nc(ws,r,4,vu,ST.mon(st2));
        fc(ws,r,5,ref(r,3)+'*'+ref(r,4),vt,{font:{bold:true},fill:st2.fill,border:brd,alignment:R_AL});
        celdasPct.push({r:r, v:(cdPs>0?vt/cdPs:0), st:{fill:st2.fill,border:brd,alignment:C_AL}});
        r++;
      });
    });
    r++;

    // Footer — misma fórmula proporcional que usa la vista "Ver" para Administración/Utilidad por presupuesto
    var prop = cd>0 ? cdPs/cd : 0;
    var aEste = Math.round((res.auGastos||0)*prop);
    var uEste = Math.round(cd*(res.pctU||0)/100*prop);
    var pctA = cd>0 ? aEste/cd*100 : 0;
    var pctU = cd>0 ? uEste/cd*100 : 0;
    var costoTotal = cdPs+aEste+uEste;
    var filaCD = r, filaA = r+1, filaU = r+2;

    [0,2,3,4].forEach(function(ci){ sc(ws,r,ci,'',ST.tot()); });
    sc(ws,r,1,'COSTO DIRECTO (C.D.)',ST.tot());
