function HiloObs({cid, idx, desc, tabLabel, allObs, session, enviar, eliminar, openKey, setOpenKey, textos, setTextos, replyTo, setReplyTo}) {
  const lk    = (c,i) => c+"__"+i;
  const k     = lk(cid,idx);
  // Comparar SIEMPRE como texto: cap.id llega como número y o.capitulo_id como
  // string desde la base → con === (número vs texto) nunca coincidían y los
  // comentarios existían pero no se pintaban en su línea.
  const _mismaLinea = o => String(o.capitulo_id)===String(cid) && String(o.item_index)===String(idx);
  const raices= allObs.filter(o=>_mismaLinea(o)&&!o.parent_id);
  const allReps=allObs.filter(o=>o.parent_id!=null&&o.parent_id!==undefined);
  const total = allObs.filter(_mismaLinea).length;
  const isOpen= openKey===k;

  const fmtF = iso => {
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})
           +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };

  const enviarRespuesta = (rKey, parentId) => {
    const txt=(textos[rKey]||"").trim(); if(!txt) return;
    enviar(cid,idx,desc,tabLabel,parentId,rKey);
  };

  return React.createElement("div",{style:{padding:"6px 12px 10px 24px",borderTop:"1px solid #F3F4F6"}},
    React.createElement("button",{
      onClick:()=>setOpenKey(isOpen?null:k),
      style:{
        background:total>0?"#FEF3C7":"#F9FAFB",
        border:`1px solid ${total>0?"#FDE68A":"#E5E7EB"}`,
        borderRadius:6,padding:"3px 12px",fontSize:11,cursor:"pointer",
        color:total>0?"#92400E":"#6B7280",fontWeight:600,
        display:"inline-flex",alignItems:"center",gap:5
      }
    },"💬 "+(total>0?total+" comentario"+(total>1?"s":""):"Comentar")),

    isOpen&&React.createElement("div",{style:{marginTop:10,display:"flex",flexDirection:"column",gap:10}},
      raices.map(o=>React.createElement(BurbujaMensaje,{
        key:o.id,msg:o,depth:0,esRespuesta:false,
        allReps,session,eliminar,setReplyTo,replyTo,textos,setTextos,enviarRespuesta,fmtF
      })),
      React.createElement("div",{style:{display:"flex",gap:6}},
        React.createElement("textarea",{
          style:{flex:1,padding:"8px 10px",border:"1px solid #E5E7EB",borderRadius:6,
            fontSize:12,outline:"none",resize:"vertical",fontFamily:"var(--sans)",minHeight:60},
          placeholder:"Escribe una observación...",
          value:textos[k]||"",rows:3,
          onChange:e=>setTextos(t=>({...t,[k]:e.target.value}))
        }),
        React.createElement("button",{
          onClick:()=>enviar(cid,idx,desc,tabLabel,null,k),
          style:{background:"#B91C1C",color:"#fff",border:"none",borderRadius:6,
            padding:"0 14px",fontWeight:700,cursor:"pointer",alignSelf:"flex-end",height:44}
        },"💬")
      )
    )
  );
}

function TabObsView({proyecto, apus, recursos, perfil, session, catalogoEstampillas, plantillasAU, catalogoPolizas, plantillasFicha, esVisor, onClose}) {
  const [allObs, setAllObs] = useState([]);
  const [busy,   setBusy]   = useState(true);
  const [openKey,setOpenKey]= useState(null);
  const [textos, setTextos] = useState({});
  const [replyTo,setReplyTo]= useState({});
  const [tabActiva, setTabActiva] = useState("");

  const lk = (cid,idx) => cid+"__"+idx;

  const obsViewRef = React.useRef(null);
  obsViewRef.current = () => {
    _sb.from("observaciones").select("*")
      .eq("proyecto_id", String(proyecto.id))
      .order("created_at",{ascending:true})
      .then(({data})=>{
        setAllObs(prev=>{
          const pend = (prev||[]).filter(o=>o._pendiente && Number(o.id)<0);
          return [...(data||[]), ...pend];
        });
        setBusy(false);
      });
  };

  // Pestaña inicial: la PRIMERA hoja que tenga comentarios (para que no queden
  // ocultos en otra hoja al recargar). Si ninguna hoja tiene, abre la primera.
  const initialTabRef = React.useRef(false);
  useEffect(()=>{
    const firstPs = (proyecto.presupuestosObra && proyecto.presupuestosObra.length)
      ? proyecto.presupuestosObra[0]
      : {id:"p0"};
    setTabActiva("presupuesto_obra_"+firstPs.id);
  },[]);
  // Una vez cargados los comentarios, si la hoja abierta no tiene y otra sí,
  // saltar a la primera hoja de obra con comentarios (solo la primera vez).
  useEffect(()=>{
    if(initialTabRef.current || busy || !allObs.length) return;
    const hojas = (proyecto.presupuestosObra && proyecto.presupuestosObra.length)
      ? proyecto.presupuestosObra
      : [{id:"p0", capitulos:proyecto.capitulos||[]}];
    for(const ps of hojas){
      const ids = new Set((ps.capitulos||[]).map(c=>String(c.id)));
      if(allObs.some(o=>ids.has(String(o.capitulo_id)))){
        setTabActiva("presupuesto_obra_"+ps.id);
        initialTabRef.current = true;
        return;
      }
    }
    initialTabRef.current = true;
  },[busy, allObs]);

  useEffect(()=>{
    obsViewRef.current();
    const ch=_sb.channel("obsview_"+proyecto.id)
      .on("postgres_changes",{event:"*",schema:"public",table:"observaciones"},
        ()=>obsViewRef.current())
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[proyecto.id]);

  const cargar = ()=>obsViewRef.current();

  const obsDeLinea  = (cid,idx) => allObs.filter(o=>String(o.capitulo_id)===String(cid)&&String(o.item_index)===String(idx)&&!o.parent_id);
  const repsDe      = (oid)     => allObs.filter(o=>o.parent_id===oid);
  const totalLinea  = (cid,idx) => allObs.filter(o=>String(o.capitulo_id)===String(cid)&&String(o.item_index)===String(idx)).length;

  const enviar = async(cid, idx, desc, tabLabel, parentId=null, textKey=null) => {
    const k = textKey || lk(cid,idx);
    const txt=(textos[k]||"").trim();
    if(!txt) return;
    const nueva = {
      proyecto_id:String(proyecto.id), capitulo_id:cid, item_index:idx,
      tab_label:tabLabel, linea_desc:desc,
      parent_id:parentId||null, texto:txt,
      user_id:session?.user?.id, user_email:session?.user?.email,
      user_nombre:perfil?.nombre||session?.user?.email,
    };
    // Optimistic update: add immediately to local state
    const tempId = -Date.now();
    const tempObs = {...nueva, id: tempId, created_at: new Date().toISOString(), _pendiente:true};
    setAllObs(prev=>[...prev, tempObs]);
    setTextos(t=>({...t,[k]:""}));
    setReplyTo(r=>({...r,[k]:false}));
    // Guardar y LEER la fila creada (para tener el id real). Si falla, NO se pierde
    // el comentario: se conserva en pantalla y se avisa qué pasó.
    const {data, error} = await _sb.from("observaciones").insert(nueva).select().single();
    if(error){
      console.error("Guardar observación falló:", error);
      setAllObs(prev=>prev.filter(o=>o.id!==tempId));
      setTextos(t=>({...t,[k]:txt}));
      alert("No se pudo guardar la observación:\n"+(error.message||error.details||"error desconocido")+
            "\n\nEl texto sigue en el cuadro para reintentar.");
      return;
    }
    setAllObs(prev=>prev.map(o=>o.id===tempId?data:o));
  };

  const eliminar = async(obsId) => {
    const id = Number(obsId);
    if(!id) return;
    if(id<0){ setAllObs(prev=>prev.filter(o=>Number(o.id)!==id)); return; }
    // Optimistic: quitar de UI de inmediato
    setAllObs(prev=>prev.filter(o=>Number(o.id)!==id && Number(o.parent_id)!==id));
    // Borrar respuestas primero (por FK), luego el comentario raíz
    await _sb.from("observaciones").delete().eq("parent_id", id);
    await _sb.from("observaciones").delete().eq("id", id);
    // Refrescar desde servidor
    setTimeout(()=>{ if(obsViewRef.current) obsViewRef.current(); }, 600);
  };

  const fmtF = iso => {
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})
           +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  };


  const comps = proyecto.componentes||[];
  const tieneObra = comps.includes("obra")||comps.length===0;
  const tieneInterv = comps.includes("interventoria");
  const tieneConsult = comps.includes("consultoria");
  const apusUsados = React.useMemo(()=>getApusUsados(proyecto, apus, recursos), [proyecto, apus, recursos]);
  const [apuPsSel, setApuPsSel] = useState(null);
  const presupuestosObra2 = (proyecto.presupuestosObra && proyecto.presupuestosObra.length)
    ? proyecto.presupuestosObra
    : [{id:"p0", nombre:"Presupuesto Obra", capitulos: proyecto.capitulos||[]}];
  const comps2 = proyecto.componentes||[];
  const _tieneObra   = comps2.includes("obra")||comps2.length===0;
  const _tieneInterv = comps2.includes("interventoria");
  const _tieneConsult= comps2.includes("consultoria");

  const tabs = [
    ...(_tieneObra ? presupuestosObra2.map(ps=>({id:"presupuesto_obra_"+ps.id, label:ps.nombre||"Presupuesto Obra", show:true})) : []),
    {id:"calculo_au",              label:"Cálculo A+U",               show:_tieneObra},
    {id:"polizas_obra",            label:"Pólizas Obra",              show:_tieneObra},
    {id:"estampillas",             label:"Estampillas",               show:_tieneObra},
    {id:"sgsst",                   label:"✓ SG-SST",                  show:_tieneObra&&!!(proyecto.activo_sgSst)},
    {id:"pma",                     label:"✓ PMA",                     show:_tieneObra&&!!(proyecto.activo_pma)},
    {id:"pmt",                     label:"✓ PMT",                     show:_tieneObra&&!!(proyecto.activo_pmt)},
    {id:"gsocial",                 label:"✓ Gestión Social",          show:_tieneObra&&!!(proyecto.activo_gestionSocial)},
    {id:"presupuesto_interventoria",label:"Presupuesto Interventoría",show:_tieneInterv},
    {id:"polizas_interventoria",   label:"Pólizas Interventoría",     show:_tieneInterv},
    {id:"presupuesto_consultoria", label:"Presupuesto Consultoría",   show:_tieneConsult},
    {id:"polizas_consultoria",     label:"Pólizas Consultoría",       show:_tieneConsult},
    {id:"polizas_edeso",           label:"Pólizas EDESO",             show:_tieneObra||_tieneInterv},
    {id:"fichaFinanciera",         label:"Ficha Financiera",          show:_tieneObra||_tieneInterv},
    {id:"resumen",                 label:"Resumen",                   show:true},
    {id:"apus_usados",             label:`APUs Proyectos (${apusUsados.length})`, show:apusUsados.length>0},
  ].filter(t=>t.show);

  // Cálculos pesados MEMOIZADOS: antes se recalculaba el proyecto entero (que
  // itera hasta 30 veces para converger el A+U) en CADA render — incluso al
  // teclear un comentario. En proyectos grandes eso ponía lentísimo al visor,
  // que arranca directo en esta vista. Ahora se calcula una sola vez.
  const res  = React.useMemo(()=>calcProyecto(proyecto, apus, recursos), [proyecto, apus, recursos]);
  const cdMemo = React.useMemo(()=>calcCD(proyecto, apus, recursos), [proyecto, apus, recursos]);

  // ── Render por tab ────────────────────────────────────────────────────────
  const renderTabContent = () => {
    // Presupuestos de obra
    if(tabActiva.startsWith("presupuesto_obra_")) {
      const psId=tabActiva.slice("presupuesto_obra_".length);
      const presups=(proyecto.presupuestosObra&&proyecto.presupuestosObra.length)
        ?proyecto.presupuestosObra:[{id:"p0",nombre:"Presupuesto Obra",capitulos:proyecto.capitulos||[]}];
      const ps2=presups.find(x=>String(x.id)===String(psId))||presups[0]||{};
      const psLabel=ps2.nombre||"Presupuesto Obra";
      const capsToShow=ps2.capitulos||[];
      return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        capsToShow.map(cap=>{
          const items=cap.items||[]; if(!items.length) return null;
          const cdCap=items.reduce((s,it)=>s+calcItem(it,apus,recursos,proyecto,ps2),0);
          return React.createElement("div",{key:cap.id,className:"card",style:{overflow:"hidden"}},
            React.createElement("div",{style:{background:"#1F2937",padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
              React.createElement("div",{style:{display:"flex",gap:12,alignItems:"center"}},
                React.createElement("span",{style:{color:"#9CA3AF",fontFamily:"var(--mono)",fontSize:11}},`CAP. ${cap.numero}`),
                React.createElement("span",{style:{color:"#fff",fontWeight:700}},cap.nombre)
              ),
              React.createElement("span",{style:{fontFamily:"var(--mono)",color:"#6EE7B7",fontWeight:700}},fmt(cdCap))
            ),
            items.map((item,idx)=>{
              const apu=apus.find(a=>a.id===item.apuId);
              const apuEf=apu?getApuEfectivo(apu,proyecto):null;
              const vu=apuEf?calcAPUTotal(apuEf,recursos,getPctHerramienta(proyecto,ps2)):0;
              const vt=(item.cantidad||0)*vu;
              const desc=(apuEf?.nombre)||item.descripcion||`Ítem ${idx+1}`;
              return React.createElement("div",{key:item.id,style:{borderBottom:"1px solid #F3F4F6",background:openKey===lk(cap.id,idx)?"#FFFBF0":"#fff"}},
                React.createElement("div",{style:{display:"grid",gridTemplateColumns:"60px 1fr 70px 100px 120px 130px",gap:8,padding:"10px 20px",alignItems:"center"}},
                  React.createElement("code",{style:{fontFamily:"var(--mono)",fontSize:11,color:"var(--red)"}},`${cap.numero}.${idx+1}`),
                  React.createElement("div",null,
                    React.createElement("div",{style:{fontSize:13,fontWeight:500}},desc),
                    apu&&React.createElement("div",{style:{fontSize:10,color:"#9CA3AF"}},apu.codigo)
                  ),
                  React.createElement("div",{style:{fontSize:11,color:"#6B7280",textAlign:"center"}},(apu?.unidad)||item.unidad||""),
                  React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:12,textAlign:"right",color:"#6B7280"}},fmtN(item.cantidad,2)),
                  React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:12,textAlign:"right",color:"#6B7280"}},apu?fmt3(vu):"—"),
                  React.createElement("div",{style:{fontFamily:"var(--mono)",fontSize:13,textAlign:"right",fontWeight:700}},apu?fmt(vt):"—")
                ),
                React.createElement(HiloObs,{cid:cap.id,idx,desc,tabLabel:psLabel,allObs,session,enviar,eliminar,openKey,setOpenKey,textos,setTextos,replyTo,setReplyTo})
              );
            })
          );
        })
      );
    }
    if(tabActiva==="calculo_au") {
      return React.createElement(TabAU,{
        proyecto: proyecto,
        au:proyecto.au||{}, setAu:()=>{},
        cd:cdMemo,
        total:res.total,
        plantillasAU:plantillasAU||[],
        readOnly:true, perfil, session,
        obsProps:{allObs,session,enviar,eliminar,openKey,setOpenKey,textos,setTextos,replyTo,setReplyTo}
      });
    }
    if(tabActiva.startsWith("polizas_")){
      const cid=tabActiva.slice(8);
      const comp = (proyecto.polizasPorComp||{})[cid]||{};
      const polizas = comp.polizasActivas||[];
      return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        polizas.length > 0 && React.createElement("div",{className:"card"},
          React.createElement("div",{style:{padding:"10px 16px",fontWeight:600,fontSize:12,color:"var(--ink3)",borderBottom:"1px solid var(--line)"}},"Observaciones por póliza"),
          polizas.map((pol,pi)=>React.createElement("div",{key:pi,style:{borderBottom:"1px solid #F3F4F6"}},
            React.createElement("div",{style:{padding:"8px 20px",fontSize:13}},pol.nombre||pol.tipo||`Póliza ${pi+1}`),
            React.createElement(HiloObs,{
              cid:`pol_${cid}`, idx:pi,
              desc:`Pólizas ${cid} › ${pol.nombre||pol.tipo||`Póliza ${pi+1}`}`,
              tabLabel:`Pólizas ${cid}`,
              allObs,session,enviar,eliminar,openKey,setOpenKey,textos,setTextos,replyTo,setReplyTo
            })
          ))
        )
      );
    }
    if(tabActiva==="estampillas"){
      const estItems = (proyecto.estampillas||[]);
      return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        React.createElement(TabEstampillas,{proyecto,setPActivo:()=>{},totalProyecto:res.total,catalogoEstampillas:catalogoEstampillas||[],readOnly:true,perfil,session,setAU:()=>{}}),
        estItems.length > 0 && React.createElement("div",{className:"card"},
          React.createElement("div",{style:{padding:"10px 16px",fontWeight:600,fontSize:12,color:"var(--ink3)",borderBottom:"1px solid var(--line)"}},"Observaciones por estampilla"),
          estItems.map((est,ei)=>React.createElement("div",{key:ei,style:{borderBottom:"1px solid #F3F4F6"}},
            React.createElement("div",{style:{padding:"8px 20px",fontSize:13}},est.nombre||`Estampilla ${ei+1}`),
            React.createElement(HiloObs,{
              cid:"estampillas", idx:ei,
              desc:`Estampillas › ${est.nombre||`Estampilla ${ei+1}`}`,
              tabLabel:"Estampillas",
              allObs,session,enviar,eliminar,openKey,setOpenKey,textos,setTextos,replyTo,setReplyTo
            })
          ))
        )
      );
    }
    if(tabActiva==="presupuesto_interventoria") {
      const caps = (proyecto.presupInterv||{}).capitulos||[];
      return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        React.createElement(TabPresupuestoInterventoria,{proyecto,setPActivo:()=>{},readOnly:true,storageKey:"presupInterv",perfil,session,catalogoEstampillas:catalogoEstampillas||[]}),
        caps.map(cap=>React.createElement("div",{key:cap.id,className:"card"},
          React.createElement("div",{style:{background:"#1F2937",padding:"8px 16px"}},
            React.createElement("span",{style:{color:"#fff",fontWeight:700}},cap.nombre||cap.titulo||"Capítulo")
          ),
          (cap.items||[]).map((item,ii)=>React.createElement("div",{key:item.id||ii,style:{borderBottom:"1px solid #F3F4F6"}},
            React.createElement("div",{style:{padding:"8px 20px",fontSize:13}},item.descripcion||`Ítem ${ii+1}`),
            React.createElement(HiloObs,{

// TAB PRESUPUESTO CONSULTORÍA

// ═══════════════════════════════════════════════════════
// FICHA FINANCIERA — cálculo con iteración
// ═══════════════════════════════════════════════════════
function calcPolizasEDESO(polizasActivas, valorBase, plazoMeses) {
  // Días = (plazo + mesesExtra) × 30  (lógica Excel Pólizas EDESO)
  return (polizasActivas || []).reduce(function(s, p) {
    var pct       = Number(p.pct)       || 0;
    var pctPrima  = Number(p.pctPrima)  || 0;
    var mesesExtra= Number(p.mesesExtra)|| 0;
    var va        = Math.round(valorBase * pct / 100);
    var valor     = Math.round(va * pctPrima / 100);
    var dias      = Math.round((plazoMeses + mesesExtra) * 365 / 12);
    var prima     = dias > 0 ? Math.round(valor * dias / 365) : 0;
    return s + Math.round(prima * 1.19);
  }, 0);
}

function calcFichaFinanciera(proyecto, obraTotal, intervTotal, consultTotal, maxIter) {
  if (maxIter === undefined) maxIter = 50;
  var ff = proyecto.fichaFinanciera || {};
  var pctHon  = Number(ff.pctHonoarios !== undefined ? ff.pctHonoarios : 0.08);
  var pctIVA  = 0.19;
  var duracion = Number(ff.duracion) || 0;

  // Componentes manuales
  var totalPersonal  = (ff.componentesPersonal  || []).reduce(function(s,i){ return s + (Number(i.cantidad)||0)*(Number(i.meses)||1)*(Number(i.valorUnit)||0); }, 0);
  var totalSocial    = (ff.componentesSocial    || []).reduce(function(s,i){ return s + (Number(i.cantidad)||0)*(Number(i.meses)||1)*(Number(i.valorUnit)||0); }, 0);
  var totalLogistico = (ff.componentesLogistico || []).reduce(function(s,i){ return s + (Number(i.cantidad)||0)*(Number(i.meses)||1)*(Number(i.valorUnit)||0); }, 0);
  var totalDiseno    = (ff.componentesDiseno    || []).reduce(function(s,i){ return s + (Number(i.valor)||0); }, 0);

  // Pólizas EDESO — convergen
  var polD = ((proyecto.polizasPorComp||{})["edeso"]) || {};
  var polizasActivas = polD.polizasActivas || [];
  var plazo = Number(polD.plazoContractual) || duracion;

  var subtotalDirecto   = Math.round(obraTotal + intervTotal + (consultTotal||0));
  var polizasEdeso      = 0;
  var subtotalIndirecto = 0;
  var totalRecursos     = 0;
  var honorarios        = 0;
  var iva               = 0;
  var totalContrato     = 0;

  for (var i = 0; i < maxIter; i++) {
    polizasEdeso      = calcPolizasEDESO(polizasActivas, subtotalDirecto + subtotalIndirecto, plazo);
    subtotalIndirecto = Math.round(totalPersonal + totalSocial + polizasEdeso + totalLogistico);
    totalRecursos     = Math.round(subtotalDirecto + subtotalIndirecto);
    honorarios        = Math.round(subtotalDirecto * pctHon);
    iva               = Math.round(honorarios * pctIVA);
    var newTotal      = Math.round(totalRecursos + honorarios + iva);
    if (Math.abs(newTotal - totalContrato) < 1) { totalContrato = newTotal; break; }
    totalContrato = newTotal;
  }

  return {
    duracion         : duracion,
    obraTotal        : obraTotal,
    intervTotal      : intervTotal,
    consultTotal     : Math.round(consultTotal||0),
    totalPersonal    : totalPersonal,
    totalSocial      : totalSocial,
    polizasEdeso     : polizasEdeso,
    totalLogistico   : totalLogistico,
    totalDiseno      : totalDiseno,
    subtotalDirecto  : subtotalDirecto,
    subtotalIndirecto: subtotalIndirecto,
    totalRecursos    : totalRecursos,
    honorarios       : honorarios,
    pctHon           : pctHon,
    iva              : iva,
    totalContrato    : totalContrato,
  };
}

      return { descripcion:it.descripcion, valorMesBase:it.valorMesBase||0,
               dedicacion:it.dedicacion||1, cantidad:1, meses:meses, activo:true };
    });

  // Calcular cantidades para que Personal = 3% × CD

    var personas = (ff.componentesPersonal||[]).filter(function(it){return it.activo!==false;});
    if (!personas.length) return;
    var cdBase = Math.round(obraTotal + intervTotal + (consultTotal||0));
    var target3pct = cdBase * 0.03;

    // Restar los demás componentes fijos

    var totalDiseno    = (ff.componentesDiseno    || []).reduce(function(s,i){ return s + (Number(i.valor)||0); }, 0);
    var polD = ((proyecto.polizasPorComp||{})["edeso"]) || {};

      var base = (it.valorUnit||it.valorMesBase||0) * mesesItem * (it.dedicacion||1);
      var cantidad = base > 0 ? targetPersona/base : 0;
      return Object.assign({},it,{cantidad:Math.round(cantidad*10000)/10000});
    });

      var found = nuevas.shift();

function ModuloProyectos({

      .then(({data})=>setAccesos((data||[]).map(x=>String(x.proyecto_id))));

      .on("postgres_changes",{event:"*",schema:"public",table:"proyecto_accesos",
        filter:`user_id=eq.${session.user.id}`},
        ()=>_sb.from("proyecto_accesos").select("proyecto_id").eq("user_id",session.user.id)
              .then(({data})=>setAccesos((data||[]).map(x=>String(x.proyecto_id))))

  const [vista, setVista] = useState("lista");
  const [pActivo, setPActivo] = useState(null);
  // Lista efectiva de APUs dentro del proyecto = globales + APUs locales del proyecto.

  const apus = useMemo(() => {

  // Editor de APU accesible desde el ítem del capítulo (crear / editar / editar-local)
  const [apuEditor, setApuEditor] = useState(null);
  const [tabDetalle, setTabDetalle] = useState("");
  const [tabEditor, setTabEditorRaw] = useState("presupuesto");
  const setTabEditor = React.useCallback((tab) => {
    setTabEditorRaw(tab);

      const psId2 = tab.slice("presupuesto_obra_".length);
      setPActivo(function(p) {
        if (!p) return p;
        var presups2 = p.presupuestosObra && p.presupuestosObra.length > 0
          ? p.presupuestosObra
          : [{ id:"p0", capitulos: p.capitulos||[] }];
        var psFnd = presups2.find(function(x){ return x.id===psId2; }) || presups2[0];

  const [busq, setBusq] = useState("");

  const [showApuModal, setShowApuModal] = useState(null);
  const [dragItem, setDragItem] = useState(null); // {capId, itemId}
  const [dragOver, setDragOver] = useState(null); // {capId, itemId} or {capId, end:true}

  const dbSaveCap = (cap, proyId, psId) => {

    const tipoRow = psId ? ("obra_ps:"+psId) : (cap.tipo||"obra");

      id: String(cap.id), proyecto_id: String(proyId||pActivo?.id),

  const dbDelCap = (capId, proyId) => {

  const dbSaveItem = (item, capId, capNumero, proyId) => {

    }, "item_"+(proyId||pActivo?.id)+"_"+item.id);
  };

  const dbDelItem = (itemId, proyId) => {
    safeDelete("items_presupuesto", {proyecto_id:String(proyId||pActivo?.id), id:String(itemId)}, "item_del_"+itemId);
  };

  // Merge cambio externo de cap/item al estado local — NUNCA borra trabajo local
  const mergeCapExterno = React.useCallback((event, row) => {
    setPActivo(p => {
      if(!p || String(p.id)!==String(row.proyecto_id)) return p;
      const newCap = { id:row.id, numero:row.numero, nombre:row.nombre, tipo:row.tipo||"obra", orden:row.orden||0, items:[] };
      const updCap = c => String(c.id)===String(row.id) ? {...c, numero:row.numero, nombre:row.nombre, tipo:row.tipo||c.tipo} : c;
      // DELETE: solo eliminar si el usuario local no tiene ítems en ese cap
      if(event==="DELETE") {
        const capLocal = (p.capitulos||[]).find(c=>String(c.id)===String(row.id));
        const tieneItems = capLocal && (capLocal.items||[]).length > 0;
        if(tieneItems) return p; // proteger cap con ítems locales
        return {...p,
          capitulos: (p.capitulos||[]).filter(c=>String(c.id)!==String(row.id)),
          presupuestosObra: (p.presupuestosObra||[]).map(ps=>({...ps,capitulos:(ps.capitulos||[]).filter(c=>String(c.id)!==String(row.id))}))
        };
      }
      // INSERT/UPDATE: actualizar si existe, AGREGAR si no existe
      const existeLeg = (p.capitulos||[]).find(c=>String(c.id)===String(row.id));
      const existePs  = (p.presupuestosObra||[]).some(ps=>(ps.capitulos||[]).find(c=>String(c.id)===String(row.id)));
      const tipoEsPs  = row.tipo === "obra_ps";
      return {
        ...p,
        capitulos: existeLeg
          ? (p.capitulos||[]).map(updCap)
          : (!tipoEsPs ? [...(p.capitulos||[]), newCap] : (p.capitulos||[])),
        presupuestosObra: (p.presupuestosObra||[]).map(ps=>({...ps,
          capitulos: existePs
            ? (ps.capitulos||[]).map(updCap)
            : (tipoEsPs ? [...(ps.capitulos||[]), newCap] : (ps.capitulos||[]))
        }))

    });
  },[]);

  // Flag: usuario está escribiendo activamente → ignorar updates externos
  const _editingRef = React.useRef(false);
  // Map of section -> timestamp of last edit (for field-level protection)
  const _editingSecs = React.useRef({});
  const _markEditing = React.useCallback((sec) => {

      _editingRef.current = false;

      var now = Date.now();
      Object.keys(_editingSecs.current).forEach(function(k) {
        if(now - _editingSecs.current[k] > 12000) delete _editingSecs.current[k];
      });
    }, 12000);
  }, []);
  React.useEffect(() => {
    window.__markEditing = _markEditing;
    var iv = setInterval(function(){
      window.__editingRef_current = _editingRef.current;
      window.__editingSecs_current = _editingSecs.current;
    }, 100);
    return function() { window.__markEditing = null; clearInterval(iv); };
  }, [_markEditing]);
const mergeItemExterno = React.useCallback((event, row) => {
    // No bloqueamos por _editingRef — siempre fusionamos ítem por ítem
    setPActivo(p => {
      if(!p || String(p.id)!==String(row.proyecto_id)) return p;
      const newItem = {
        // Igual conversión que en la carga inicial: apu_id llega como texto de
        // la base, pero los APUs en memoria usan id numérico.
        id:row.id, apuId: row.apu_id!=null && !isNaN(Number(row.apu_id)) ? Number(row.apu_id) : row.apu_id,
        descripcion:row.descripcion||"",
        unidad:row.unidad||"",
        cantidad:Number(row.cantidad)||0,
      };
      const mergeCaps = (caps) => (caps||[]).map(cap => {
        if(String(cap.id)!==String(row.capitulo_id)) return cap;
        if(event==="DELETE") {
          // Solo eliminar si el ítem no fue modificado localmente recientemente
          return {...cap, items: (cap.items||[]).filter(i=>String(i.id)!==String(row.id))};
        }
        const existe = (cap.items||[]).find(i=>String(i.id)===String(row.id));
        if(existe) {
          // Solo actualizar campos que no estén siendo editados localmente (cantidad)
          // Si la cantidad local difiere de la guardada, es posible que el usuario la esté editando
          // → preservar cantidad local, actualizar descripcion/unidad/apu
          return {...cap, items: cap.items.map(i=>String(i.id)===String(row.id)
            ? {...i, apuId:newItem.apuId, descripcion:newItem.descripcion, unidad:newItem.unidad,
               // preserve local quantity if user has it focused
               cantidad: (window.__editingRef_current && i.cantidad !== newItem.cantidad) ? i.cantidad : newItem.cantidad}
            : i)};
        }
        return {...cap, items: [...(cap.items||[]), newItem]};
      });
      return {
        ...p,
        capitulos: mergeCaps(p.capitulos),
        presupuestosObra: (p.presupuestosObra||[]).map(ps => ({...ps, capitulos: mergeCaps(ps.capitulos||[])}))
      };
    });
  },[]);

  // Suscripción a cambios de caps e items del proyecto activo
  useEffect(()=>{
    if(!pActivo?.id || (vista!=="editor" && vista!=="detalle")) return;
    const pid = String(pActivo.id);
    const myEmail = session?.user?.email;
    const ch = _sb.channel("caps_items_"+pid)
      .on("postgres_changes",{event:"*",schema:"public",table:"capitulos_presupuesto",
        filter:`proyecto_id=eq.${pid}`},
        p=>{ if(p.new?.updated_by_email===myEmail||p.old?.updated_by_email===myEmail) return;
             mergeCapExterno(p.eventType, p.eventType==="DELETE"?p.old:p.new); })
      .on("postgres_changes",{event:"*",schema:"public",table:"items_presupuesto",
        filter:`proyecto_id=eq.${pid}`},
        p=>{ if(p.new?.updated_by_email===myEmail||p.old?.updated_by_email===myEmail) return;
             mergeItemExterno(p.eventType, p.eventType==="DELETE"?p.old:p.new); })
      .subscribe();
    return()=>_sb.removeChannel(ch);
  },[pActivo?.id, vista]);

  // ── Auto-guardado por sección ─────────────────────────────────────────────
  const prevPActivoRef = React.useRef(null);
  const secTimers      = React.useRef({});
  const lastSavedRef   = React.useRef({}); // último valor guardado por sección

  // Guardado de seguridad cada 10 segundos — SOLO de la sección que corresponde a

  // quien solo persiste lo que realmente está editando.
  const tabEditorRef = React.useRef(tabEditor);
  React.useEffect(()=>{ tabEditorRef.current = tabEditor; }, [tabEditor]);

  const seccionDeTab = (tab) => {
    if(!tab) return null;
    if(tab.startsWith("presupuesto_obra")) return "caps";
    if(tab === "presupuesto_interventoria") return "interv";
    if(tab === "presupuesto_consultoria")   return "consult";
    if(tab === "au" || tab === "calculo_au") return "au";
    if(tab.startsWith("polizas"))            return "pol";
    if(tab === "estampillas")                return "est";
    return null;
  };

  useEffect(()=>{
    if(!pActivo||vista!=="editor"||!guardarSeccion) return;
    const secciones = {caps:"capitulos",au:"au",pol:"polizasPorComp",est:"estampillas",interv:"presupInterv",consult:"presupConsult"};
    const iv = setInterval(()=>{
      if(!pActivo||vista!=="editor") return;
      const secActiva = seccionDeTab(tabEditorRef.current);
      if(!secActiva) return;
      const field = secciones[secActiva];
      Object.entries(secciones).forEach(([sec,f])=>{
        if(sec!==secActiva) lastSavedRef.current[sec] = JSON.stringify(pActivo[f]);
      });
      const actual = JSON.stringify(pActivo[field]);
      if(actual !== lastSavedRef.current[secActiva]) {
        lastSavedRef.current[secActiva] = actual;
        guardarSeccion(pActivo.id, secActiva, pActivo[field]);
      }
    }, 4000);
    return ()=>clearInterval(iv);
  },[pActivo?.id, vista]);

  useEffect(()=>{
    if(!pActivo||vista!=="editor"||!guardarSeccion) return;
    const prev = prevPActivoRef.current;
    if(!prev||prev.id!==pActivo.id){
      prevPActivoRef.current=pActivo;
      // Guardar todas las secciones al abrir el proyecto (primera vez)
      const secciones = {caps:"capitulos",au:"au",pol:"polizasPorComp",est:"estampillas",interv:"presupInterv",consult:"presupConsult"};
      Object.entries(secciones).forEach(([sec,field])=>{
        lastSavedRef.current[sec] = JSON.stringify(pActivo[field]);
      });

    }

    const secciones = {
      caps:"capitulos", au:"au", pol:"polizasPorComp",
      est:"estampillas", interv:"presupInterv", consult:"presupConsult"
    };
    const metaFields=["codigo","nombre","contratante","descripcion","componentes","aiu","apuOverrides","apuNombreOverrides","apusLocales","porcentajeHerramienta","finalizado","snapshot","extras_sgSst","activo_sgSst","extras_pma","activo_pma","extras_pmt","activo_pmt","extras_gestionSocial","activo_gestionSocial"];

    // BLINDAJE MULTIUSUARIO: solo se persiste la sección que corresponde a la pestaña
    // abierta. Si un handler ensucia OTRA sección de rebote (p.ej. cambiar el plazo

        // viejo al cambiar de pestaña.

      }, 250);
    }

  },[pActivo,vista]);

  // ── Recibir sección de otro usuario ───────────────────────────────────────
  useEffect(()=>{

      est:"estampillas",interv:"presupInterv",consult:"presupConsult",
      extras_sgSst:"extras_sgSst",extras_pma:"extras_pma",extras_pmt:"extras_pmt",extras_gestionSocial:"extras_gestionSocial"};

    const mergeCapsArrays = (local, remoto) => {
      if(!remoto) return local;
      if(!local || !local.length) return remoto;
      const resultado = [...local];
      (remoto||[]).forEach(capR => {
        const idx = resultado.findIndex(c=>String(c.id)===String(capR.id));
        if(idx === -1) {
          // Cap nuevo del otro usuario → agregar
          resultado.push(capR);
        } else {
          // Cap existente → fusionar ítems también
          const capL = resultado[idx];
          const itemsLocales = capL.items || [];
          const itemsRemotos = capR.items || [];
          const itemsMerged = [...itemsLocales];
          itemsRemotos.forEach(itemR => {
            const ii = itemsMerged.findIndex(i=>String(i.id)===String(itemR.id));
            if(ii === -1) itemsMerged.push(itemR); // ítem nuevo del otro
            // Si existe, no pisar — el usuario local tiene prioridad
          });

      });

      if(!pActivo||String(pActivo.id)!==String(proyId)) return;

      var now = Date.now();
      // Si el usuario está editando ACTIVAMENTE esta sección, no aplicar encima la
      // versión del otro (la recibirá al soltar). Antes "au" y "caps" se aplicaban
      // siempre y pisaban lo que la persona estaba escribiendo.
      var editandoEsta = secEditing[sec] && (now - secEditing[sec] < 12000);
      setPActivo(p=>{
        if(!p||String(p.id)!==String(proyId)) return p;
        if(sec==="meta") return {...p,...(value||{})};
        // Caps: fusionar en lugar de reemplazar

        }

          if(editandoEsta) return p;
          var extrasLocal=(p.au||{}).extras||{};
          var extrasRemoto=(value||{}).extras||{};
          var mergedExtras={};
          Object.keys({...extrasLocal,...extrasRemoto}).forEach(function(k) {
            var extSec="extras_"+k;
            var editingExt=secEditing[extSec]&&(now-secEditing[extSec]<12000);
            mergedExtras[k]=editingExt?extrasLocal[k]:(extrasRemoto[k]!=null?extrasRemoto[k]:extrasLocal[k]);
          });
          return {...p,au:{...(value||{}),extras:mergedExtras}};
        }
        // Interventoría / Consultoría: fusionar capítulos también
        if(sec==="interv"||sec==="consult") {
          if(editandoEsta) return p;
          const field=SEC_FIELD[sec];
          const local=p[field]||{};
          const remoto=value||{};
          return {...p,[field]:{

            capitulos: mergeCapsArrays(local.capitulos, remoto.capitulos)

        }

        var isEditing = secEditing[sec]&&(now-secEditing[sec]<12000);

  },[pActivo?.id]);
  const [busqApu, setBusqApu] = useState(""); const [selectedApuIds, setSelectedApuIds] = useState([]);
  const [delItem, setDelItem] = useState(null);
  const [capEdit, setCapEdit] = useState(null);
  const proyectosVisibles = useMemo(()=>{
    if(!esVisor) return proyectos;

  },[proyectos,esVisor,accesos]);
  const filtered = useMemo(() => {
    if (!busq.trim()) return proyectosVisibles;

    return proyectosVisibles.filter(p => String(p.nombre||"").toLowerCase().includes(q) || String(p.codigo||"").toLowerCase().includes(q) || String(p.contratante||"").toLowerCase().includes(q));

// ── Almacenamiento: usa localStorage si está disponible, sino memoria ──
const _memStore = {};
const store = {
  getItem: (k) => {
    try { return localStorage.getItem(k); } catch(e) { return _memStore[k] || null; }
  },
  setItem: (k, v) => {
    try { localStorage.setItem(k, v); } catch(e) { _memStore[k] = v; }
  }
};

// ═══════════════════════════════════════════════════════
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("EDESO Error:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", minHeight: "100vh", gap: 16,
          fontFamily: "system-ui, sans-serif", background: "#F8F9FB",
          color: "#111827", padding: 32, textAlign: "center"
        }
      },
        React.createElement("div", { style: { fontSize: 48 } }, "⚠️"),
        React.createElement("h2", { style: { fontSize: 20, fontWeight: 700, margin: 0 } }, "Algo salió mal"),
        React.createElement("p", { style: { color: "#6B7280", maxWidth: 400, margin: 0 } },
          "Ocurrió un error inesperado. Tus datos están guardados. Recarga la página para continuar."
        ),
        React.createElement("details", { style: { maxWidth: 600, textAlign: "left" } },
          React.createElement("summary", { style: { cursor: "pointer", color: "#B91C1C" } }, "Ver detalle del error"),
          React.createElement("pre", {
            style: { background: "#1E293B", color: "#E2E8F0", padding: 16, borderRadius: 8,
                     fontSize: 12, overflow: "auto", marginTop: 8 }
          }, this.state.error ? this.state.error.toString() : "Error desconocido")
        ),
        React.createElement("button", {
          onClick: () => this.setState({ hasError: false, error: null }),
          style: {
            background: "#B91C1C", color: "#fff", border: "none",
            padding: "10px 24px", borderRadius: 8, cursor: "pointer",
            fontSize: 14, fontWeight: 600
          }
        }, "Intentar de nuevo")
      );
    }
    return this.props.children;
  }
}

// Inferir descripción del cambio comparando arrays
function inferirAccion(modulo, anterior, nuevo_) {
  if (!Array.isArray(anterior)||!Array.isArray(nuevo_)) return "Actualizó "+modulo;
  const nom = arr => (arr[0]?.nombre||arr[0]?.codigo||arr[0]?.descripcion||"");
  if (nuevo_.length>anterior.length) {
    const added=nuevo_.filter(n=>!anterior.find(a=>a.id===n.id));
    return "Creó en "+modulo+(nom(added)?": "+nom(added):"");
  }
  if (nuevo_.length<anterior.length) {
    const removed=anterior.filter(a=>!nuevo_.find(n=>n.id===a.id));
    return "Eliminó de "+modulo+(nom(removed)?": "+nom(removed):"");
  }
  const changed=nuevo_.filter(n=>{const o=anterior.find(a=>a.id===n.id);return o&&JSON.stringify(o)!==JSON.stringify(n);});
  return "Modificó en "+modulo+(nom(changed)?": "+nom(changed):"");
}

        )

      ? React.createElement(TabObsView,{

  );

// ═══════════════════════════════════════════════════════
// OFFLINE SYNC MANAGER
// ═══════════════════════════════════════════════════════
const OFFLINE_QUEUE_KEY = 'edeso_offline_queue';

const offlineQueue = {
  get: () => { try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)||'[]'); } catch(e){ return []; } },
  add: (op) => {
    try {
      const q = offlineQueue.get();
      // Replace existing op for same key (last write wins per key)
      const idx = q.findIndex(x=>x.key===op.key);
      if(idx>=0) q[idx]=op; else q.push(op);
      localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
    } catch(e){ console.warn('Queue add failed:', e); }
  },
  clear: () => { try { localStorage.removeItem(OFFLINE_QUEUE_KEY); } catch(e){} },
  remove: (key) => {
    try {
      const q = offlineQueue.get().filter(x=>x.key!==key);
      localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
    } catch(e){}
  }
};

// Safe Supabase upsert — queues if offline
async function safeUpsert(table, data, queueKey) {
  if(!_sb) return;
  if(!navigator.onLine) {
    offlineQueue.add({ table, data, key: queueKey, ts: Date.now() });
    console.log('Queued offline:', queueKey);
    return;
  }
  const {error} = await _sb.from(table).upsert(data);
  if(error) {
    // Network error — queue it
    if(error.message?.includes('network')||error.message?.includes('fetch')) {
      offlineQueue.add({ table, data, key: queueKey, ts: Date.now() });
    } else {
      console.error('upsert error:', table, error);
    }
  }
}

// Safe Supabase delete — queues if offline  
async function safeDelete(table, filters, queueKey) {
  if(!_sb) return;
  if(!navigator.onLine) {
    offlineQueue.add({ table, filters, isDelete:true, key: queueKey+'_del', ts: Date.now() });
    return;
  }
  let q = _sb.from(table).delete();
  Object.entries(filters).forEach(([k,v])=>{ q = q.eq(k,v); });
  const {error} = await q;
  if(error && (error.message?.includes('network')||error.message?.includes('fetch'))) {
    offlineQueue.add({ table, filters, isDelete:true, key: queueKey+'_del', ts: Date.now() });
  }
}

// Flush queued operations when back online
async function flushOfflineQueue(setSyncMsg) {
  const q = offlineQueue.get();
  if(!q.length) return;
  console.log(`Flushing ${q.length} offline operations...`);
  setSyncMsg && setSyncMsg(`🔄 Sincronizando ${q.length} cambios pendientes...`);
  let success = 0;
  for(const op of q) {
    try {
      if(op.isDelete) {
        let query = _sb.from(op.table).delete();
        Object.entries(op.filters).forEach(([k,v])=>{ query = query.eq(k,v); });
        const {error} = await query;
        if(!error) { offlineQueue.remove(op.key); success++; }
      } else {
        const {error} = await _sb.from(op.table).upsert(op.data);
        if(!error) { offlineQueue.remove(op.key); success++; }
      }
    } catch(e) { console.warn('Flush error:', e); }
  }
  const remaining = offlineQueue.get().length;
  if(remaining===0) {
    setSyncMsg && setSyncMsg('✅ Todo sincronizado');
    setTimeout(()=>setSyncMsg&&setSyncMsg(''), 3000);
  } else {
    setSyncMsg && setSyncMsg(`⚠️ ${remaining} cambios pendientes`);
  }
  console.log(`Flushed ${success}/${q.length} operations`);
}


function App() {
  // ── Auth ──────────────────────────────────────────────
  const [sidebarOpen,setSidebarOpen] = useState(true);
  const [isOnline,setIsOnline]   = useState(navigator.onLine);
  const [usuariosActivos, setUsuariosActivos] = useState([]);
  const [session,setSession]   = useState(null);
  const [perfil,setPerfil]     = useState(null);
  const [dataReady,setDataReady] = useState(false);
  const [syncMsg,setSyncMsg]   = useState("");
  const [modulo,setModulo]     = useState("Proyectos");
  const [saveStatus,setSaveStatus] = useState(""); // "Guardando...", "Guardado hace Xs"
  const [presencia,setPresencia]   = useState({}); // {email: {nombre, seccion, ts}}
  const lastSaveTimeRef = React.useRef(null);

  // ── Data states ───────────────────────────────────────
  const [recursos,           setRecursosRaw]            = useState(RECURSOS_INIT);
  const [apus,               setApusRaw]                = useState(APUS_INIT);
  const [plantillasAU,       setPlantillasRaw]          = useState(PLANTILLAS_AU_INIT);
  const [proyectos,          setProyectosRaw]           = useState(PROYECTOS_INIT);
  const [catalogoPolizas,    setCatalogoPolizasRaw]     = useState([]);
  const [catalogoEstampillas,setCatalogoEstampillasRaw] = useState([]);
  const [plantillasInt,      setPlantillasIntRaw]       = useState([]);
  const [plantillasFichaRaw, setPlantillasFichaRaw]    = useState([]);
  const [moData,             setMODataRaw]              = useState({ smmlv: 1750905, trabajadores: [], cuadrillas: [] });
  const [subTitle,           setSubTitle]               = useState(null);

  // Datos base accesibles desde cualquier pestaña, para poder converger el A+U
  // (pólizas / estampillas / transacciones) sin tener que pasarlos por props.
  window.__PREX = { apus: apus, recursos: recursos, catEst: catalogoEstampillas || [],
                    proyectos: proyectos || [] };

  const migrarProyectos = ps=>(ps||[]).map(p=>({...p,au:migrarAU(p.au),capitulos:p.capitulos||[]}));

  // ── Load data from Supabase ───────────────────────────
  const cargarDatos = async () => {
    const {data,error} = await _sb.from("app_data").select("key,value");
    if(error){console.error("Load error:",error);setDataReady(true);return;}
    // First pass: global keys
    let proyBase = [];
    (data||[]).forEach(row=>{
      if(row.key==="recursos")            setRecursosRaw(row.value||[]);
      if(row.key==="apus")                setApusRaw(row.value||[]);
      if(row.key==="plantillas")          setPlantillasRaw(row.value||PLANTILLAS_AU_INIT);
      if(row.key==="plantillas_ficha")    setPlantillasFichaRaw(row.value||[]);
      if(row.key==="proyectos")           { proyBase=migrarProyectos(row.value||[]); }
      if(row.key==="catalogoPolizas")     setCatalogoPolizasRaw(row.value||[]);
      if(row.key==="catalogoEstampillas") setCatalogoEstampillasRaw(row.value||[]);
      if(row.key==="plantillasInt")       setPlantillasIntRaw(row.value||[]);
      if(row.key==="moData")              setMODataRaw(row.value||{ smmlv: 1750905, trabajadores: [], cuadrillas: [] });
    });
    // Second pass: merge psec_* sections into projects
    const SEC_FIELD={caps:"capitulos",au:"au",pol:"polizasPorComp",
      est:"estampillas",interv:"presupInterv",consult:"presupConsult",
      extras_sgSst:"extras_sgSst",extras_pma:"extras_pma",extras_pmt:"extras_pmt",extras_gestionSocial:"extras_gestionSocial"};
    const secciones = (data||[]).filter(r=>r.key.startsWith("psec_"));
    secciones.forEach(row=>{
      const rest=row.key.slice(5);
      const lastU=rest.lastIndexOf("_");
      const proyId=rest.slice(0,lastU), sec=rest.slice(lastU+1);
      const idx=proyBase.findIndex(p=>String(p.id)===String(proyId));
      if(idx===-1) return;
      if(sec==="meta") proyBase[idx]={...proyBase[idx],...(row.value||{})};
      else { const f=SEC_FIELD[sec]; if(f) proyBase[idx]={...proyBase[idx],[f]:(row.value!=null?row.value:proyBase[idx][f])}; }
    });
    // Tercer paso: reconstruir los CAPÍTULOS desde las tablas por fila
    // (capitulos_presupuesto / items_presupuesto). Son la fuente autoritativa del
    // presupuesto. IMPORTANTE: cuando un proyecto tiene HOJAS (presupuestosObra),
    // la pantalla ignora por completo el campo legacy "capitulos" y solo mira
    // dentro de cada hoja — así que hay que repartir cada capítulo en SU hoja
    // (usando la etiqueta "obra_ps:<hojaId>" del campo tipo), o si no, tras
    // recargar la página todo se ve en $0 aunque los datos estén bien guardados.
    try {
      const [{data:capsRows}, {data:itemsRows}] = await Promise.all([
        _sb.from("capitulos_presupuesto").select("*"),
        _sb.from("items_presupuesto").select("*")
      ]);
      if(capsRows && capsRows.length) {
        // Agrupar por proyecto
        const porProy = {};
        capsRows.forEach(c=>{
          if(!porProy[String(c.proyecto_id)]) porProy[String(c.proyecto_id)] = {caps:{}};
          porProy[String(c.proyecto_id)].caps[String(c.id)] = {
            id:c.id, numero:c.numero, nombre:c.nombre, tipo:c.tipo||"obra",
            orden:c.orden||0, items:[]
          };
        });
        (itemsRows||[]).forEach(it=>{
          const g = porProy[String(it.proyecto_id)];
          if(!g) return;
          const cap = g.caps[String(it.capitulo_id)];
          if(!cap) return;
          cap.items.push({
            // apu_id se guarda como TEXTO en la base, pero los APUs en memoria
            // usan id NUMÉRICO (Date.now()) en todo el sistema. Sin esta
            // conversión, "apus.find(a => a.id === item.apuId)" nunca coincide
            // tras recargar (número !== texto) y cada ítem calcula $0.
            id:it.id, apuId: it.apu_id!=null && !isNaN(Number(it.apu_id)) ? Number(it.apu_id) : it.apu_id,
            descripcion:it.descripcion||"",
            unidad:it.unidad||"", cantidad:Number(it.cantidad)||0, orden:it.orden_item||0
          });
        });
        Object.keys(porProy).forEach(pid=>{
          const idx = proyBase.findIndex(p=>String(p.id)===String(pid));
          if(idx===-1) return;
          const todos = Object.values(porProy[pid].caps)
            .sort((a,b)=>(a.orden||0)-(b.orden||0))
            .map(c=>({...c, items:c.items.sort((a,b)=>(a.orden||0)-(b.orden||0))}));

          const pBase = proyBase[idx];
          const hojas = pBase.presupuestosObra||[];
          if(hojas.length){
            // Repartir por etiqueta "obra_ps:<hojaId>"; los "obra" sin etiqueta
            // (filas antiguas) van a la primera hoja, para no perder nada.
            const porHoja = {}, sinEtiqueta = [], noObra = [];
            todos.forEach(c=>{
              const t = String(c.tipo||"obra");
              if(t.indexOf("obra_ps:")===0){ const ps=t.slice(8); (porHoja[ps]=porHoja[ps]||[]).push({...c,tipo:"obra"}); }
              else if(t==="obra") sinEtiqueta.push({...c,tipo:"obra"});
              else noObra.push(c);
            });
            const nuevasHojas = hojas.map(h=>{
              const propios = porHoja[String(h.id)] || [];
              return {...h, capitulos: propios};
            });
            if(sinEtiqueta.length) nuevasHojas[0] = {...nuevasHojas[0], capitulos:[...(nuevasHojas[0].capitulos||[]), ...sinEtiqueta]};
            proyBase[idx] = {...pBase,
              capitulos: [...(nuevasHojas[0].capitulos||[]), ...noObra],
              presupuestosObra: nuevasHojas};
          } else {
            // Proyecto sin hojas: todo va al campo legacy, como antes.
            proyBase[idx] = {...pBase, capitulos: todos};
          }
        });
      }
    } catch(e){ console.error("Carga de capítulos por fila falló, se usa el bloque:", e); }

    setProyectosRaw(proyBase);
    setDataReady(true);
  };

  const cargarPerfil = async uid => {
    const {data} = await _sb.from("profiles").select("*").eq("id",uid).single();
    if(data) setPerfil(data);
  };

  // ── Real-time subscription ────────────────────────────
  // Sección-level save: guarda solo la parte del proyecto que cambió
  const guardarSeccion = (proyectoId, seccion, data) => {
    // "caps" se persiste ítem por ítem (tablas capitulos_presupuesto / items_presupuesto)
    // y se recibe con mergeCapExterno/mergeItemExterno. Guardarla TAMBIÉN como bloque
    // arrastraba la copia vieja de capítulos y pisaba el trabajo del otro usuario.
    // Por eso el bloque ya no se escribe para esta sección.
    if (seccion === "caps") return;
    const key = `psec_${proyectoId}_${seccion}`;
    setSaveStatus("Guardando...");
    _sb.from("app_data").upsert({
      key, value: data,
      updated_at: new Date().toISOString(),
      updated_by: session?.user?.id,
      updated_by_email: session?.user?.email,
      updated_by_name: perfil?.nombre || session?.user?.email,
    }).then(({error})=>{
      if(error) { console.error("SecSave:",key,error); setSaveStatus("⚠️ Error al guardar"); }
      else {
        lastSaveTimeRef.current = Date.now();
        setSaveStatus("✓ Guardado");
        setTimeout(()=>setSaveStatus(""), 4000);
        // Guardar versión histórica (solo caps y au)
        if((seccion==="caps"||seccion==="au") && session) {
          _sb.from("version_history").insert({
            proyecto_id: String(proyectoId),
            seccion, value: data,
            saved_at: new Date().toISOString(),
            user_email: session.user.email,
            user_nombre: perfil?.nombre || session.user.email,
          }).then(()=>{}).catch(()=>{});
        }
      }
    });
    // Audit
    if(session){
      const labels = {caps:"Presupuesto",au:"Cálculo A+U",pol:"Pólizas",
        est:"Estampillas",interv:"Presup.Interventoría",consult:"Presup.Consultoría",meta:"Datos generales"};
      _sb.from("audit_log").insert({
        user_id:session.user.id, user_email:session.user.email,
        user_nombre:perfil?.nombre||session.user.email,
        modulo:"Proyectos", accion:`Guardó ${labels[seccion]||seccion} del proyecto`,
      }).then(()=>{}).catch(()=>{});
    }
  };

  const SEC_FIELD = {caps:"capitulos",au:"au",pol:"polizasPorComp",
    est:"estampillas",interv:"presupInterv",consult:"presupConsult",
      extras_sgSst:"extras_sgSst",extras_pma:"extras_pma",extras_pmt:"extras_pmt",extras_gestionSocial:"extras_gestionSocial"};
  const SEC_LABEL = {caps:"el presupuesto",au:"el A+U",pol:"pólizas",
    est:"estampillas",interv:"presup. interventoría",consult:"presup. consultoría",meta:"datos generales"};

  const setupRealtime = sess => {
    // Eliminar canal existente antes de crear uno nuevo (evita doble suscripción)
    if (window.__edeso_rt_channel__) {
      try { _sb.removeChannel(window.__edeso_rt_channel__); } catch(e) {}
      window.__edeso_rt_channel__ = null;
    }
    const myEmail = sess?.user?.email;
    const ch = _sb.channel("edeso_sync")
      .on("postgres_changes",{event:"*",schema:"public",table:"app_data"},
        payload=>{
          const{key,value,updated_by_email,updated_by_name}=payload.new;
          if(updated_by_email===myEmail) return;
          const nombre = updated_by_name||updated_by_email||"alguien";

          // ── Sección de proyecto (psec_ID_SECCION) ──
          if(key.startsWith("psec_")){
            const rest = key.slice(5); // ID_SECCION
            const lastUnderscore = rest.lastIndexOf("_");
            const proyId = rest.slice(0, lastUnderscore);
            const sec    = rest.slice(lastUnderscore+1);
            const label  = SEC_LABEL[sec]||sec;
            setSyncMsg(`${nombre} actualizó ${label}`);
            setTimeout(()=>setSyncMsg(""),5000);
            // Fusiona caps en lugar de reemplazar
            const mergeCapsRT = (local, remoto) => {
              if(!remoto) return local;
              if(!local||!local.length) return remoto;
              const res = [...local];
              (remoto||[]).forEach(capR => {
                const idx = res.findIndex(c=>String(c.id)===String(capR.id));
                if(idx===-1) res.push(capR);
                else {
                  const itemsL = res[idx].items||[];
                  const itemsR = capR.items||[];
                  const itemsM = [...itemsL];
                  itemsR.forEach(ir=>{ if(!itemsM.find(il=>String(il.id)===String(ir.id))) itemsM.push(ir); });
                  res[idx] = {...capR, items:itemsM};
                }
              });
              return res;
            };
            setProyectosRaw(prev=>prev.map(p=>{
              if(String(p.id)!==String(proyId)) return p;
              if(sec==="meta") return {...p,...(value||{})};
              if(sec==="caps") return {...p, capitulos: mergeCapsRT(p.capitulos, value)};
              if(sec==="interv"||sec==="consult") {
                const field=SEC_FIELD[sec];
                const local=p[field]||{};
                const remoto=value||{};
                return {...p,[field]:{...remoto,capitulos:mergeCapsRT(local.capitulos,remoto.capitulos)}};
              }
              const field=SEC_FIELD[sec];
              return field?{...p,[field]:(value!=null?value:p[field])}:p;
            }));
            // notify ModuloProyectos to merge into pActivo if open
            window.__edeso_seccion_externa__ && window.__edeso_seccion_externa__(proyId, sec, value);
            return;
          }

          // ── Datos globales ──
          setSyncMsg(`${nombre} actualizó ${key}`);
          setTimeout(()=>setSyncMsg(""),5000);
          if(key==="recursos")            setRecursosRaw(value||[]);
          if(key==="apus")                setApusRaw(value||[]);
          if(key==="plantillas")          setPlantillasRaw(value||PLANTILLAS_AU_INIT);
          if(key==="proyectos") {
            // value viene PODADO (sin secciones pesadas). Fusionar solo metadatos
            // para no borrar el presupuesto/A+U que este usuario tiene en memoria.
            const entrante = migrarProyectos(value||[]);
            setProyectosRaw(prev => {
              const prevById = {};
              (prev||[]).forEach(p=>{ prevById[String(p.id)] = p; });
              const merged = entrante.map(pR => {
                const pL = prevById[String(pR.id)];
                if(!pL) return pR;
                return { ...pL, ...pR,
                  capitulos: pL.capitulos, au: pL.au, polizasPorComp: pL.polizasPorComp,
                  estampillas: pL.estampillas, presupInterv: pL.presupInterv, presupConsult: pL.presupConsult };
              });
              (prev||[]).forEach(pL=>{ if(!merged.find(m=>String(m.id)===String(pL.id))) merged.push(pL); });
              return merged;
            });
          }
          if(key==="catalogoPolizas")     setCatalogoPolizasRaw(value||[]);
          if(key==="catalogoEstampillas") setCatalogoEstampillasRaw(value||[]);
          if(key==="plantillasInt")       setPlantillasIntRaw(value||[]);
        }
      ).subscribe();
    window.__edeso_rt_channel__ = ch;
    return ch;
  };

  // Online/offline detection + flush queue on reconnect
  useEffect(()=>{
    const handleOnline = () => {
      setIsOnline(true);
      if(_sb) flushOfflineQueue(setSyncMsg);
    };
    const handleOffline = () => {
      setIsOnline(false);
      setSyncMsg('📴 Sin conexión — los cambios se guardarán al reconectarse');
    };
    window.addEventListener('online',  handleOnline);
    window.addEventListener('offline', handleOffline);
    // Flush any pending ops on mount (in case page was reloaded while offline)
    if(navigator.onLine && _sb) {
      const q = offlineQueue.get();
      if(q.length > 0) flushOfflineQueue(setSyncMsg);
    }
    return()=>{ window.removeEventListener('online',handleOnline); window.removeEventListener('offline',handleOffline); };
  },[]);

  useEffect(()=>{
    if(!_sb){console.warn("Supabase no configurado");return;}
    let rtChannel = null;
    _sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session){
        cargarDatos();
        cargarPerfil(session.user.id);
        rtChannel = setupRealtime(session);
      }
    });
    // Presencia — quién está conectado y qué sección edita
    const presenceSetup = (sess) => {
      if(!sess) return;
      const roomCh = _sb.channel("presence_room", {config:{presence:{key:sess.user.id}}});
      roomCh
        .on("presence",{event:"sync"},()=>{
          const state = roomCh.presenceState();
          const activos = Object.values(state).flat().map(u=>u);
          setUsuariosActivos(activos);
          // Build presencia map: email -> {nombre, seccion, proyecto_id}
          const mapa = {};
          activos.forEach(u=>{ if(u.user_email) mapa[u.user_email]=u; });
          setPresencia(mapa);
        })
        .subscribe(async(status)=>{
          if(status==="SUBSCRIBED"){
            await roomCh.track({
              user_id: sess.user.id,
              user_email: sess.user.email,
              user_nombre: perfil?.nombre||sess.user.email,
              online_at: new Date().toISOString(),
              seccion: null,
              proyecto_id: null,
            });
          }
        });
      // Expose track function globally so ModuloProyectos can update section
      window.__presenceTrack__ = async(seccion, proyecto_id) => {
        await roomCh.track({
          user_id: sess.user.id,
          user_email: sess.user.email,
          user_nombre: perfil?.nombre||sess.user.email,
          online_at: new Date().toISOString(),
          seccion, proyecto_id: String(proyecto_id||""),
        });
      };
      return roomCh;
    };
    let presenceCh = null;
    _sb.auth.getSession().then(({data:{session}})=>{
      if(session) presenceCh = presenceSetup(session);
    });

    // Alerta antes de cerrar si hay cambios pendientes
    const handleBeforeUnload = (e) => {
      if(window.__hasPendingChanges__) {
        e.preventDefault();
        e.returnValue = "Tienes cambios sin guardar. ¿Segura que quieres salir?";
        return e.returnValue;
      }
    };
    window.addEventListener("beforeunload", handleBeforeUnload);

    // ── Expiración por inactividad (2 horas) ──────────────
    const INACTIVITY_MS = 2 * 60 * 60 * 1000; // 2 horas
    let inactivityTimer = null;
    const resetInactivityTimer = () => {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(async () => {
        await _sb.auth.signOut();
        alert("Tu sesión expiró por inactividad (2 horas). Por favor vuelve a iniciar sesión.");
      }, INACTIVITY_MS);
    };
    const activityEvents = ["mousemove","keydown","click","scroll","touchstart"];
    activityEvents.forEach(ev => window.addEventListener(ev, resetInactivityTimer));
    resetInactivityTimer(); // Inicia el timer al cargar

    const{data:{subscription}}=_sb.auth.onAuthStateChange(async(event,session)=>{
      setSession(session);
      if(session){
        if(!dataReady) cargarDatos();
        cargarPerfil(session.user.id);
        if(!window.__edeso_rt_channel__) rtChannel=setupRealtime(session);
      } else {
        setDataReady(false);setPerfil(null);
      }
    });
    return()=>{
      subscription.unsubscribe();
      if(rtChannel) _sb.removeChannel(rtChannel);
      clearTimeout(inactivityTimer);
      activityEvents.forEach(ev => window.removeEventListener(ev, resetInactivityTimer));
      window.removeEventListener("beforeunload", handleBeforeUnload);
      window.__presenceTrack__ = null;
    };
  },[]);

  // ── Supabase save + audit ─────────────────────────────
  const guardar = (key,data,modLabel,accion) => {
    safeUpsert("app_data", {
      key, value:data,
      updated_at:new Date().toISOString(),
      updated_by:session?.user?.id,
      updated_by_email:session?.user?.email,
      updated_by_name:perfil?.nombre||session?.user?.email,
    }, "appdata_"+key);
    if(session&&accion){
      _sb.from("audit_log").insert({
        user_id:session.user.id,
        user_email:session.user.email,
        user_nombre:perfil?.nombre||session.user.email,
        modulo:modLabel, accion,
      }).then(({error})=>{if(error)console.error("Audit:",error);});
    }
  };

  // ── Setters con auto-save ─────────────────────────────
  const setRecursos = v=>{
    const d=typeof v==="function"?v(recursos):v;
    const a=inferirAccion("Recursos",recursos,d);
    setRecursosRaw(d); guardar("recursos",d,"Recursos",a);
  };
  const setApus = v=>{
    const d=typeof v==="function"?v(apus):v;
    const a=inferirAccion("APUs",apus,d);
    setApusRaw(d); guardar("apus",d,"APUs",a);
  };
  const setPlantillasAU = v=>{
    const d=typeof v==="function"?v(plantillasAU):v;
    setPlantillasRaw(d); guardar("plantillas",d,"Plantillas AU","Actualizó Plantillas AU");
  };
  const plantillasFicha = plantillasFichaRaw;
  const setPlantillasFicha = v=>{
    const d=typeof v==="function"?v(plantillasFicha):v;
    setPlantillasFichaRaw(d); guardar("plantillas_ficha",d,"Plantillas Ficha","Actualizó Plantillas Ficha Financiera");
  };
  // Campos que se guardan POR SECCIÓN (clave psec_ID_xxx). NO deben viajar dentro
  // de la clave monolítica "proyectos": si lo hicieran, un guardado de la lista
  // pisaría el presupuesto/A+U/pólizas que el otro usuario acaba de guardar aparte.
  const SEC_HEAVY = ["capitulos","au","polizasPorComp","estampillas","presupInterv","presupConsult"];
  const podarSecciones = (arr) => (arr||[]).map(p => {
    const clon = {...p};
    SEC_HEAVY.forEach(f => { delete clon[f]; });
    return clon;
  });

  const setProyectos = v=>{
    const d=typeof v==="function"?v(proyectos):v;
    const a=inferirAccion("Proyectos",proyectos,d);
    setProyectosRaw(d);
    // La lista global guarda solo metadatos; el contenido pesado va por su sección.
    guardar("proyectos", podarSecciones(d), "Proyectos", a);
  };
  const setCatalogoPolizas = v=>{
    const d=typeof v==="function"?v(catalogoPolizas):v;
    const a=inferirAccion("Catálogo Pólizas",catalogoPolizas,d);
    setCatalogoPolizasRaw(d); guardar("catalogoPolizas",d,"Catálogo Pólizas",a);
  };
  const setCatalogoEstampillas = v=>{
    const d=typeof v==="function"?v(catalogoEstampillas):v;
    const a=inferirAccion("Catálogo Estampillas",catalogoEstampillas,d);
    setCatalogoEstampillasRaw(d); guardar("catalogoEstampillas",d,"Catálogo Estampillas",a);
  };
  const setPlantillasInt = v=>{
    const d=typeof v==="function"?v(plantillasInt):v;
    const a=inferirAccion("Plantillas Interv.",plantillasInt,d);
    setPlantillasIntRaw(d); guardar("plantillasInt",d,"Plantillas Interv.",a);
  };

  const onLogout = () => _sb.auth.signOut();

  const counts={
    recursos:recursos.length, apus:apus.length, proyectos:proyectos.length,
    polizas:catalogoPolizas.length, estampillas:catalogoEstampillas.length,
    plantillasInt:(plantillasInt||[]).length,
    plantillasFicha:(plantillasFicha||[]).length
  };

  const onExportar=()=>{
    const b={version:1,fecha:new Date().toISOString(),recursos,apus,plantillasAU,proyectos,
             catalogoPolizas,catalogoEstampillas,plantillasInt};
    const url=URL.createObjectURL(new Blob([JSON.stringify(b,null,2)],{type:"application/json"}));
    const a=document.createElement("a");a.href=url;
    a.download=`edeso_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
